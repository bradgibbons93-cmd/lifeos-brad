function greet(name) {
  const h = new Date().getHours();
  const tod = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';

}

function routeVoice(text) {
  const t = text.toLowerCase();
  if (/expense|cost|pay|money|subscri|price|bill|rent|budget/.test(t))         return { label:'💳 Money', id:'money' };
  if (/pick up|drop off|lilly|skylah|mim|custody|exchange|school|pick up|drop off/.test(t))     return { label:'👨‍👧‍👦 Co-parenting', id:'coparenting' };

  if (/remind|schedule|appointment|calendar|event|book|dentist/.test(t))       return { label:'📅 Calendar', id:'calendar' };
  if (/journal|feeling|today was|note to self|reflect|grateful|mood/.test(t)) return { label:'🎙️ Voice Journal', id:'journal' };
  if (/message|text|send|tell|email|contact/.test(t))                          return { label:'💬 Messages', id:'messages' };
  return { label:'✨ AI Assistant', id:'ai' };
}

/* ═══════════════════════════════════════
   LOCAL STORAGE HOOK (user-scoped)
   Each user's data is isolated by email.
   System keys (user, screen) are shared.
═══════════════════════════════════════ */
const UNSCOPED_KEYS = new Set(['lifeos_user', 'lifeos_screen']);

function getUserScopedKey(key) {
  if (UNSCOPED_KEYS.has(key)) return key;
  try {
    const raw = window.localStorage.getItem('lifeos_user');
    if (!raw || raw === 'null') return key;
    const u = JSON.parse(raw);
    return u && u.email ? key + ':' + u.email : key;
  } catch(e) { return key; }
}

function useLocalStorage(key, initialValue) {
  const scopedKey = getUserScopedKey(key);

  const [stored, setStored] = useState(() => {
    try {
      const item = window.localStorage.getItem(scopedKey);
      if (item !== null) return JSON.parse(item);
      // Migration: copy old unscoped data to new scoped key on first use
      if (scopedKey !== key) {
        const old = window.localStorage.getItem(key);
        if (old !== null) {
          window.localStorage.setItem(scopedKey, old);
          return JSON.parse(old);
        }
      }
      return initialValue;
    } catch(e) { return initialValue; }
  });

  const setValue = (value) => {
    try {
      const currentKey = getUserScopedKey(key);
      const val = value instanceof Function ? value(stored) : value;
      setStored(val);
      window.localStorage.setItem(currentKey, JSON.stringify(val));
    } catch(e) { console.error(e); }
  };

  return [stored, setValue];
}

/* ═══════════════════════════════════════
   RESPONSIVE HOOK
═══════════════════════════════════════ */
function useIsMobile() {
  const [m, setM] = useState(typeof window !== 'undefined' && window.innerWidth < 768);
  useEffect(() => {
    const h = () => setM(window.innerWidth < 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return m;
}

/* ═══════════════════════════════════════
   SHARED LOCATION HOOK
   Stores last known GPS position in
   localStorage so all screens show the
   same value without requesting again.
═══════════════════════════════════════ */
function useSharedLocation() {
  const CACHE_KEY = 'lifeos_shared_gps';
  const [loc, setLoc] = useState(() => {
    try {
      const raw = window.localStorage.getItem(CACHE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  });

  useEffect(() => {
    if (!navigator.geolocation) return;
    // Only request if we don't already have a fresh fix (< 5 min old)
    if (loc && (Date.now() - new Date(loc.ts).getTime()) < 5 * 60 * 1000) return;
    navigator.geolocation.getCurrentPosition(
      pos => {
        const next = { lat: pos.coords.latitude, lng: pos.coords.longitude, ts: new Date().toISOString() };
        setLoc(next);
        try { window.localStorage.setItem(CACHE_KEY, JSON.stringify(next)); } catch(e) {}
      },
      () => {}
    );
  }, []);

  return loc;
}

/* ═══════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════ */
function LoginScreen({ onLogin }) {
  const [name, setName]         = useState('');
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');
  const [isReturning, setIsReturning] = useState(false);

  const hashPw = async (em, pw) => {
    const data = new TextEncoder().encode(em + ':' + pw);
    const buf  = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  };

  const onEmailChange = e => {
    const val = e.target.value;
    setEmail(val); setError('');
    if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val.trim())) {
      setIsReturning(!!localStorage.getItem('lifeos_pw:' + val.trim().toLowerCase()));
    } else { setIsReturning(false); }
  };

  const go = async () => {
    if (!name.trim())    { setError('Please enter your name'); return; }
    if (!email.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) {
      setError('Please enter a valid email'); return;
    }
    if (!password.trim()) { setError('Please enter a password'); return; }
    if (password.length < 4) { setError('Password must be at least 4 characters'); return; }
    setLoading(true); setError('');
    const em   = email.trim().toLowerCase();
    const hash = await hashPw(em, password);
    const stored = localStorage.getItem('lifeos_pw:' + em);
    if (stored) {
      if (stored !== hash) { setLoading(false); setError('Incorrect password — try again'); return; }
    } else {
      localStorage.setItem('lifeos_pw:' + em, hash);
    }
    setTimeout(() => onLogin({ name: name.trim(), email: em }), 400);
  };

  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
      background:'linear-gradient(145deg,#F8FAFC 0%,#EEF2FF 100%)', padding:'24px' }}>
      <div className="fade-up" style={{ background:'white', borderRadius:'28px', padding:'60px 52px',
        width:'100%', maxWidth:'440px', boxShadow:'0 32px 80px rgba(0,0,0,.1)', textAlign:'center' }}>

        {/* Logo */}
        <div style={{ width:'76px', height:'76px', margin:'0 auto 28px',
          background:'linear-gradient(135deg,#6366F1,#8B5CF6)',
          borderRadius:'22px', display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:'36px', boxShadow:'0 12px 32px rgba(99,102,241,.3)' }}>
          ◎
        </div>

        <h1 style={{ fontSize:'30px', fontWeight:'800', color:'#0F172A', letterSpacing:'-.5px', marginBottom:'10px' }}>
          {isReturning ? 'Welcome back' : 'Welcome to LifeOS'}
        </h1>
        <p style={{ fontSize:'15px', color:'#64748B', lineHeight:'1.6', marginBottom:'32px' }}>
          {isReturning ? 'Enter your password to continue.' : 'Your entire life, beautifully organized.'}
        </p>

        <div style={{ textAlign:'left', marginBottom:'16px' }}>
          <label style={{ display:'block', fontSize:'13px', fontWeight:'600', color:'#374151', marginBottom:'6px' }}>Name</label>
          <input value={name} onChange={e => { setName(e.target.value); setError(''); }}
            placeholder="Brad Gibbons"
            style={{ width:'100%', padding:'12px 16px', border:'1.5px solid #E2E8F0', borderRadius:'12px',
              fontSize:'15px', background:'#F8FAFC' }} />
        </div>

        <div style={{ textAlign:'left', marginBottom:'16px' }}>
          <label style={{ display:'block', fontSize:'13px', fontWeight:'600', color:'#374151', marginBottom:'6px' }}>Email</label>
          <input value={email} onChange={onEmailChange}
            placeholder="you@gmail.com" type="email"
            style={{ width:'100%', padding:'12px 16px', border:'1.5px solid #E2E8F0', borderRadius:'12px',
              fontSize:'15px', background:'#F8FAFC' }} />
        </div>

        <div style={{ textAlign:'left', marginBottom:'24px' }}>
          <label style={{ display:'block', fontSize:'13px', fontWeight:'600', color:'#374151', marginBottom:'6px' }}>
            {isReturning ? 'Password' : 'Create Password'}
          </label>
          <input value={password} onChange={e => { setPassword(e.target.value); setError(''); }}
            placeholder={isReturning ? '••••••••' : 'Min 4 characters'} type="password"
            onKeyDown={e => e.key === 'Enter' && go()}
            style={{ width:'100%', padding:'12px 16px', border:'1.5px solid #E2E8F0', borderRadius:'12px',
              fontSize:'15px', background:'#F8FAFC' }} />
        </div>

        {error && <p style={{ color:'#EF4444', fontSize:'13px', marginBottom:'16px', fontWeight:'500' }}>{error}</p>}

        <button className="g-btn" onClick={go} disabled={loading}>
          {loading
            ? <><div style={{ width:'18px', height:'18px', border:'2px solid #E2E8F0',
                borderTopColor:'#6366F1', borderRadius:'50%', animation:'spin .7s linear infinite' }}/>
                Signing in…</>
            : <><IcoGoogle />{isReturning ? 'Sign in' : 'Create Account'}</>}
        </button>

        <p style={{ marginTop:'28px', fontSize:'12px', color:'#94A3B8', lineHeight:'1.6' }}>
          Your data is stored locally on this device.<br/>Each email gets its own private data space.
        </p>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   RECORD BUTTON
   Saves completed recordings directly to
   lifeos_journal (Voice Journal) in
   localStorage and shows a saved toast.
═══════════════════════════════════════ */
function RecordButton({ onRoute }) {
  const [rec, setRec] = useState(false);
  const [transcript, setTranscript] = useState('');
  const [saved, setSaved]   = useState(false);
  const srRef = useRef(null);
  const demoRef = useRef(null);
  // Ref to hold latest transcript so onend closure can read current value
  const transcriptRef = useRef('');

  const saveToJournal = useCallback((text) => {
    if (!text || !text.trim()) return;
    try {
      // Determine scoped key the same way useLocalStorage does
      let journalKey = 'lifeos_journal';
      const rawUser = window.localStorage.getItem('lifeos_user');
      if (rawUser && rawUser !== 'null') {
        const u = JSON.parse(rawUser);
        if (u && u.email) journalKey = 'lifeos_journal:' + u.email;
      }
      const now = new Date();
      const entry = {
        id: Date.now(),
        date: now.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }),
        time: now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }),
        mood: '😊', moodLabel: 'Good', duration: '0:30',
        title: text.slice(0, 50) + (text.length > 50 ? '…' : ''),
        transcript: text,
        tags: ['voice'],
      };
      const existing = window.localStorage.getItem(journalKey);
      const arr = existing ? JSON.parse(existing) : [];
      arr.unshift(entry);
      window.localStorage.setItem(journalKey, JSON.stringify(arr));
      // Also store as pending so Voice Journal highlights it if user navigates there
      window.localStorage.setItem('lifeos_pending_voice', JSON.stringify({ text, ts: now.toISOString() }));
    } catch(e) { console.error(e); }
  }, []);

  const stop = useCallback((text) => {
    setRec(false);
    if (srRef.current) { try { srRef.current.stop(); } catch(_){} }
    clearInterval(demoRef.current);
    if (text && text.trim()) {
      saveToJournal(text);
      setSaved(true);
      onRoute && onRoute(text, routeVoice(text));
      setTimeout(() => { setTranscript(''); setSaved(false); }, 3200);
    }
  }, [onRoute, saveToJournal]);

  const toggle = useCallback(() => {
    if (rec) { stop(transcript); return; }
    setTranscript(''); setSaved(false); setRec(true); transcriptRef.current = '';

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      const r = new SR(); r.continuous = true; r.interimResults = true;
      r.onresult = e => {
        let t = ''; for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
        transcriptRef.current = t;
        setTranscript(t);
      };
      // Use ref so onend always sees the latest transcript, not a stale closure value
      r.onend = () => { if (transcriptRef.current) stop(transcriptRef.current); else setRec(false); };
      srRef.current = r; r.start();
    } else {
      // demo typewriter
      const demo = 'Remind me to pick up Lilly from soccer at 4:30 today';
      let i = 0;
      demoRef.current = setInterval(() => {
        i++; setTranscript(demo.slice(0, i));
        if (i >= demo.length) { clearInterval(demoRef.current); setTimeout(() => stop(demo), 600); }
      }, 38);
    }
  }, [rec, transcript, stop]);

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'18px' }}>

      {/* Transcript / saved pill */}
      {(transcript || saved) && (
        <div className="fade-up" style={{ background:'white', border:'1px solid #E2E8F0',
          borderRadius:'18px', padding:'14px 22px', maxWidth:'500px', width:'100%',
          boxShadow:'0 4px 20px rgba(0,0,0,.07)', textAlign:'left' }}>
          {transcript && (
            <p style={{ fontSize:'14px', color:'#374151', marginBottom: saved ? '10px' : 0, lineHeight:'1.5' }}>
              "{transcript}"
            </p>
          )}
          {saved && (
            <div style={{ display:'flex', alignItems:'center', gap:'7px' }}>
              <div style={{ width:'7px', height:'7px', borderRadius:'50%', background:'#10B981' }}/>
              <span style={{ fontSize:'12px', color:'#10B981', fontWeight:'600' }}>
                Saved to Voice Journal
              </span>
            </div>
          )}
        </div>
      )}

      {/* Big red button */}
      <button
        onClick={toggle}
        className={rec ? 'record-active' : 'record-idle'}
        style={{ width:'76px', height:'76px', borderRadius:'50%', border:'none', cursor:'pointer',
          background: rec
            ? 'linear-gradient(135deg,#DC2626,#EF4444)'
            : 'linear-gradient(135deg,#EF4444,#F87171)',
          display:'flex', alignItems:'center', justifyContent:'center',
          transition:'transform .15s, box-shadow .15s' }}>
        {rec
          ? <div style={{ display:'flex', alignItems:'center', height:'30px' }}>
              {[0,1,2,3,4].map(i => <span key={i} className="wave-bar" style={{ animationDelay:`${i*.12}s` }}/>)}
            </div>
          : <IcoMic />}
      </button>

      <span style={{ fontSize:'11px', color:'#94A3B8', fontWeight:'600', letterSpacing:'1px' }}>
        {rec ? 'TAP TO STOP' : 'TAP TO SPEAK'}
      </span>
    </div>
  );
}

/* ═══════════════════════════════════════
   TASKS WIDGET
═══════════════════════════════════════ */
const TASK_SEED = [];

function TasksWidget({ onCard }) {
  const mobile = useIsMobile();
  const [tasks, setTasks] = useLocalStorage('lifeos_tasks', TASK_SEED);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ text:'', urgency:'normal' });

  const addTask = () => {
    if (!form.text.trim()) return;
    setTasks(prev => [...prev, { id:Date.now(), text:form.text.trim(), urgency:form.urgency, done:false, created: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}) }]);
    setForm({ text:'', urgency:'normal' }); setShowForm(false);
  };
  const toggle = (id) => setTasks(prev => prev.map(t => t.id===id ? {...t, done:!t.done} : t));
  const remove  = (id) => setTasks(prev => prev.filter(t => t.id!==id));

  const urgent  = tasks.filter(t => t.urgency==='urgent'  && !t.done);
  const normal  = tasks.filter(t => t.urgency==='normal'  && !t.done);
  const done    = tasks.filter(t => t.done);

  const URGENCY = { urgent:{bg:'#FEF2F2',border:'#FECACA',dot:'#DC2626',label:'Urgent'}, normal:{bg:'#F0FDF4',border:'#BBF7D0',dot:'#10B981',label:'Today'} };

  const TaskRow = ({ task }) => (
    <div style={{ display:'flex', alignItems:'flex-start', gap:'10px', padding:'8px 12px', borderRadius:'10px',
      background: task.done ? 'transparent' : URGENCY[task.urgency]?.bg || '#F8FAFC',
      border: `1px solid ${task.done ? '#F1F5F9' : URGENCY[task.urgency]?.border || '#E2E8F0'}`,
      marginBottom:'6px', transition:'all .15s' }}>
      <div onClick={() => toggle(task.id)} style={{ width:'18px', height:'18px', borderRadius:'5px', flexShrink:0, marginTop:'1px',
        border:`2px solid ${task.done ? '#10B981' : URGENCY[task.urgency]?.dot || '#94A3B8'}`,
        background: task.done ? '#10B981' : 'white', cursor:'pointer', transition:'all .15s',
        display:'flex', alignItems:'center', justifyContent:'center' }}>
        {task.done && <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" strokeWidth="2.2" strokeLinecap="round"/></svg>}
      </div>
      <span style={{ flex:1, fontSize:'13px', color: task.done ? '#94A3B8' : '#0F172A', textDecoration: task.done ? 'line-through' : 'none', lineHeight:'1.4' }}>{task.text}</span>
      {!task.done && task.urgency==='urgent' && <span style={{ fontSize:'10px', fontWeight:'700', color:'#DC2626', background:'#FEE2E2', borderRadius:'100px', padding:'2px 7px', flexShrink:0 }}>URGENT</span>}
      <button onClick={() => remove(task.id)} style={{ background:'none', border:'none', color:'#CBD5E1', cursor:'pointer', fontSize:'14px', padding:'0 2px', lineHeight:1 }}>×</button>
    </div>
  );

  return (
    <div className="fade-up" style={{ background:'white', borderRadius:'20px', padding: mobile ? '18px 16px' : '24px 28px',
      boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9', marginBottom:'28px' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'16px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
          <h2 style={{ fontSize:'16px', fontWeight:'800', color:'#0F172A' }}>Today's Tasks</h2>
          {urgent.length > 0 && (
            <span style={{ fontSize:'11px', fontWeight:'700', color:'#DC2626', background:'#FEE2E2', borderRadius:'100px', padding:'3px 9px' }}>
              {urgent.length} urgent
            </span>
          )}
        </div>
        <button onClick={() => setShowForm(v=>!v)} style={{ display:'flex', alignItems:'center', gap:'5px', background:'#F1F5F9', border:'none', borderRadius:'9px', padding:'7px 12px', color:'#374151', fontWeight:'600', fontSize:'12px', cursor:'pointer' }}>
          <IcoPlus /> Add
        </button>
      </div>

      {showForm && (
        <div className="fade-up" style={{ background:'#F8FAFC', borderRadius:'12px', padding:'14px', marginBottom:'14px', border:'1px solid #E2E8F0' }}>
          <div style={{ display:'flex', gap:'8px', marginBottom:'10px' }}>
            <input value={form.text} onChange={e=>setForm(f=>({...f,text:e.target.value}))}
              onKeyDown={e=>e.key==='Enter'&&addTask()}
              placeholder="What needs to get done?" autoFocus
              style={{ flex:1, padding:'9px 12px', borderRadius:'9px', border:'1.5px solid #E2E8F0', fontSize:'13px', fontFamily:'Inter,sans-serif', outline:'none' }}/>
            <select value={form.urgency} onChange={e=>setForm(f=>({...f,urgency:e.target.value}))}
              style={{ padding:'9px 12px', borderRadius:'9px', border:'1.5px solid #E2E8F0', fontSize:'13px', fontFamily:'Inter,sans-serif', cursor:'pointer', background:'white' }}>
              <option value="urgent">🔴 Urgent</option>
              <option value="normal">🟢 Today</option>
            </select>
          </div>
          <div style={{ display:'flex', gap:'8px' }}>
            <button onClick={()=>setShowForm(false)} style={{ flex:1, padding:'8px', borderRadius:'9px', border:'1px solid #E2E8F0', background:'white', cursor:'pointer', fontSize:'13px', fontFamily:'Inter,sans-serif' }}>Cancel</button>
            <button onClick={addTask} style={{ flex:1, padding:'8px', borderRadius:'9px', border:'none', background:'#0F172A', color:'white', cursor:'pointer', fontSize:'13px', fontWeight:'600', fontFamily:'Inter,sans-serif' }}>Add Task</button>
          </div>
        </div>
      )}

      {tasks.length === 0 && !showForm && (
        <p style={{ fontSize:'13px', color:'#94A3B8', textAlign:'center', padding:'16px 0' }}>No tasks yet — tap Add to get started</p>
      )}

      {urgent.length > 0 && (
        <div style={{ marginBottom:'10px' }}>
          {urgent.map(t => <TaskRow key={t.id} task={t} />)}
        </div>
      )}
      {normal.length > 0 && (
        <div style={{ marginBottom: done.length > 0 ? '10px' : 0 }}>
          {normal.map(t => <TaskRow key={t.id} task={t} />)}
        </div>
      )}
      {done.length > 0 && (
        <details style={{ marginTop:'6px' }}>
          <summary style={{ fontSize:'12px', color:'#94A3B8', cursor:'pointer', fontWeight:'600', userSelect:'none', listStyle:'none' }}>
            ✓ {done.length} completed
          </summary>
          <div style={{ marginTop:'8px', opacity:.65 }}>
            {done.map(t => <TaskRow key={t.id} task={t} />)}
          </div>
        </details>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   DASHBOARD CARD
═══════════════════════════════════════ */
function DashCard({ card, idx, draggingIdx, overIdx, onDragStart, onDragOver, onDrop, onDragEnd, onClick, preview }) {
  const isDragging = draggingIdx === idx;
  const isOver     = overIdx === idx && draggingIdx !== idx;

  return (
    <div
      draggable
      onDragStart={() => onDragStart(idx)}
      onDragOver={e  => { e.preventDefault(); onDragOver(idx); }}
      onDrop={() => onDrop(idx)}
      onDragEnd={onDragEnd}
      onClick={onClick}
      className={`dash-card ${isDragging ? 'dragging' : ''} ${isOver ? 'drag-over' : ''}`}
      style={{ background:'white', borderRadius:'22px', padding:'18px', position:'relative',
        overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04)',
        border:'1px solid rgba(226,232,240,.8)', userSelect:'none', minHeight:'130px' }}>

      {/* Decorative blob */}
      <div style={{ position:'absolute', top:'-24px', right:'-24px', width:'90px', height:'90px',
        borderRadius:'50%', background:card.bg, opacity:.9 }}/>

      {/* Icon badge */}
      <div style={{ width:'46px', height:'46px', borderRadius:'14px', background:card.bg,
        display:'flex', alignItems:'center', justifyContent:'center',
        fontSize:'22px', marginBottom:'18px', border:`1.5px solid ${card.color}22` }}>
        {card.icon}
      </div>

      <h3 style={{ fontSize:'15px', fontWeight:'700', color:'#0F172A', marginBottom:'4px' }}>{card.label}</h3>
      <p  style={{ fontSize:'13px', color:'#94A3B8', marginBottom: preview ? '14px' : 0 }}>{card.desc}</p>

      {preview && <div>{preview}</div>}

      <div style={{ position:'absolute', bottom:'22px', right:'22px', color:'#CBD5E1', lineHeight:0 }}>
        <IcoChevron />
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   DASHBOARD
═══════════════════════════════════════ */
function Dashboard({ user, onCard, onLogout }) {
  const mobile = useIsMobile();
  const [cards, setCards]         = useState(CARDS_DEF);
  const [draggingIdx, setDragging] = useState(null);
  const [overIdx, setOver]         = useState(null);

  // Use shared GPS hook so dashboard and Kids Area show the same location
  const sharedLoc = useSharedLocation();
  const dashLoc = sharedLoc ? { lat: sharedLoc.lat, lng: sharedLoc.lng, ts: new Date(sharedLoc.ts) } : null;

  // Read real data for dashboard card previews
  const [cpEvents]   = useLocalStorage('lifeos_cp_events', EVENTS_SEED);
  const [cpProjects] = useLocalStorage('lifeos_projects', PROJECTS_SEED);

  // Record button now saves directly to Voice Journal in localStorage (Bug 1).
  // We still route the user if they spoke something that matches a section keyword,
  // but recordings are persisted regardless so nothing is lost.
  const handleVoiceRoute = useCallback((text, dest) => {
    // Recording is already saved by RecordButton — just optionally navigate
    // Only navigate if the destination is NOT the journal (journal is already saved)
    if (dest && dest.id && dest.id !== 'journal') {
      onCard(dest.id);
    }
  }, [onCard]);

  const handleDragStart = (i)  => setDragging(i);
  const handleDragOver  = (i)  => setOver(i);
  const handleDragEnd   = ()   => { setDragging(null); setOver(null); };
  const handleDrop      = (i)  => {
    if (draggingIdx === null || draggingIdx === i) { handleDragEnd(); return; }
    setCards(prev => {
      const next = [...prev];
      const [moved] = next.splice(draggingIdx, 1);
      next.splice(i, 0, moved);
      return next;
    });
    handleDragEnd();
  };

  const previews = {
    coparenting: (
      <div>
        <div style={{ display:'flex', gap:'3px', marginBottom:'10px' }}>
          {[...Array(7)].map((_, i) => (
            <div key={i} style={{ flex:1, height:'5px', borderRadius:'3px',
              background: i<4 ? '#BFDBFE' : i===4 ? '#E9D5FF' : '#FBCFE8' }}/>

        <p style={{ fontSize:'12px', color:'#64748B' }}>Next exchange: Apr 5</p>

    money: (() => {
      // Read real subscription data from localStorage for the preview

        if (rawUser && rawUser !== 'null') {
          const u = JSON.parse(rawUser);
          if (u && u.email) subsKey = 'lifeos_subs:' + u.email;
        }

        if (raw) {
          const arr = JSON.parse(raw);

          subsCount = arr.length;
        }

                <div style={{ flex:1, height:'4px', borderRadius:'4px', background:'#F1F5F9', overflow:'hidden' }}>

            ))
          : <span style={{ fontSize:'12px', color:'#94A3B8' }}>No events yet</span>
        }
      </div>
    ),
    myLocation: (
      <div>
        <div style={{ display:'flex', alignItems:'center', gap:'6px', marginBottom:'8px' }}>

          <span style={{ fontSize:'12px', color:'#374151', fontWeight:'600' }}>
            {dashLoc ? `📍 ${dashLoc.lat.toFixed(4)}, ${dashLoc.lng.toFixed(4)} · ${dashLoc.ts.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}` : 'Tap to enable GPS'}

        <div style={{ display:'flex', alignItems:'center', gap:'10px', flex:1 }}>
          <div style={{ width:'34px', height:'34px', borderRadius:'10px',
            background:'linear-gradient(135deg,#6366F1,#8B5CF6)',
            display:'flex', alignItems:'center', justifyContent:'center',
            color:'white', fontWeight:'700', fontSize:'16px' }}>◎</div>
          <span style={{ fontSize:'18px', fontWeight:'800', color:'#0F172A', letterSpacing:'-.3px' }}>LifeOS</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap: mobile ? '12px' : '20px' }}>
          {!mobile && <span style={{ fontSize:'14px', color:'#64748B' }}>{greet(user.name)}</span>}
          <div onClick={onLogout} title="Sign out" style={{ width:'36px', height:'36px', borderRadius:'50%',
            background:'linear-gradient(135deg,#6366F1,#8B5CF6)',
            display:'flex', alignItems:'center', justifyContent:'center',
            color:'white', fontSize:'14px', fontWeight:'700', cursor:'pointer' }}>
            {user.name[0]}
          </div>
        </div>

      <div style={{ maxWidth:'1280px', margin:'0 auto', padding: mobile ? '24px 16px' : '48px 36px' }}>

        {/* ── Hero record section ── */}
        <div className="fade-up" style={{ textAlign:'center', marginBottom: mobile ? '32px' : '56px' }}>
          <h2 style={{ fontSize: mobile ? '24px' : '34px', fontWeight:'800', color:'#0F172A', letterSpacing:'-.5px', marginBottom:'8px' }}>
            What's on your mind?
          </h2>
          <p style={{ fontSize:'15px', color:'#94A3B8', marginBottom:'32px' }}>
            Speak anything — LifeOS routes it to the right section automatically.
          </p>
          <div style={{ display:'flex', justifyContent:'center' }}>
            <RecordButton onRoute={handleVoiceRoute} />
          </div>
        </div>

        {/* ── Skylah Birthday Countdown ── */}
        {(() => {
          const bday = new Date(2026, 3, 17); // April 17, 2026
          const now = new Date();
          const diff = Math.ceil((bday - now) / (1000*60*60*24));
          if (diff > 0 && diff <= 30) return (
            <div className="fade-up" style={{ background:'linear-gradient(135deg,#EC4899,#F472B6)', borderRadius:'20px',
              padding: mobile ? '18px 16px' : '24px 28px', marginBottom:'28px', color:'white', display:'flex', alignItems:'center', gap:'16px' }}>
              <div style={{ fontSize:'40px' }}>🎂</div>
              <div style={{ flex:1 }}>
                <h3 style={{ fontSize:'18px', fontWeight:'800', marginBottom:'4px' }}>Skylah turns 6 in {diff} day{diff!==1?'s':''}!</h3>
                <p style={{ fontSize:'13px', opacity:.85 }}>April 17, 2026 — Party planning time!</p>
              </div>
              <div style={{ fontSize:'36px', fontWeight:'900', opacity:.3 }}>{diff}</div>
            </div>
          );
          return null;
        })()}

        {/* ── Today's Tasks ── */}
        <TasksWidget onCard={onCard} />

        {/* ── Cards header ── */}
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px' }}>
          <h2 style={{ fontSize:'17px', fontWeight:'700', color:'#0F172A' }}>Your Dashboard</h2>
          <p style={{ fontSize:'12px', color:'#CBD5E1', fontWeight:'500' }}>✦ Hold & drag to rearrange</p>
        </div>

        {/* ── Cards grid ── */}
        <div style={{ display:'grid', gridTemplateColumns: mobile ? 'repeat(2,1fr)' : 'repeat(4,1fr)', gap: mobile ? '12px' : '20px', marginBottom:'40px' }}>
          {cards.map((card, idx) => (
            <DashCard
              key={card.id}
              card={card}
              idx={idx}
              draggingIdx={draggingIdx}
              overIdx={overIdx}
              onDragStart={handleDragStart}
              onDragOver={handleDragOver}
              onDrop={handleDrop}
              onDragEnd={handleDragEnd}
              onClick={() => onCard(card.id)}
              preview={previews[card.id]}
            />
          ))}
        </div>

        {/* ── Today strip ── */}
        <div className="fade-up" style={{ background:'white', borderRadius:'22px', padding: mobile ? '20px 16px' : '28px 36px',
          boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9',
          display:'grid', gridTemplateColumns: mobile ? '1fr' : 'repeat(3,1fr)', gap: mobile ? '24px' : '36px' }}>

          <div>
            <p style={{ fontSize:'11px', fontWeight:'700', color:'#94A3B8', textTransform:'uppercase', letterSpacing:'1.2px', marginBottom:'14px' }}>TODAY'S SCHEDULE</p>
            {cpEvents.length > 0
              ? cpEvents.slice(0,3).map(e => (
                  <div key={e.id} style={{ display:'flex', alignItems:'flex-start', gap:'10px', marginBottom:'10px' }}>
                    <span style={{ fontSize:'16px' }}>{e.icon}</span>
                    <div>
                      <p style={{ fontSize:'13px', fontWeight:'600', color:'#374151' }}>{e.title}</p>
                      <p style={{ fontSize:'11px', color:'#94A3B8' }}>{e.date} · {e.time}</p>
                    </div>
                  </div>
                ))
              : <p style={{ fontSize:'13px', color:'#CBD5E1' }}>No events — add them in Co-Parenting</p>
            }
          </div>

          <div>
            <p style={{ fontSize:'11px', fontWeight:'700', color:'#94A3B8', textTransform:'uppercase', letterSpacing:'1.2px', marginBottom:'14px' }}>MESSAGES</p>
            <p style={{ fontSize:'13px', color:'#CBD5E1', lineHeight:'1.6' }}>Open Messages to view your conversations</p>
          </div>

          <div>
            <p style={{ fontSize:'11px', fontWeight:'700', color:'#94A3B8', textTransform:'uppercase', letterSpacing:'1.2px', marginBottom:'14px' }}>QUICK STATS</p>
            {[
              { k:'Kids this month',    v:'14 days',  c:'#0F172A' },
              { k:'Next exchange',      v:'Apr 5',    c:'#7C3AED' },
              { k:'Shared expenses',    v:'$343',     c:'#0F172A' },
              { k:'Pending settlement', v:'$24.50',   c:'#F59E0B' },
              { k:'Active projects',    v:'3',        c:'#2563EB' },
            ].map(({k,v,c},i) => (
              <div key={i} style={{ display:'flex', justifyContent:'space-between', padding:'5px 0',
                borderBottom: i<4 ? '1px solid #F8FAFC' : 'none' }}>
                <span style={{ fontSize:'12px', color:'#64748B' }}>{k}</span>
                <span style={{ fontSize:'12px', fontWeight:'700', color:c }}>{v}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   CO-PARENTING — SCHEDULE TAB
═══════════════════════════════════════ */
function TabSchedule({ events = EVENTS_SEED, onAddEvent }) {
  const mobile = useIsMobile();
  const [sel, setSel] = useState(null);
  const [monthOffset, setMonthOffset] = useState(0); // 0 = April 2026
  const [calView, setCalView] = useState('month'); // 'month' | 'week'
  const [showAddEvt, setShowAddEvt] = useState(false);
  const [addForm, setAddForm] = useState({ title:'', date:'', time:'', who:'brad' });
  const today = new Date().getDate();
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const baseMonth = 3; // April = index 3
  const displayMonth = MONTHS[(baseMonth + monthOffset + 12) % 12];
  const displayYear = 2026 + Math.floor((baseMonth + monthOffset) / 12);
  const [custodyDays, setCustodyDays] = useLocalStorage('lifeos_custody_apr2026', APR_DAYS_DEFAULT);
  const OWNER_CYCLE = ['none','brad','mim','shared'];
  const cycleCustody = (d) => {
    setCustodyDays(prev => prev.map(day => {
      if (day.d !== d) return day;
      const idx = OWNER_CYCLE.indexOf(day.owner);
      return { ...day, owner: OWNER_CYCLE[(idx + 1) % OWNER_CYCLE.length] };
    }));
  };
  const bradDays = custodyDays.filter(d=>d.owner==='brad').length;
  const mimDays = custodyDays.filter(d=>d.owner==='mim').length;
  const splitDays = custodyDays.filter(d=>d.owner==='shared').length;
  const [legendLabels, setLegendLabels] = useLocalStorage('lifeos_custody_labels', {
    brad: 'With Brad', mim: "With Mim", shared: 'Split (1 kid each)'
  });
  const [editingLabel, setEditingLabel] = useState(null);
  const [labelDraft, setLabelDraft] = useState('');

  // Other-parent editable name (Bug 3)
  const [otherParentName, setOtherParentName] = useLocalStorage('lifeos_otherParentName', 'Other Parent');
  const [editingParentName, setEditingParentName] = useState(false);
  const [parentNameDraft, setParentNameDraft] = useState('');

  const saveLabel = () => {
    if (editingLabel && labelDraft.trim()) setLegendLabels(prev=>({...prev,[editingLabel]:labelDraft.trim()}));
    setEditingLabel(null); setLabelDraft('');
  };

  const saveParentName = () => {
    if (parentNameDraft.trim()) setOtherParentName(parentNameDraft.trim());
    setEditingParentName(false); setParentNameDraft('');
  };

  const submitAddEvt = () => {
    if (!addForm.title || !addForm.date) return;
    onAddEvent && onAddEvent({ id:Date.now(), title:addForm.title, date:addForm.date, time:addForm.time||'', owner:addForm.who, icon:'📅' });
    setAddForm({ title:'', date:'', time:'', who:'brad' });
    setShowAddEvt(false);
  };

  // Week view helpers — show week containing today (Apr 1 default)
  const weekAnchor = new Date(2026, 3, today || 1);
  const weekDow = weekAnchor.getDay();
  const weekStart = new Date(weekAnchor); weekStart.setDate(weekAnchor.getDate() - weekDow);
  const weekDays = Array.from({length:7}, (_, i) => {
    const d = new Date(weekStart); d.setDate(weekStart.getDate() + i);
    return d;
  });

  return (
    <div style={{ display:'grid', gridTemplateColumns: mobile ? '1fr' : '1fr 1fr', gap:'24px' }}>

      {/* Calendar */}
      <div style={{ background:'white', borderRadius:'20px', padding:'26px',
        boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'22px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
            <h3 style={{ fontSize:'16px', fontWeight:'700', color:'#0F172A' }}>{displayMonth} {displayYear}</h3>
            {/* Other parent name with pencil edit (Bug 3) */}
            <div style={{ display:'flex', alignItems:'center', gap:'4px', fontSize:'12px', color:'#94A3B8' }}>
              {editingParentName
                ? <input autoFocus value={parentNameDraft}
                    onChange={e=>setParentNameDraft(e.target.value)}
                    onBlur={saveParentName}
                    onKeyDown={e=>e.key==='Enter'&&saveParentName()}
                    style={{ fontSize:'12px', border:'none', borderBottom:'1px solid #6366F1',
                      outline:'none', width:'110px', background:'transparent', fontFamily:'Inter,sans-serif', color:'#374151' }}/>
                : <span style={{ fontSize:'11px', color:'#94A3B8' }}>vs {otherParentName}</span>
              }
              <button onClick={()=>{setEditingParentName(true);setParentNameDraft(otherParentName);}}
                title="Edit other parent's name"
                style={{ background:'none', border:'none', cursor:'pointer', padding:'2px', lineHeight:1, fontSize:'13px', color:'#CBD5E1' }}>✏️</button>
            </div>
          </div>
          <div style={{ display:'flex', gap:'6px', alignItems:'center' }}>
            {/* Weekly / Monthly view toggle (Bug 2) */}
            <div style={{ display:'flex', background:'#F1F5F9', borderRadius:'8px', padding:'2px' }}>
              {[{id:'month',label:'Month'},{id:'week',label:'Week'}].map(v => (
                <button key={v.id} onClick={()=>setCalView(v.id)} style={{
                  padding:'4px 10px', borderRadius:'6px', border:'none', cursor:'pointer',
                  fontSize:'11px', fontWeight:'600',
                  background: calView===v.id ? 'white' : 'transparent',
                  color:       calView===v.id ? '#0F172A' : '#94A3B8',
                  boxShadow:   calView===v.id ? '0 1px 3px rgba(0,0,0,.08)' : 'none',
                }}>{v.label}</button>
              ))}
            </div>
            <button onClick={()=>{setMonthOffset(o=>o-1);setSel(null);}} style={{ width:'30px', height:'30px', borderRadius:'8px', border:'1px solid #E2E8F0', background:'white', cursor:'pointer', fontSize:'14px' }}>‹</button>
            <button onClick={()=>{setMonthOffset(o=>o+1);setSel(null);}} style={{ width:'30px', height:'30px', borderRadius:'8px', border:'1px solid #E2E8F0', background:'white', cursor:'pointer', fontSize:'14px' }}>›</button>
          </div>
        </div>

        {/* DOW headers */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:'4px', marginBottom:'8px' }}>
          {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => (
            <div key={d} style={{ textAlign:'center', fontSize:'11px', fontWeight:'700', color:'#CBD5E1', padding:'4px 0' }}>{d}</div>
          ))}
        </div>

        {/* Month view */}
        {calView === 'month' && (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:'4px' }}>
            {monthOffset === 0 ? (
              <>
                {[...Array(APR_START_DOW)].map((_,i) => <div key={`e${i}`} className="cal-day empty"/>)}
                {custodyDays.map(({ d, owner }) => (
                  <div key={d} className={`cal-day ${owner} ${d===today?'today':''}`}
                    onClick={() => cycleCustody(d)}
                    title="Click to change custody"
                    style={{ border: sel===d ? '2px solid #6366F1' : '2px solid transparent', cursor:'pointer' }}>
                    {d}
                  </div>
                ))}
              </>
            ) : (
              Array.from({length:30},(_,i)=>(
                <div key={i+1} className="cal-day none" style={{ border:'2px solid transparent', opacity:.6 }}>{i+1}</div>
              ))
            )}
          </div>
        )}

        {/* Week view (Bug 2) */}
        {calView === 'week' && (
          <div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:'4px' }}>
              {weekDays.map((d, i) => {
                const dayNum = d.getDate();
                const isApr = d.getMonth() === 3 && d.getFullYear() === 2026;
                const owner = isApr ? (custodyDays.find(x => x.d === dayNum)?.owner || 'none') : 'none';
                const isToday = dayNum === today && isApr;
                return (
                  <div key={i}
                    className={`cal-day ${owner} ${isToday ? 'today' : ''}`}
                    onClick={() => isApr && cycleCustody(dayNum)}
                    title={isApr ? 'Click to change custody' : ''}
                    style={{ border: '2px solid transparent', cursor: isApr ? 'pointer' : 'default',
                      display:'flex', flexDirection:'column', gap:'2px', aspectRatio:'unset', padding:'8px 4px', minHeight:'52px' }}>
                    <span style={{ fontSize:'10px', fontWeight:'700', opacity:.6 }}>
                      {['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()]}
                    </span>
                    <span>{dayNum}</span>
                  </div>
                );
              })}
            </div>
            <p style={{ fontSize:'11px', color:'#94A3B8', marginTop:'10px', textAlign:'center' }}>
              Week of {weekDays[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})} — tap days to set custody
            </p>
          </div>
        )}

        {/* Custody summary */}
        <div style={{ display:'flex', gap:'12px', marginTop:'16px', padding:'12px 16px', background:'#F8FAFC', borderRadius:'12px', fontSize:'12px', flexWrap:'wrap' }}>
          <span style={{ color:'#1D4ED8', fontWeight:'700' }}>Brad: {bradDays}d</span>
          <span style={{ color:'#BE185D', fontWeight:'700' }}>{otherParentName}: {mimDays}d</span>
          <span style={{ color:'#7E22CE', fontWeight:'700' }}>Split: {splitDays}d</span>
          <span style={{ color:'#94A3B8' }}>Unset: {30-bradDays-mimDays-splitDays}d</span>
          <span style={{ color:'#94A3B8', marginLeft:'auto', fontSize:'11px' }}>tap days to set</span>
        </div>

        {/* Legend — editable labels */}
        <div style={{ display:'flex', gap:'10px', marginTop:'12px', paddingTop:'12px', borderTop:'1px solid #F8FAFC', flexWrap:'wrap', alignItems:'center' }}>
          {[
            { key:'brad',   bg:'#DBEAFE', border:'#BFDBFE' },
            { key:'mim',    bg:'#FCE7F3', border:'#FBCFE8' },
            { key:'shared', bg:'linear-gradient(135deg,#DBEAFE 50%,#FCE7F3 50%)', border:'#E9D5FF' },
          ].map((x) => (
            <div key={x.key} style={{ display:'flex', alignItems:'center', gap:'6px' }}>
              <div style={{ width:'13px', height:'13px', borderRadius:'4px', background:x.bg, border:`1px solid ${x.border}` }}/>
              {editingLabel === x.key
                ? <input autoFocus value={labelDraft} onChange={e=>setLabelDraft(e.target.value)}
                    onBlur={saveLabel} onKeyDown={e=>e.key==='Enter'&&saveLabel()}
                    style={{ fontSize:'11px', color:'#6366F1', border:'none', borderBottom:'1px solid #6366F1', outline:'none', width:'120px', background:'transparent', fontFamily:'Inter,sans-serif' }}/>
                : <span onClick={()=>{setEditingLabel(x.key);setLabelDraft(legendLabels[x.key]);}}
                    style={{ fontSize:'11px', color:'#64748B', cursor:'pointer', textDecoration:'underline dotted' }}
                    title="Click to rename">{legendLabels[x.key]}</span>
              }
            </div>
          ))}
          <span style={{ fontSize:'10px', color:'#CBD5E1', marginLeft:'4px' }}>tap labels to rename</span>
        </div>
      </div>

      {/* Upcoming */}
      <div style={{ background:'white', borderRadius:'20px', padding:'26px',
        boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px' }}>
          <h3 style={{ fontSize:'16px', fontWeight:'700', color:'#0F172A' }}>Upcoming Events</h3>
          <button onClick={()=>setShowAddEvt(v=>!v)} style={{ display:'flex', alignItems:'center', gap:'4px', background:'#F5F3FF', border:'none', borderRadius:'9px', padding:'6px 12px', color:'#7C3AED', fontWeight:'600', fontSize:'12px', cursor:'pointer' }}>
            <IcoPlus/> Add
          </button>
        </div>
        {showAddEvt && (
          <div className="fade-up" style={{ background:'#FAFAFA', borderRadius:'12px', padding:'14px', marginBottom:'14px', border:'1px solid #E2E8F0' }}>
            <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
              <input value={addForm.title} onChange={e=>setAddForm(f=>({...f,title:e.target.value}))} placeholder="Event title" style={{ padding:'8px 12px', borderRadius:'8px', border:'1px solid #E2E8F0', fontSize:'12px', fontFamily:'Inter,sans-serif', outline:'none' }}/>
              <div style={{ display:'flex', gap:'6px' }}>
                <input value={addForm.date} onChange={e=>setAddForm(f=>({...f,date:e.target.value}))} placeholder="Date (Apr 10)" style={{ flex:1, padding:'8px 12px', borderRadius:'8px', border:'1px solid #E2E8F0', fontSize:'12px', fontFamily:'Inter,sans-serif', outline:'none' }}/>
                <input value={addForm.time} onChange={e=>setAddForm(f=>({...f,time:e.target.value}))} placeholder="Time" style={{ flex:1, padding:'8px 12px', borderRadius:'8px', border:'1px solid #E2E8F0', fontSize:'12px', fontFamily:'Inter,sans-serif', outline:'none' }}/>
                <select value={addForm.who} onChange={e=>setAddForm(f=>({...f,who:e.target.value}))} style={{ flex:1, padding:'8px 12px', borderRadius:'8px', border:'1px solid #E2E8F0', fontSize:'12px', fontFamily:'Inter,sans-serif', outline:'none', cursor:'pointer' }}>
                  <option value="brad">You</option><option value="mim">Mim</option><option value="shared">Shared</option>
                </select>
              </div>
              <div style={{ display:'flex', gap:'6px' }}>
                <button onClick={()=>setShowAddEvt(false)} style={{ flex:1, padding:'7px', borderRadius:'8px', border:'1px solid #E2E8F0', background:'white', cursor:'pointer', fontSize:'12px', fontFamily:'Inter,sans-serif' }}>Cancel</button>
                <button onClick={submitAddEvt} style={{ flex:1, padding:'7px', borderRadius:'8px', border:'none', background:'#7C3AED', color:'white', cursor:'pointer', fontSize:'12px', fontWeight:'600', fontFamily:'Inter,sans-serif' }}>Save</button>
              </div>
            </div>
          </div>
        )}
        <div style={{ display:'flex', flexDirection:'column', gap:'10px' }}>
          {events.map(ev => (
            <div key={ev.id} style={{
              display:'flex', alignItems:'center', gap:'12px', padding:'12px 14px', borderRadius:'14px',
              background: ev.owner==='brad' ? '#EFF6FF' : ev.owner==='mim' ? '#FDF2F8' : '#F5F3FF',
              cursor:'pointer', transition:'filter .15s',
            }}
            onMouseEnter={e=>e.currentTarget.style.filter='brightness(.97)'}
            onMouseLeave={e=>e.currentTarget.style.filter='brightness(1)'}>
              <span style={{ fontSize:'20px' }}>{ev.icon}</span>
              <div style={{ flex:1 }}>
                <p style={{ fontSize:'13px', fontWeight:'600', color:'#0F172A' }}>{ev.title}</p>
                <p style={{ fontSize:'11px', color:'#64748B' }}>{ev.date} · {ev.time}</p>
              </div>
              <span style={{
                fontSize:'11px', fontWeight:'600', padding:'3px 10px', borderRadius:'100px',
                color:  ev.owner==='brad'?'#1D4ED8':ev.owner==='mim'?'#BE185D':'#6D28D9',
                background: ev.owner==='brad'?'#DBEAFE':ev.owner==='mim'?'#FCE7F3':'#EDE9FE',
              }}>
                {ev.owner==='brad'?'You':ev.owner==='mim'?otherParentName:'Shared'}
              </span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   CO-PARENTING — EXPENSES TAB
═══════════════════════════════════════ */
function TabExpenses() {
  const mobile = useIsMobile();
  const [expenses, setExpenses]   = useLocalStorage('lifeos_expenses', EXPENSES_SEED);
  const [showForm, setShowForm]   = useState(false);
  const [form, setForm]           = useState({ desc:'', amount:'', paidBy:'You' });

  const pending = expenses.filter(e=>e.status==='pending');
  const youOwed = pending.filter(e=>e.paidBy==='You').reduce((s,e)=>s+e.amount,0);
  const theyOwed= pending.filter(e=>e.paidBy==='Mim').reduce((s,e)=>s+e.amount,0);
  const balance = (youOwed - theyOwed) / 2;

  const addExpense = () => {
    if (!form.desc || !form.amount) return;
    setExpenses(prev => [...prev, {
      id: Date.now(), desc:form.desc, amount:parseFloat(form.amount),
      date:'Apr 1', paidBy:form.paidBy, status:'pending', emoji:'💵'
    }]);
    setForm({ desc:'', amount:'', paidBy:'You' });
    setShowForm(false);
  };

  return (
    <div style={{ display:'grid', gridTemplateColumns: mobile ? '1fr' : '1fr 300px', gap:'24px' }}>
      <div>
        {/* Balance hero */}
        <div style={{ background:'linear-gradient(135deg,#7C3AED,#6366F1)', borderRadius:'20px',
          padding:'28px 32px', marginBottom:'20px', color:'white' }}>
          <p style={{ fontSize:'13px', opacity:.75, marginBottom:'8px' }}>
            {balance>=0 ? '← Mim owes you' : '→ You owe Mim'}
          </p>
          <p style={{ fontSize:'44px', fontWeight:'800', letterSpacing:'-1px' }}>
            ${Math.abs(balance).toFixed(2)}
          </p>
          <p style={{ fontSize:'12px', opacity:.6, marginTop:'4px' }}>Based on unsettled expenses</p>
          <button onClick={() => setExpenses(prev => prev.map(e => ({...e, status:'settled'})))}
            style={{ marginTop:'20px', background:'rgba(255,255,255,.18)',
            border:'1.5px solid rgba(255,255,255,.3)', borderRadius:'10px',
            padding:'9px 18px', color:'white', cursor:'pointer', fontSize:'13px',
            fontWeight:'600', fontFamily:'Inter,sans-serif' }}>
            Mark all settled ✓
          </button>
        </div>

function TabMessages() {
  const mobile = useIsMobile();
  const [otherParentName] = useLocalStorage('lifeos_otherParentName', 'Other Parent');
  const [msgs, setMsgs]     = useState(MSGS_SEED);
  const [sel, setSel]       = useState(MSGS_SEED[0]);
  const [reply, setReply]   = useState('');
  const [thread, setThread] = useState(
    MSGS_SEED[0] ? [{ from: MSGS_SEED[0].from || 'Co-parent', text: MSGS_SEED[0].text, mine:false }] : []
  );

  const sendReply = () => {
    if (!reply.trim()) return;
    setThread(t => [...t, { from:'You', text:reply, mine:true }]);
    setReply('');
  };

  const selectMsg = (m) => {
    setSel(m);
    setMsgs(prev => prev.map(x => x.id===m.id ? {...x,read:true} : x));
    setThread([{ from:m.from, text:m.text, mine:false }]);
  };

  return (
    <div style={{ background:'white', borderRadius:'20px', overflow:'hidden',
      boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9',

          <p style={{ fontSize:'14px', fontWeight:'700', color:'#0F172A' }}>Co-parent Chat</p>
        </div>
        {msgs.map(m => (
          <div key={m.id} onClick={() => selectMsg(m)} style={{
            padding:'14px 18px', cursor:'pointer', borderBottom:'1px solid #FAFAFA',
            background: sel?.id===m.id ? '#F5F3FF' : 'transparent', transition:'background .15s',
          }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:'4px' }}>
              <span style={{ fontSize:'13px', fontWeight: m.read?'500':'700', color:'#0F172A' }}>{m.from}</span>
              <span style={{ fontSize:'10px', color:'#94A3B8' }}>{m.time}</span>
            </div>
            <p style={{ fontSize:'12px', color:'#64748B', overflow:'hidden', textOverflow:'ellipsis',
              whiteSpace:'nowrap', maxWidth:'190px', fontWeight:m.read?'400':'500' }}>
              {m.text}

            {!m.read && <div style={{ width:'6px', height:'6px', borderRadius:'50%', background:'#7C3AED', marginTop:'6px' }}/>}
          </div>
        ))}

      {/* Thread */}
      <div style={{ display:'flex', flexDirection:'column' }}>

          <>
            <div style={{ padding:'16px 22px', borderBottom:'1px solid #F1F5F9' }}>

              <p style={{ fontSize:'11px', color:'#94A3B8' }}>Co-parent · shared thread</p>
            </div>
            <div style={{ flex:1, padding:'20px 22px', overflowY:'auto', display:'flex', flexDirection:'column', gap:'12px' }}>
              {thread.map((msg, i) => (
                <div key={i} style={{ display:'flex', justifyContent: msg.mine ? 'flex-end' : 'flex-start' }}>
                  <div style={{
                    background: msg.mine ? 'linear-gradient(135deg,#6366F1,#7C3AED)' : '#F1F5F9',
                    color: msg.mine ? 'white' : '#0F172A',
                    borderRadius: msg.mine ? '18px 18px 4px 18px' : '18px 18px 18px 4px',
                    padding:'12px 16px', maxWidth:'78%', fontSize:'13px', lineHeight:'1.5',
                  }}>
                    {msg.text}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ padding:'14px 18px', borderTop:'1px solid #F1F5F9', display:'flex', gap:'10px' }}>
              <input value={reply} onChange={e=>setReply(e.target.value)}

  );
}

  const handleDocUpload = (kidName, docLabel, e) => {

      setUploadedDocs(prev => ({
        ...prev,
        [`${kidName}_${docLabel}`]: { name: file.name, type: file.type, data: ev.target.result, date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) }
      }));
    };

    e.target.value = '';

            <div style={{ background:'#EEF2FF', borderRadius:'14px', padding:'16px 20px', margin:'20px 0' }}>
              <p style={{ fontSize:'14px', fontWeight:'600', color:'#4F46E5', marginBottom:'4px' }}>

/* ═══════════════════════════════════════
   CO-PARENTING — LOCATION TAB
═══════════════════════════════════════ */
function TabLocation() {
  const mapRef        = useRef(null);
  const mapInst       = useRef(null);
  const markersRef    = useRef({});
  // Use shared GPS hook so this screen shows the same location as the dashboard (Bug 4)
  const sharedLoc     = useSharedLocation();
  const [locStatus,   setLocStatus]   = useState('loading');
  const [userLoc,     setUserLoc]     = useState(null);
  const [family,      setFamily]      = useState(FAMILY_LOCS_SEED);
  const [checkins,    setCheckins]    = useState(CHECKINS_SEED);
  const [reminders,   setReminders]   = useState(REMINDERS_SEED);
  const [panel,       setPanel]       = useState('checkins'); // 'checkins' | 'reminders'
  const [showCIForm,  setShowCIForm]  = useState(false);
  const [showRmForm,  setShowRmForm]  = useState(false);
  const [ciForm,      setCIForm]      = useState({ type:'dropoff', location:'', kids:[], notes:'' });
  const [rmForm,      setRmForm]      = useState({ title:'', location:'', trigger:'arrive' });

  // Geolocation — sync from shared hook so dashboard + this screen agree (Bug 4)
  useEffect(() => {
    if (sharedLoc) {
      const ul = { lat: sharedLoc.lat, lng: sharedLoc.lng };
      setUserLoc(ul);
      setFamily(prev => prev.map(f => f.id==='brad' ? {...f, lat:ul.lat, lng:ul.lng, status:'Current location'} : f));
      setLocStatus('granted');
    } else if (!navigator.geolocation) {
      setLocStatus('demo');
    } else {
      navigator.geolocation.getCurrentPosition(
        pos => {
          const ul = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          setUserLoc(ul);
          setFamily(prev => prev.map(f => f.id==='brad' ? {...f, lat:ul.lat, lng:ul.lng, status:'Current location'} : f));
          setLocStatus('granted');
        },
        () => setLocStatus('demo')
      );
    }
  }, [sharedLoc]);

  // Init map
  useEffect(() => {
    if (!mapRef.current || mapInst.current || !window.L) return;
    const center = userLoc ? [userLoc.lat, userLoc.lng] : [-38.1499, 144.3617];
    const map = window.L.map(mapRef.current, { zoomControl:true }).setView(center, 13);
    mapInst.current = map;

    window.L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution:'© <a href="https://openstreetmap.org">OSM</a> © <a href="https://carto.com">CARTO</a>',
      maxZoom:19,
    }).addTo(map);

    // Add family markers
    const locs = userLoc
      ? family.map(f => f.id==='brad' ? {...f, lat:userLoc.lat, lng:userLoc.lng} : f)
      : family;

    locs.forEach(f => {
      const isYou = f.id==='brad';
      const icon = window.L.divIcon({
        html: `<div style="position:relative;width:40px;height:40px;">
          ${isYou ? `<div class="loc-pulse" style="position:absolute;inset:4px;border-radius:50%;background:${f.color};opacity:.3;"></div>` : ''}
          <div style="position:absolute;inset:0;background:${f.color};color:white;border-radius:50%;
            display:flex;align-items:center;justify-content:center;font-size:18px;
            box-shadow:0 2px 8px rgba(0,0,0,.25);border:2px solid white;">${f.emoji}</div>
        </div>`,
        className:'', iconSize:[40,40], iconAnchor:[20,20],
      });
      const marker = window.L.marker([f.lat, f.lng], { icon })
        .addTo(map)
        .bindPopup(`<div style="font-weight:700;font-size:14px;margin-bottom:4px;">${f.name}</div>
          <div style="color:#64748B;font-size:12px;">${f.status}</div>
          <div style="color:#94A3B8;font-size:11px;margin-top:4px;">Last seen: ${f.lastSeen}</div>`);
      markersRef.current[f.id] = marker;
    });

    // School marker
    window.L.marker([37.7694, -122.4534], {
      icon: window.L.divIcon({
        html:`<div style="background:#F59E0B;color:white;border-radius:8px;padding:4px 8px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.2);">🏫 School</div>`,
        className:'', iconAnchor:[32,16],
      })
    }).addTo(map).bindPopup('<b>Lincoln Elementary School</b><br/>450 E 10th St');

    return () => { if(mapInst.current){mapInst.current.remove();mapInst.current=null;} };
  }, [locStatus]);

  const flyTo = (lat, lng) => {
    if (mapInst.current) mapInst.current.flyTo([lat, lng], 15, { animate:true, duration:1 });
  };

  const logCheckin = () => {
    if (!ciForm.location) return;
    const now = new Date();
    setCheckins(prev => [{
      id: Date.now(),
      type: ciForm.type,
      who: ciForm.type==='dropoff' ? 'You → Mim' : 'Mim → You',
      location: ciForm.location,
      address: ciForm.location,
      lat: -38.1499, lng: 144.3617,
      date: 'Apr 1',
      time: now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}),

            padding:'10px 16px', fontSize:'12px', color:'#92400E', display:'flex', alignItems:'center', gap:'8px' }}>

          boxShadow:'0 4px 20px rgba(0,0,0,.1)', overflow:'hidden', border:'1px solid #E2E8F0' }}/>

        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'12px' }}>

              <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'8px' }}>
                <div style={{ width:'32px', height:'32px', borderRadius:'50%', background:f.color+'22',
                  display:'flex', alignItems:'center', justifyContent:'center', fontSize:'16px',
                  border:`2px solid ${f.color}44` }}>{f.emoji}</div>
                <div>
                  <p style={{ fontSize:'12px', fontWeight:'700', color:'#0F172A' }}>{f.name}</p>
                  <div style={{ display:'flex', alignItems:'center', gap:'4px' }}>

                </div>
              </div>

              color:       panel===p.id ? '#0F172A' : '#64748B',
              fontWeight:  panel===p.id ? '700' : '400',
              boxShadow:   panel===p.id ? '0 1px 3px rgba(0,0,0,.08)' : 'none',

                <div style={{ display:'flex', gap:'6px', marginBottom:'10px' }}>

                    <button key={t} onClick={()=>setCIForm(f=>({...f,type:t}))} style={{
                      flex:1, padding:'7px', borderRadius:'8px', border:'none', cursor:'pointer',
                      background: ciForm.type===t ? '#7C3AED' : '#F1F5F9',
                      color:      ciForm.type===t ? 'white'   : '#64748B',

                <input value={ciForm.notes} onChange={e=>setCIForm(f=>({...f,notes:e.target.value}))}
                  placeholder="Notes (optional)" style={{...inputStyle, marginBottom:'10px'}} />
                <div style={{ display:'flex', gap:'7px' }}>
                  <button onClick={()=>setShowCIForm(false)} style={{ flex:1, padding:'8px', borderRadius:'8px',
                    border:'1px solid #E2E8F0', background:'white', cursor:'pointer', fontSize:'12px' }}>Cancel</button>
                  <button onClick={logCheckin} style={{ flex:1, padding:'8px', borderRadius:'8px',
                    border:'none', background:'#7C3AED', color:'white', cursor:'pointer',

            <div style={{ display:'flex', flexDirection:'column', gap:'10px' }}>

                    boxShadow:'0 1px 4px rgba(0,0,0,.05)', border:'1px solid #F1F5F9',
                    cursor:'pointer', transition:'all .15s' }}
                  onMouseEnter={e=>e.currentTarget.style.borderColor='#DDD6FE'}
                  onMouseLeave={e=>e.currentTarget.style.borderColor='#F1F5F9'}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'6px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:'7px' }}>
                      <span style={{ fontSize:'16px' }}>{ci.type==='dropoff' ? '📤' : '📥'}</span>
                      <div>
                        <p style={{ fontSize:'13px', fontWeight:'700', color:'#0F172A' }}>{ci.who}</p>
                        <p style={{ fontSize:'11px', color:'#64748B' }}>{ci.date} · {ci.time}</p>
                      </div>
                    </div>
                    <div style={{
                      fontSize:'10px', fontWeight:'600', padding:'3px 8px', borderRadius:'100px',
                      background: ci.verified ? '#F0FDF4' : '#FFFBEB',
                      color:      ci.verified ? '#15803D' : '#92400E',
                      border: `1px solid ${ci.verified ? '#BBF7D0' : '#FDE68A'}`,
                    }}>
                      {ci.verified ? '✓ Confirmed' : '⏳ Pending'}
                    </div>
                  </div>
                  <div style={{ display:'flex', alignItems:'center', gap:'5px', marginBottom: ci.notes ? '6px' : 0 }}>
                    <span style={{ fontSize:'11px' }}>📍</span>
                    <p style={{ fontSize:'12px', color:'#64748B' }}>{ci.location}</p>
                  </div>
                  {ci.notes && (
                    <p style={{ fontSize:'11px', color:'#94A3B8', fontStyle:'italic', paddingLeft:'16px' }}>"{ci.notes}"</p>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── REMINDERS PANEL ── */}
        {panel==='reminders' && (
          <div style={{ flex:1 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'14px' }}>
              <div>
                <p style={{ fontSize:'14px', fontWeight:'700', color:'#0F172A' }}>Location Reminders</p>
                <p style={{ fontSize:'11px', color:'#94A3B8' }}>Trigger alerts when you arrive or leave</p>
              </div>
              <button onClick={()=>setShowRmForm(v=>!v)} style={{
                display:'flex', alignItems:'center', gap:'4px', background:'#F5F3FF',
                border:'none', borderRadius:'9px', padding:'7px 12px',
                color:'#7C3AED', fontWeight:'600', fontSize:'12px', cursor:'pointer' }}>
                <IcoPlus /> Add
              </button>
            </div>

            {showRmForm && (
              <div className="fade-up" style={{ background:'#FAFAFA', borderRadius:'14px',
                padding:'16px', marginBottom:'14px', border:'1px solid #E2E8F0' }}>
                <input value={rmForm.title} onChange={e=>setRmForm(f=>({...f,title:e.target.value}))}
                  placeholder="Reminder (e.g. Text Mim kids are safe)" style={{...inputStyle,marginBottom:'8px'}} />
                <input value={rmForm.location} onChange={e=>setRmForm(f=>({...f,location:e.target.value}))}
                  placeholder="Trigger location (e.g. School, Home)" style={{...inputStyle,marginBottom:'8px'}} />
                <div style={{ display:'flex', gap:'6px', marginBottom:'10px' }}>
                  {['arrive','leave'].map(t=>(
                    <button key={t} onClick={()=>setRmForm(f=>({...f,trigger:t}))} style={{
                      flex:1, padding:'7px', borderRadius:'8px', border:'none', cursor:'pointer',
                      background: rmForm.trigger===t ? '#7C3AED' : '#F1F5F9',
                      color:      rmForm.trigger===t ? 'white'   : '#64748B',
                      fontSize:'12px', fontWeight:'600' }}>
                      {t==='arrive' ? '🛬 On Arrive' : '🛫 On Leave'}
                    </button>
                  ))}
                </div>
                <div style={{ display:'flex', gap:'7px' }}>
                  <button onClick={()=>setShowRmForm(false)} style={{ flex:1, padding:'8px', borderRadius:'8px',
                    border:'1px solid #E2E8F0', background:'white', cursor:'pointer', fontSize:'12px' }}>Cancel</button>
                  <button onClick={addReminder} style={{ flex:1, padding:'8px', borderRadius:'8px',
                    border:'none', background:'#7C3AED', color:'white', cursor:'pointer',
                    fontSize:'12px', fontWeight:'600' }}>Save</button>
                </div>
              </div>
            )}

            <div style={{ display:'flex', flexDirection:'column', gap:'10px' }}>
              {reminders.map(r => (
                <div key={r.id} className="reminder-row" style={{
                  background:'white', borderRadius:'14px', padding:'14px 16px',
                  boxShadow:'0 1px 4px rgba(0,0,0,.05)', border:`1px solid ${r.active ? '#F1F5F9' : '#F8FAFC'}`,
                  opacity: r.active ? 1 : 0.55, transition:'all .2s' }}>
                  <div style={{ display:'flex', alignItems:'flex-start', gap:'10px' }}>
                    <div style={{ fontSize:'20px', marginTop:'1px' }}>{r.emoji}</div>
                    <div style={{ flex:1 }}>
                      <p style={{ fontSize:'13px', fontWeight:'600', color:'#0F172A', marginBottom:'4px' }}>{r.title}</p>
                      <div style={{ display:'flex', alignItems:'center', gap:'5px' }}>
                        <span style={{ fontSize:'10px', fontWeight:'600', padding:'2px 7px', borderRadius:'100px',
                          background: r.trigger==='arrive' ? '#EFF6FF' : '#FDF4FF',
                          color:      r.trigger==='arrive' ? '#2563EB' : '#9333EA' }}>
                          {r.trigger==='arrive' ? '🛬 On arrive' : '🛫 On leave'}
                        </span>
                        <span style={{ fontSize:'11px', color:'#64748B' }}>@ {r.location}</span>
                      </div>
                    </div>
                    {/* Toggle */}
                    <label className="toggle" style={{ flexShrink:0, marginTop:'2px' }}>
                      <input type="checkbox" checked={r.active} onChange={()=>toggleReminder(r.id)} />
                      <span className="toggle-slider" style={{
                        background: r.active ? '#7C3AED' : '#CBD5E1',
                        position:'absolute', inset:0, borderRadius:'24px', cursor:'pointer', transition:'.3s',
                      }}>
                        <span style={{
                          content:'', position:'absolute',
                          height:'18px', width:'18px',
                          left: r.active ? 'calc(100% - 21px)' : '3px',
                          bottom:'3px', background:'white', borderRadius:'50%', transition:'.3s',
                          boxShadow:'0 1px 3px rgba(0,0,0,.2)',
                        }}/>
                      </span>
                    </label>
                  </div>
                </div>
              ))}
            </div>

            <p style={{ fontSize:'11px', color:'#94A3B8', marginTop:'16px', textAlign:'center', lineHeight:'1.6' }}>
              🔔 Reminders fire when your device enters or exits<br/>the geofence around each saved location.
            </p>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   CO-PARENTING TRACKER (full page)
═══════════════════════════════════════ */
function CoParenting({ user, onBack }) {
  const mobile = useIsMobile();
  const [tab, setTab] = useState('schedule');
  const [showEventForm, setShowEventForm] = useState(false);
  const [eventForm, setEventForm] = useState({ title:'', date:'', time:'', who:'brad' });
  const [events, setEvents] = useLocalStorage('lifeos_cp_events', EVENTS_SEED);
  // Load other-parent name here so it's available for stats card and passed to children
  const [otherParentName] = useLocalStorage('lifeos_otherParentName', 'Other Parent');
  const TABS = [
    { id:'schedule', label:'Schedule' },
    { id:'expenses', label:'Expenses' },
    { id:'messages', label:'Messages' },
    { id:'kids',     label:'Kids' },
    { id:'location', label:'📍 Location' },
  ];

  const addEvent = () => {
    if (!eventForm.title || !eventForm.date) return;
    setEvents(prev=>[...prev,{id:Date.now(),title:eventForm.title,date:eventForm.date,time:eventForm.time||'',owner:eventForm.who,icon:'📅'}]);
    setEventForm({ title:'', date:'', time:'', who:'brad' });
    setShowEventForm(false);
  };

  const pending = EXPENSES_SEED.filter(e=>e.status==='pending');
  const youOwed  = pending.filter(e=>e.paidBy==='You').reduce((s,e)=>s+e.amount,0);
  const theyOwed = pending.filter(e=>e.paidBy==='Mim').reduce((s,e)=>s+e.amount,0);
  const balance  = (youOwed - theyOwed) / 2;

  return (
    <div className="fade-up" style={{ maxWidth:'1080px', margin:'0 auto', padding: mobile ? '0 0 40px' : '0 32px 60px' }}>

      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', gap:'12px', marginBottom:'24px', flexWrap:'wrap' }}>
        <button onClick={onBack} style={{
          display:'flex', alignItems:'center', gap:'6px', padding:'8px 14px',
          borderRadius:'10px', border:'1px solid #E2E8F0', background:'white',
          fontSize:'13px', fontWeight:'500', color:'#374151', cursor:'pointer' }}>
          <IcoBack /> Dashboard
        </button>
        <div style={{ flex:1 }}>
          <h1 style={{ fontSize: mobile ? '20px' : '26px', fontWeight:'800', color:'#0F172A', letterSpacing:'-.4px' }}>
            👨‍👧‍👦 Co-parenting
          </h1>
          {!mobile && <p style={{ fontSize:'13px', color:'#64748B' }}>Lilly & Skylah · Co-parenting with {otherParentName}</p>}
        </div>
        <button onClick={()=>setShowEventForm(v=>!v)} style={{
          display:'flex', alignItems:'center', gap:'6px',
          background:'linear-gradient(135deg,#7C3AED,#6366F1)', color:'white',
          border:'none', borderRadius:'11px', padding:'10px 18px',
          fontSize:'13px', fontWeight:'600', cursor:'pointer' }}>
          <IcoPlus /> {mobile ? 'Add' : 'Add Event'}
        </button>
      </div>

      {/* Add Event Form */}
      {showEventForm && (
        <div className="fade-up" style={{ background:'white', borderRadius:'16px', padding:'20px', marginBottom:'20px', border:'1px solid #DDD6FE', boxShadow:'0 4px 16px rgba(124,58,237,.08)' }}>
          <p style={{ fontSize:'14px', fontWeight:'700', color:'#0F172A', marginBottom:'14px' }}>➕ New Event</p>
          <div style={{ display:'grid', gridTemplateColumns: mobile ? '1fr' : '1fr 130px 100px auto', gap:'10px', marginBottom:'12px' }}>
            <input value={eventForm.title} onChange={e=>setEventForm(f=>({...f,title:e.target.value}))} placeholder="Event title" style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
            <input value={eventForm.date}  onChange={e=>setEventForm(f=>({...f,date:e.target.value}))}  placeholder="Date (Apr 10)" style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
            <input value={eventForm.time}  onChange={e=>setEventForm(f=>({...f,time:e.target.value}))}  placeholder="Time" style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
            <select value={eventForm.who} onChange={e=>setEventForm(f=>({...f,who:e.target.value}))} style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none',cursor:'pointer'}}>
              <option value="brad">You</option><option value="mim">Mim</option><option value="shared">Shared</option>
            </select>
          </div>
          <div style={{ display:'flex', gap:'8px' }}>
            <button onClick={()=>setShowEventForm(false)} style={{flex:1,padding:'9px',borderRadius:'9px',border:'1px solid #E2E8F0',background:'white',cursor:'pointer',fontSize:'13px',fontFamily:'Inter,sans-serif'}}>Cancel</button>
            <button onClick={addEvent} style={{flex:1,padding:'9px',borderRadius:'9px',border:'none',background:'#7C3AED',color:'white',cursor:'pointer',fontSize:'13px',fontWeight:'600',fontFamily:'Inter,sans-serif'}}>Add Event</button>
          </div>
        </div>
      )}

      {/* Stats */}
      <div style={{ display:'grid', gridTemplateColumns: mobile ? 'repeat(2,1fr)' : 'repeat(4,1fr)', gap: mobile ? '10px' : '16px', marginBottom:'24px' }}>
        {[
          { icon:'🔄', label:'Next exchange',    val:'Apr 5',          sub:'Saturday 10:00 AM',   c:'#7C3AED' },
          { icon:'📅', label:'Your custody',     val:'14 days',        sub:'This month',           c:'#2563EB' },
          { icon:'👧', label:'With Lilly & Skylah', val:'—',              sub:'Set custody calendar', c:'#DB2777' },
          { icon:'💰', label: balance>=0?`${otherParentName} owes`:'You owe', val:`$${Math.abs(balance).toFixed(0)}`, sub:'Pending expenses', c: balance>=0?'#059669':'#EF4444' },
        ].map((s,i) => (
          <div key={i} style={{ background:'white', borderRadius:'16px', padding: mobile ? '14px' : '20px',
            boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' }}>
            <div style={{ fontSize:'20px', marginBottom:'8px' }}>{s.icon}</div>
            <div style={{ fontSize: mobile ? '18px' : '22px', fontWeight:'800', color:s.c, letterSpacing:'-.4px' }}>{s.val}</div>
            <div style={{ fontSize:'12px', color:'#64748B', marginTop:'3px' }}>{s.label}</div>
            {!mobile && <div style={{ fontSize:'11px', color:'#94A3B8', marginTop:'2px' }}>{s.sub}</div>}
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{ display:'flex', gap:'4px', background:'#F1F5F9', padding:'4px',
        borderRadius:'14px', marginBottom:'22px', overflowX:'auto', WebkitOverflowScrolling:'touch' }}>
        {TABS.map(t => (
          <button key={t.id} className="tab-btn" onClick={() => setTab(t.id)} style={{
            padding: mobile ? '8px 14px' : '9px 22px', borderRadius:'10px',
            background: tab===t.id ? 'white' : 'transparent',
            color:       tab===t.id ? '#0F172A' : '#64748B',
            fontWeight:  tab===t.id ? '700' : '400',
            fontSize: mobile ? '13px' : '14px',
            boxShadow: tab===t.id ? '0 1px 4px rgba(0,0,0,.09)' : 'none',
            whiteSpace:'nowrap', flexShrink:0,
          }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Content */}
      {tab==='schedule' && <TabSchedule events={events} onAddEvent={ev=>setEvents(prev=>[...prev,ev])} />}
      {tab==='expenses' && <TabExpenses />}
      {tab==='messages' && <TabMessages />}
      {tab==='kids'     && <TabKids />}
      {tab==='location' && <TabLocation />}
    </div>
  );
}
