function ProjectsSection({ onBack }) {
  const mobile = useIsMobile();
  const [tab, setTab]         = useState('overview');
  const [projects, setProj]   = useLocalStorage('lifeos_projects', PROJECTS_SEED);
  const [invoices, setInv]    = useLocalStorage('lifeos_invoices', INVOICES_SEED);
  const [clients, setClients] = useLocalStorage('lifeos_clients', CLIENTS_SEED);
  const [selProj, setSelProj] = useState(null);
  const [showProjForm, setShowProjForm] = useState(false);
  const [showInvForm,  setShowInvForm]  = useState(false);
  const [showClientForm, setShowClientForm] = useState(false);
  const [projForm, setProjForm] = useState({ name:'', client:'', emoji:'🎯', value:'', due:'' });
  const [invForm,  setInvForm]  = useState({ client:'', amount:'', due:'' });
  const [clientForm, setClientForm] = useState({ name:'', contact:'', role:'', email:'', phone:'', emoji:'🏢' });
  const addClient = () => {
    if (!clientForm.name) return;
    setClients(prev => [...prev, {
      id: Date.now(), name: clientForm.name, contact: clientForm.contact || clientForm.name,
      role: clientForm.role || 'Client', email: clientForm.email || '', phone: clientForm.phone || '',
      emoji: clientForm.emoji || '🏢', color: '#2563EB',
      value: projects.filter(p => p.client === clientForm.name).reduce((s,p)=>s+(p.value||0),0),
      projects: projects.filter(p => p.client === clientForm.name).length,
      since: new Date().toLocaleDateString('en-US',{month:'short',year:'numeric'}),
    }]);
    setClientForm({ name:'', contact:'', role:'', email:'', phone:'', emoji:'🏢' });
    setShowClientForm(false);
  };
  const deleteClient = (id) => setClients(prev => prev.filter(c => c.id !== id));

  const addProject = () => {
    if (!projForm.name || !projForm.client) return;
    const newP = { id:Date.now(), name:projForm.name, client:projForm.client, emoji:projForm.emoji||'🎯',
      color:'#2563EB', value:parseFloat(projForm.value)||0, paid:0, status:'active',
      progress:0, due:projForm.due||'TBD', tasks:[] };
    setProj(prev => [...prev, newP]);
    setProjForm({ name:'', client:'', emoji:'🎯', value:'', due:'' });
    setShowProjForm(false); setTab('projects');
  };
  const addInvoice = () => {
    if (!invForm.client || !invForm.amount) return;
    const num = `INV-2026-${String(invoices.length+1).padStart(3,'0')}`;
    const today = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
    setInv(prev => [...prev, { id:Date.now(), num, client:invForm.client,
      amount:parseFloat(invForm.amount), issued:today, due:invForm.due||'TBD',
      status:'draft', emoji:'📄' }]);
    setInvForm({ client:'', amount:'', due:'' });
    setShowInvForm(false);
  };
  const TABS = [{id:'overview',label:'Overview'},{id:'projects',label:'Projects'},{id:'clients',label:'Clients'},{id:'invoices',label:'Invoices'}];
  const totalValue    = projects.reduce((s,p)=>s+p.value,0);
  const totalPaid     = projects.reduce((s,p)=>s+p.paid,0);
  const outstanding   = invoices.filter(i=>i.status==='pending'||i.status==='overdue').reduce((s,i)=>s+i.amount,0);
  const statusColor   = {active:'#2563EB',completed:'#059669',paused:'#F59E0B'};
  const invColor      = {paid:'#059669',pending:'#F59E0B',overdue:'#DC2626',draft:'#94A3B8'};
  const inp           = {padding:'9px 14px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',background:'white',fontFamily:'Inter,sans-serif',outline:'none'};
  const toggleTask    = (pid,ti) => setProj(prev=>prev.map(p=>p.id===pid?{...p,tasks:p.tasks.map((t,i)=>i===ti?{...t,done:!t.done}:t)}:p));

  return (
    <div className="fade-up" style={{maxWidth:'1100px',margin:'0 auto',padding: mobile ? '0 0 40px' : '0 32px 60px'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px',flexWrap:'wrap'}}>
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:'6px',padding:'8px 14px',borderRadius:'10px',border:'1px solid #E2E8F0',background:'white',fontSize:'13px',fontWeight:'500',color:'#374151',cursor:'pointer'}}><IcoBack/>Dashboard</button>
        <div style={{flex:1}}><h1 style={{fontSize: mobile ? '20px' : '26px',fontWeight:'800',color:'#0F172A',letterSpacing:'-.4px'}}>🎯 {mobile ? 'Projects' : 'Projects & Clients'}</h1>{!mobile && <p style={{fontSize:'13px',color:'#64748B'}}>{projects.filter(p=>p.status==='active').length} active projects · {clients.length} client{clients.length!==1?'s':''}</p>}</div>
        <button onClick={()=>setShowProjForm(v=>!v)} style={{display:'flex',alignItems:'center',gap:'6px',background:'linear-gradient(135deg,#2563EB,#6366F1)',color:'white',border:'none',borderRadius:'11px',padding:'10px 18px',fontSize:'13px',fontWeight:'600',cursor:'pointer'}}><IcoPlus/>{mobile ? 'New' : 'New Project'}</button>
      </div>
      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns: mobile ? 'repeat(2,1fr)' : 'repeat(4,1fr)',gap: mobile ? '10px' : '16px',marginBottom:'20px'}}>
        {[{icon:'💼',label:'Active projects',val:projects.filter(p=>p.status==='active').length,c:'#2563EB',sub:'In progress'},{icon:'💰',label:'Total value',val:`$${totalValue.toLocaleString()}`,c:'#059669',sub:'All projects'},{icon:'⏳',label:'Outstanding',val:`$${outstanding.toLocaleString()}`,c:'#F59E0B',sub:'Awaiting payment'},{icon:'✅',label:'Collected',val:`$${totalPaid.toLocaleString()}`,c:'#7C3AED',sub:'This year'}].map((s,i)=>(
          <div key={i} style={{background:'white',borderRadius:'16px',padding: mobile ? '14px' : '20px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #F1F5F9'}}>
            <div style={{fontSize:'20px',marginBottom:'8px'}}>{s.icon}</div>
            <div style={{fontSize: mobile ? '18px' : '22px',fontWeight:'800',color:s.c,letterSpacing:'-.4px'}}>{s.val}</div>
            <div style={{fontSize:'12px',color:'#64748B',marginTop:'3px'}}>{s.label}</div>
            {!mobile && <div style={{fontSize:'11px',color:'#94A3B8',marginTop:'2px'}}>{s.sub}</div>}
          </div>
        ))}
      </div>
      {/* New Project Form */}
      {showProjForm && (
        <div className="fade-up" style={{background:'white',borderRadius:'16px',padding:'20px',marginBottom:'16px',border:'1px solid #BFDBFE',boxShadow:'0 4px 16px rgba(37,99,235,.08)'}}>
          <p style={{fontSize:'14px',fontWeight:'700',color:'#0F172A',marginBottom:'14px'}}>➕ New Project</p>
          <div style={{display:'grid',gridTemplateColumns: mobile ? '1fr' : '1fr 1fr 80px 120px 100px',gap:'10px',marginBottom:'12px'}}>
            <input value={projForm.name}   onChange={e=>setProjForm(f=>({...f,name:e.target.value}))}   placeholder="Project name"  style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
            <input value={projForm.client} onChange={e=>setProjForm(f=>({...f,client:e.target.value}))} placeholder="Client"        style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
            <input value={projForm.emoji}  onChange={e=>setProjForm(f=>({...f,emoji:e.target.value}))}  placeholder="Emoji"         style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
            <input value={projForm.value}  onChange={e=>setProjForm(f=>({...f,value:e.target.value}))}  placeholder="Value ($)"      type="number" style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
            <input value={projForm.due}    onChange={e=>setProjForm(f=>({...f,due:e.target.value}))}    placeholder="Due date"       style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
          </div>
          <div style={{display:'flex',gap:'8px'}}>
            <button onClick={()=>setShowProjForm(false)} style={{flex:1,padding:'9px',borderRadius:'9px',border:'1px solid #E2E8F0',background:'white',cursor:'pointer',fontSize:'13px',fontFamily:'Inter,sans-serif'}}>Cancel</button>
            <button onClick={addProject}  style={{flex:1,padding:'9px',borderRadius:'9px',border:'none',background:'#2563EB',color:'white',cursor:'pointer',fontSize:'13px',fontWeight:'600',fontFamily:'Inter,sans-serif'}}>Create Project</button>
          </div>
        </div>
      )}
      {/* Tabs */}
      <div style={{display:'flex',gap:'4px',background:'#F1F5F9',padding:'4px',borderRadius:'14px',marginBottom:'22px',overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
        {TABS.map(t=><button key={t.id} className="tab-btn" onClick={()=>setTab(t.id)} style={{padding: mobile ? '8px 14px' : '9px 22px',borderRadius:'10px',background:tab===t.id?'white':'transparent',color:tab===t.id?'#0F172A':'#64748B',fontWeight:tab===t.id?'700':'400',fontSize: mobile ? '13px' : '14px',boxShadow:tab===t.id?'0 1px 4px rgba(0,0,0,.09)':'none',whiteSpace:'nowrap',flexShrink:0}}>{t.label}</button>)}
      </div>

      {/* ── OVERVIEW ── */}
      {tab==='overview' && (
        <div style={{display:'grid',gridTemplateColumns: mobile ? '1fr' : '1fr 1fr',gap:'24px'}}>
          <div style={{background:'white',borderRadius:'20px',padding:'26px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #F1F5F9'}}>
            <h3 style={{fontSize:'15px',fontWeight:'700',color:'#0F172A',marginBottom:'20px'}}>Active Projects</h3>
            {projects.filter(p=>p.status==='active').map(p=>(
              <div key={p.id} onClick={()=>{setSelProj(p);setTab('projects');}} style={{padding:'14px 0',borderBottom:'1px solid #F8FAFC',cursor:'pointer'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                    <div style={{width:'34px',height:'34px',borderRadius:'10px',background:p.color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',border:`1.5px solid ${p.color}33`}}>{p.emoji}</div>
                    <div><p style={{fontSize:'13px',fontWeight:'700',color:'#0F172A'}}>{p.name}</p><p style={{fontSize:'11px',color:'#94A3B8'}}>{p.client} · Due {p.due}</p></div>
                  </div>
                  <span style={{fontSize:'13px',fontWeight:'700',color:p.color}}>{p.progress}%</span>
                </div>
                <div style={{height:'6px',background:'#F1F5F9',borderRadius:'6px',overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${p.progress}%`,background:`linear-gradient(90deg,${p.color},${p.color}99)`,borderRadius:'6px',transition:'width .6s'}}/>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
            <div style={{background:'white',borderRadius:'20px',padding:'26px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #F1F5F9'}}>
              <h3 style={{fontSize:'15px',fontWeight:'700',color:'#0F172A',marginBottom:'16px'}}>Recent Invoices</h3>
              {invoices.slice(0,4).map(inv=>(
                <div key={inv.id} style={{display:'flex',alignItems:'center',gap:'12px',padding:'10px 0',borderBottom:'1px solid #F8FAFC'}}>
                  <span style={{fontSize:'18px'}}>{inv.emoji}</span>
                  <div style={{flex:1}}><p style={{fontSize:'13px',fontWeight:'600',color:'#0F172A'}}>{inv.num}</p><p style={{fontSize:'11px',color:'#94A3B8'}}>{inv.client} · Due {inv.due}</p></div>
                  <div style={{textAlign:'right'}}><p style={{fontSize:'13px',fontWeight:'700',color:'#0F172A'}}>${inv.amount.toLocaleString()}</p>
                    <span style={{fontSize:'10px',fontWeight:'600',padding:'2px 8px',borderRadius:'100px',background:invColor[inv.status]+'18',color:invColor[inv.status]}}>{inv.status}</span>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:'linear-gradient(135deg,#2563EB,#6366F1)',borderRadius:'20px',padding:'22px',color:'white'}}>
              <p style={{fontSize:'12px',opacity:.75,marginBottom:'6px'}}>Pipeline value</p>
              <p style={{fontSize:'36px',fontWeight:'800',letterSpacing:'-.5px'}}>${(totalValue-totalPaid).toLocaleString()}</p>
              <p style={{fontSize:'11px',opacity:.65,marginTop:'4px'}}>Across {projects.filter(p=>p.status==='active').length} active projects</p>
            </div>
          </div>
        </div>
      )}

      {/* ── PROJECTS ── */}
      {tab==='projects' && (
        <div style={{display:'grid',gridTemplateColumns: selProj && !mobile ? '1fr 320px' : '1fr',gap:'24px'}}>
          <div style={{display:'grid',gridTemplateColumns: mobile ? '1fr' : 'repeat(2,1fr)',gap:'16px',alignContent:'start'}}>
            {projects.map(p=>(
              <div key={p.id} onClick={()=>setSelProj(selProj?.id===p.id?null:p)} style={{background:'white',borderRadius:'20px',padding:'22px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:`1.5px solid ${selProj?.id===p.id?p.color:'#F1F5F9'}`,cursor:'pointer',transition:'all .2s'}}
                onMouseEnter={e=>{if(selProj?.id!==p.id)e.currentTarget.style.borderColor=p.color+'55'}}
                onMouseLeave={e=>{if(selProj?.id!==p.id)e.currentTarget.style.borderColor='#F1F5F9'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'16px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                    <div style={{width:'40px',height:'40px',borderRadius:'12px',background:p.color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',border:`1.5px solid ${p.color}33`}}>{p.emoji}</div>
                    <div><p style={{fontSize:'14px',fontWeight:'700',color:'#0F172A'}}>{p.name}</p><p style={{fontSize:'11px',color:'#64748B'}}>{p.client}</p></div>
                  </div>
                  <span style={{fontSize:'11px',fontWeight:'600',padding:'3px 10px',borderRadius:'100px',background:statusColor[p.status]+'18',color:statusColor[p.status]}}>{p.status}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'8px'}}>
                  <span style={{fontSize:'12px',color:'#64748B'}}>Due {p.due}</span>
                  <span style={{fontSize:'13px',fontWeight:'800',color:p.color}}>{p.progress}%</span>
                </div>
                <div style={{height:'6px',background:'#F1F5F9',borderRadius:'6px',overflow:'hidden'}}>
                  <div style={{height:'100%',width:`${p.progress}%`,background:p.color,borderRadius:'6px'}}/>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',marginTop:'14px'}}>
                  <span style={{fontSize:'12px',color:'#94A3B8'}}>{p.tasks.filter(t=>t.done).length}/{p.tasks.length} tasks</span>
                  <span style={{fontSize:'13px',fontWeight:'700',color:'#059669'}}>${p.value.toLocaleString()}</span>
                </div>
              </div>
            ))}
          </div>
          {selProj && (
            <div className="fade-in" style={{background:'white',borderRadius:'20px',padding:'24px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #F1F5F9',height:'fit-content',position:'sticky',top:'20px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'}}>
                <h3 style={{fontSize:'15px',fontWeight:'700',color:'#0F172A'}}>{selProj.emoji} {selProj.name}</h3>
                <button onClick={()=>setSelProj(null)} style={{background:'none',border:'none',fontSize:'18px',color:'#94A3B8',cursor:'pointer'}}>×</button>
              </div>
              <p style={{fontSize:'12px',fontWeight:'700',color:'#94A3B8',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'12px'}}>Tasks</p>
              {selProj.tasks.map((t,i)=>(
                <div key={i} onClick={()=>toggleTask(selProj.id,i)} style={{display:'flex',alignItems:'center',gap:'10px',padding:'9px 0',borderBottom:'1px solid #F8FAFC',cursor:'pointer'}}>
                  <div style={{width:'18px',height:'18px',borderRadius:'5px',border:`2px solid ${t.done?selProj.color:'#CBD5E1'}`,background:t.done?selProj.color:'white',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .15s'}}>
                    {t.done && <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" strokeWidth="2" strokeLinecap="round"/></svg>}
                  </div>
                  <span style={{fontSize:'13px',color:t.done?'#94A3B8':'#374151',textDecoration:t.done?'line-through':'none'}}>{t.t}</span>
                </div>
              ))}
              <div style={{marginTop:'18px',padding:'14px',background:'#F8FAFC',borderRadius:'12px'}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:'6px'}}>
                  <span style={{fontSize:'12px',color:'#64748B'}}>Project value</span>
                  <span style={{fontSize:'13px',fontWeight:'700',color:'#059669'}}>${selProj.value.toLocaleString()}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{fontSize:'12px',color:'#64748B'}}>Collected</span>
                  <span style={{fontSize:'13px',fontWeight:'700',color:'#0F172A'}}>${selProj.paid.toLocaleString()}</span>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── CLIENTS ── */}
      {tab==='clients' && (
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'18px'}}>
            <div>
              <h3 style={{fontSize:'16px',fontWeight:'800',color:'#0F172A'}}>Clients</h3>
              <p style={{fontSize:'12px',color:'#64748B'}}>{clients.length} client{clients.length!==1?'s':''} · {projects.length} project{projects.length!==1?'s':''} linked</p>
            </div>
            <button onClick={()=>setShowClientForm(v=>!v)} style={{display:'flex',alignItems:'center',gap:'5px',background:'linear-gradient(135deg,#2563EB,#6366F1)',color:'white',border:'none',borderRadius:'10px',padding:'9px 16px',fontSize:'13px',fontWeight:'600',cursor:'pointer'}}><IcoPlus/>Add Client</button>
          </div>

          {showClientForm && (
            <div className="fade-up" style={{background:'white',borderRadius:'16px',padding:'18px',marginBottom:'18px',border:'1px solid #BFDBFE'}}>
              <div style={{display:'grid',gridTemplateColumns: mobile ? '1fr' : '1fr 1fr 1fr',gap:'10px',marginBottom:'10px'}}>
                <input value={clientForm.name}    onChange={e=>setClientForm(f=>({...f,name:e.target.value}))}    placeholder="Client name *" style={inp}/>
                <input value={clientForm.contact} onChange={e=>setClientForm(f=>({...f,contact:e.target.value}))} placeholder="Main contact"  style={inp}/>
                <input value={clientForm.role}    onChange={e=>setClientForm(f=>({...f,role:e.target.value}))}    placeholder="Role / title"  style={inp}/>
                <input value={clientForm.email}   onChange={e=>setClientForm(f=>({...f,email:e.target.value}))}   placeholder="Email"         style={inp}/>
                <input value={clientForm.phone}   onChange={e=>setClientForm(f=>({...f,phone:e.target.value}))}   placeholder="Phone"         style={inp}/>
                <input value={clientForm.emoji}   onChange={e=>setClientForm(f=>({...f,emoji:e.target.value}))}   placeholder="Emoji (🏢)"    style={inp}/>
              </div>
              <div style={{display:'flex',gap:'8px'}}>
                <button onClick={()=>setShowClientForm(false)} style={{flex:1,padding:'9px',borderRadius:'9px',border:'1px solid #E2E8F0',background:'white',cursor:'pointer',fontSize:'13px'}}>Cancel</button>
                <button onClick={addClient} style={{flex:1,padding:'9px',borderRadius:'9px',border:'none',background:'#2563EB',color:'white',cursor:'pointer',fontSize:'13px',fontWeight:'600'}}>Save Client</button>
              </div>
            </div>
          )}

          {clients.length === 0 ? (
            <div style={{background:'white',borderRadius:'20px',padding:'48px 24px',border:'1px solid #F1F5F9',boxShadow:'0 1px 4px rgba(0,0,0,.06)',textAlign:'center'}}>
              <div style={{fontSize:'48px',marginBottom:'12px'}}>🏢</div>
              <h3 style={{fontSize:'16px',fontWeight:'700',color:'#0F172A',marginBottom:'6px'}}>No clients yet</h3>
              <p style={{fontSize:'13px',color:'#64748B',maxWidth:'340px',margin:'0 auto 18px'}}>Add a client to group your projects and track invoices against them.</p>
              <button onClick={()=>setShowClientForm(true)} style={{display:'inline-flex',alignItems:'center',gap:'6px',background:'#EFF6FF',color:'#2563EB',border:'1px solid #BFDBFE',borderRadius:'10px',padding:'10px 18px',fontSize:'13px',fontWeight:'600',cursor:'pointer'}}><IcoPlus/>Add your first client</button>
            </div>
          ) : (
            <div style={{display:'grid',gridTemplateColumns: mobile ? '1fr' : 'repeat(2,1fr)',gap:'20px'}}>
              {clients.map(c=>{
                const clientProjects = projects.filter(p => p.client === c.name);
                const totalValue = clientProjects.reduce((s,p)=>s+(p.value||0),0);
                return (
                  <div key={c.id} style={{background:'white',borderRadius:'20px',padding:'24px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #F1F5F9',transition:'all .2s',position:'relative'}}>
                    <button onClick={()=>deleteClient(c.id)} title="Remove client" style={{position:'absolute',top:'14px',right:'14px',background:'none',border:'none',color:'#CBD5E1',cursor:'pointer',fontSize:'18px',lineHeight:1}}>×</button>
                    <div style={{display:'flex',alignItems:'center',gap:'14px',marginBottom:'18px'}}>
                      <div style={{width:'52px',height:'52px',borderRadius:'16px',background:(c.color||'#2563EB')+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'26px',border:`2px solid ${(c.color||'#2563EB')}33`}}>{c.emoji||'🏢'}</div>
                      <div><p style={{fontSize:'17px',fontWeight:'800',color:'#0F172A'}}>{c.name}</p><p style={{fontSize:'12px',color:'#64748B'}}>{c.contact||c.name}{c.role?` · ${c.role}`:''}</p></div>
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'16px'}}>
                      {[{l:'Total value',v:`$${totalValue.toLocaleString()}`,col:c.color||'#2563EB'},{l:'Projects',v:clientProjects.length,col:'#374151'},{l:'Client since',v:c.since||'—',col:'#374151'},{l:'Email',v:c.email?c.email.split('@')[0]+'…':'—',col:'#2563EB'}].map((x,i)=>(
                        <div key={i} style={{background:'#F8FAFC',borderRadius:'10px',padding:'10px 12px'}}>
                          <p style={{fontSize:'11px',color:'#94A3B8',marginBottom:'3px'}}>{x.l}</p>
                          <p style={{fontSize:'13px',fontWeight:'700',color:x.col}}>{x.v}</p>
                        </div>
                      ))}
                    </div>
                    <div style={{display:'flex',gap:'8px'}}>
                      {c.email && <a href={`mailto:${c.email}`} style={{flex:1,padding:'8px',borderRadius:'9px',background:(c.color||'#2563EB')+'18',color:c.color||'#2563EB',border:`1px solid ${(c.color||'#2563EB')}33`,fontSize:'12px',fontWeight:'600',textAlign:'center',textDecoration:'none'}}>✉️ Email</a>}
                      {c.phone && <a href={`tel:${c.phone}`} style={{flex:1,padding:'8px',borderRadius:'9px',background:'#F1F5F9',color:'#374151',border:'1px solid #E2E8F0',fontSize:'12px',fontWeight:'600',textAlign:'center',textDecoration:'none'}}>📞 Call</a>}
                      {!c.email && !c.phone && <div style={{flex:1,padding:'8px',borderRadius:'9px',background:'#F8FAFC',color:'#94A3B8',border:'1px dashed #E2E8F0',fontSize:'11px',fontWeight:'500',textAlign:'center'}}>No contact info on file</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ── INVOICES ── */}
      {tab==='invoices' && (
        <div style={{display:'grid',gridTemplateColumns: mobile ? '1fr' : '1fr 280px',gap:'24px'}}>
          <div style={{background:'white',borderRadius:'20px',overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #F1F5F9'}}>
            <div style={{padding:'18px 22px',borderBottom:'1px solid #F1F5F9',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <h3 style={{fontSize:'15px',fontWeight:'700',color:'#0F172A'}}>All Invoices</h3>
              <button onClick={()=>setShowInvForm(v=>!v)} style={{display:'flex',alignItems:'center',gap:'5px',background:'#EFF6FF',border:'none',borderRadius:'9px',padding:'7px 14px',color:'#2563EB',fontWeight:'600',fontSize:'12px',cursor:'pointer'}}><IcoPlus/>New Invoice</button>
            </div>
            {showInvForm && (
              <div style={{padding:'16px 22px',borderBottom:'1px solid #F1F5F9',background:'#F8FAFC'}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 100px 110px',gap:'8px',marginBottom:'10px'}}>
                  <input value={invForm.client} onChange={e=>setInvForm(f=>({...f,client:e.target.value}))} placeholder="Client name" style={{padding:'8px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
                  <input value={invForm.amount} onChange={e=>setInvForm(f=>({...f,amount:e.target.value}))} placeholder="Amount"      type="number" style={{padding:'8px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
                  <input value={invForm.due}    onChange={e=>setInvForm(f=>({...f,due:e.target.value}))}    placeholder="Due date"    style={{padding:'8px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
                </div>
                <div style={{display:'flex',gap:'8px'}}>
                  <button onClick={()=>setShowInvForm(false)} style={{flex:1,padding:'8px',borderRadius:'9px',border:'1px solid #E2E8F0',background:'white',cursor:'pointer',fontSize:'12px',fontFamily:'Inter,sans-serif'}}>Cancel</button>
                  <button onClick={addInvoice} style={{flex:1,padding:'8px',borderRadius:'9px',border:'none',background:'#2563EB',color:'white',cursor:'pointer',fontSize:'12px',fontWeight:'600',fontFamily:'Inter,sans-serif'}}>Create Invoice</button>
                </div>
              </div>
            )}
            {invoices.map((inv,i)=>(
              <div key={inv.id} className="exp-row" style={{display:'flex',alignItems:'center',gap:'14px',padding:'14px 22px',borderBottom:i<invoices.length-1?'1px solid #F8FAFC':'none',transition:'background .15s'}}>
                <span style={{fontSize:'20px'}}>{inv.emoji}</span>
                <div style={{flex:1}}>
                  <p style={{fontSize:'13px',fontWeight:'700',color:'#0F172A'}}>{inv.num}</p>
                  <p style={{fontSize:'11px',color:'#94A3B8'}}>{inv.client} · Issued {inv.issued} · Due {inv.due}</p>
                </div>
                <div style={{textAlign:'right'}}>
                  <p style={{fontSize:'15px',fontWeight:'800',color:'#0F172A'}}>${inv.amount.toLocaleString()}</p>
                  <span style={{fontSize:'10px',fontWeight:'700',padding:'2px 9px',borderRadius:'100px',background:invColor[inv.status]+'18',color:invColor[inv.status],border:`1px solid ${invColor[inv.status]}33`}}>{inv.status.toUpperCase()}</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
            {[{label:'Paid',      color:'#059669', ids:['paid']   },{label:'Pending', color:'#F59E0B', ids:['pending']},{label:'Overdue', color:'#DC2626', ids:['overdue']},{label:'Draft',   color:'#94A3B8', ids:['draft']  }].map(s=>{
              const total=invoices.filter(i=>s.ids.includes(i.status)).reduce((sum,i)=>sum+i.amount,0);
              return(
                <div key={s.label} style={{background:'white',borderRadius:'16px',padding:'18px 20px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #F1F5F9',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div><p style={{fontSize:'12px',color:'#64748B'}}>{s.label}</p><p style={{fontSize:'20px',fontWeight:'800',color:s.color,letterSpacing:'-.3px'}}>${total.toLocaleString()}</p></div>
                  <div style={{width:'40px',height:'40px',borderRadius:'12px',background:s.color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px'}}>
                    {s.label==='Paid'?'✅':s.label==='Pending'?'⏳':s.label==='Overdue'?'⚠️':'📝'}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   CALENDAR
═══════════════════════════════════════ */
function CalendarSection({ onBack }) {
  const mobile = useIsMobile();
  const [view,    setView]   = useState('month');
  const [selDay,  setSelDay] = useState((() => { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; })());
  const [selEvt,  setSelEvt] = useState(null);
  const [calEvents, setCalEvents] = useLocalStorage('lifeos_cal_events', CAL_EVENTS);
  const [showForm, setShowForm] = useState(false);
  const [evtForm, setEvtForm] = useState({ title:'', date:'', time:'', end:'', type:'personal' });
  const TYPE_COLOR = {work:'#2563EB',kids:'#F59E0B',personal:'#7C3AED',health:'#DC2626'};
  const typeColors = {work:'#2563EB',kids:'#F59E0B',personal:'#7C3AED',health:'#DC2626'};
  const dayEvents = (d) => calEvents.filter(e=>e.date===d);
  const selEvents = dayEvents(selDay);
  const upcoming  = [...calEvents].sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).filter(e=>e.date>='2026-04-01').slice(0,6);

  const addCalEvent = () => {
    if (!evtForm.title || !evtForm.date) return;
    setCalEvents(prev=>[...prev,{id:Date.now(),title:evtForm.title,date:evtForm.date,time:evtForm.time||'',end:evtForm.end||'',color:typeColors[evtForm.type]||'#7C3AED',type:evtForm.type}]);
    setEvtForm({ title:'', date:'', time:'', end:'', type:'personal' });
    setShowForm(false);
  };

  return (
    <div className="fade-up" style={{maxWidth:'1100px',margin:'0 auto',padding: mobile ? '0 0 40px' : '0 32px 60px'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px',flexWrap:'wrap'}}>
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:'6px',padding:'8px 14px',borderRadius:'10px',border:'1px solid #E2E8F0',background:'white',fontSize:'13px',fontWeight:'500',color:'#374151',cursor:'pointer'}}><IcoBack/>Dashboard</button>
        <div style={{flex:1}}><h1 style={{fontSize: mobile ? '20px' : '26px',fontWeight:'800',color:'#0F172A',letterSpacing:'-.4px'}}>📅 Calendar</h1>{!mobile && <p style={{fontSize:'13px',color:'#64748B'}}>April 2026 · {calEvents.length} events</p>}</div>
        <button onClick={()=>{
          // Export all events to an ICS file (works with Google Calendar, Apple Cal, Outlook)
          if (!calEvents.length) { alert('No events to export yet — add some first!'); return; }
          const pad = n => String(n).padStart(2,'0');
          const fmt = (dateStr, timeStr) => {
            if (!dateStr) return '';
            const d = new Date(dateStr + 'T' + (timeStr||'09:00') + ':00');
            return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
          };
          let ics = 'BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//LifeOS//EN\r\n';
          calEvents.forEach(e => {
            const start = fmt(e.date, e.time);
            const end   = fmt(e.date, e.end || e.time);
            if (!start) return;
            ics += `BEGIN:VEVENT\r\nUID:${e.id}@lifeos\r\nDTSTART:${start}\r\nDTEND:${end||start}\r\nSUMMARY:${e.title}\r\nEND:VEVENT\r\n`;
          });
          ics += 'END:VCALENDAR';
          const blob = new Blob([ics], { type:'text/calendar' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = 'lifeos-calendar.ics'; a.click();
          URL.revokeObjectURL(url);
          setTimeout(() => alert('📥 Downloaded lifeos-calendar.ics\n\nTo import:\n1. Open Google Calendar\n2. Settings → Import & export → Import\n3. Select the file'), 200);
        }} style={{display:'flex',alignItems:'center',gap:'6px',background:'white',color:'#4285F4',border:'1.5px solid #4285F4',borderRadius:'11px',padding:'9px 14px',fontSize:'12px',fontWeight:'600',cursor:'pointer'}}>
          📅 {mobile ? 'Google' : 'Export to Google Calendar'}
        </button>
        <button onClick={()=>setShowForm(v=>!v)} style={{display:'flex',alignItems:'center',gap:'6px',background:'linear-gradient(135deg,#0891B2,#06B6D4)',color:'white',border:'none',borderRadius:'11px',padding:'10px 18px',fontSize:'13px',fontWeight:'600',cursor:'pointer'}}><IcoPlus/>{mobile ? 'Add' : 'Add Event'}</button>
      </div>

      {/* Add Event Form */}
      {showForm && (
        <div className="fade-up" style={{background:'white',borderRadius:'16px',padding:'20px',marginBottom:'20px',border:'1px solid #BAE6FD',boxShadow:'0 4px 16px rgba(8,145,178,.08)'}}>
          <p style={{fontSize:'14px',fontWeight:'700',color:'#0F172A',marginBottom:'14px'}}>➕ New Event</p>
          <div style={{display:'grid',gridTemplateColumns: mobile ? '1fr' : '1fr 140px 80px 80px auto',gap:'10px',marginBottom:'12px'}}>
            <input value={evtForm.title} onChange={e=>setEvtForm(f=>({...f,title:e.target.value}))} placeholder="Event title" style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
            <input value={evtForm.date}  onChange={e=>setEvtForm(f=>({...f,date:e.target.value}))}  placeholder="2026-04-15"  style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
            <input value={evtForm.time}  onChange={e=>setEvtForm(f=>({...f,time:e.target.value}))}  placeholder="14:00"       style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
            <input value={evtForm.end}   onChange={e=>setEvtForm(f=>({...f,end:e.target.value}))}   placeholder="15:00"       style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
            <select value={evtForm.type} onChange={e=>setEvtForm(f=>({...f,type:e.target.value}))} style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none',cursor:'pointer'}}>
              <option value="personal">Personal</option><option value="work">Work</option><option value="kids">Kids</option><option value="health">Health</option>
            </select>
          </div>
          <div style={{display:'flex',gap:'8px'}}>
            <button onClick={()=>setShowForm(false)} style={{flex:1,padding:'9px',borderRadius:'9px',border:'1px solid #E2E8F0',background:'white',cursor:'pointer',fontSize:'13px',fontFamily:'Inter,sans-serif'}}>Cancel</button>
            <button onClick={addCalEvent} style={{flex:1,padding:'9px',borderRadius:'9px',border:'none',background:'#0891B2',color:'white',cursor:'pointer',fontSize:'13px',fontWeight:'600',fontFamily:'Inter,sans-serif'}}>Add Event</button>
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns: mobile ? '1fr' : '1fr 300px',gap:'24px'}}>
        {/* Calendar grid */}
        <div style={{background:'white',borderRadius:'20px',padding:'26px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #F1F5F9'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
            <h3 style={{fontSize:'18px',fontWeight:'800',color:'#0F172A'}}>April 2026</h3>
            <div style={{display:'flex',gap:'6px'}}>
              {['Month','Week'].map(v=><button key={v} onClick={()=>setView(v.toLowerCase())} style={{padding:'6px 14px',borderRadius:'8px',border:'none',cursor:'pointer',fontSize:'12px',fontWeight:'600',background:view===v.toLowerCase()?'#0F172A':'#F1F5F9',color:view===v.toLowerCase()?'white':'#64748B'}}>{v}</button>)}
            </div>
          </div>
          {view === 'month' ? (<>
          {/* DOW headers */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px',marginBottom:'8px'}}>
            {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} style={{textAlign:'center',fontSize:'11px',fontWeight:'700',color:'#CBD5E1',padding:'4px 0'}}>{d}</div>)}
          </div>
          {/* Days */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px'}}>
            {[...Array(APR_START_DOW)].map((_,i)=><div key={`e${i}`}/>)}
            {Array.from({length:30},(_,i)=>{
              const d = i+1;
              const dateStr = `2026-04-${String(d).padStart(2,'0')}`;
              const evts = dayEvents(dateStr);
              const isSel = selDay===dateStr;
              const todayD = new Date(); const isToday = dateStr === `${todayD.getFullYear()}-${String(todayD.getMonth()+1).padStart(2,'0')}-${String(todayD.getDate()).padStart(2,'0')}`;
              return (
                <div key={d} onClick={()=>setSelDay(dateStr)} style={{borderRadius:'10px',padding:'6px 4px',cursor:'pointer',background:isSel?'#0F172A':isToday?'#EFF6FF':'transparent',border:`1.5px solid ${isSel?'#0F172A':isToday?'#BFDBFE':'transparent'}`,transition:'all .15s',minHeight: mobile ? '44px' : '60px'}}
                  onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background='#F8FAFC'}}
                  onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background=isToday?'#EFF6FF':'transparent'}}>
                  <div style={{textAlign:'center',fontSize:'13px',fontWeight:isToday||isSel?'800':'500',color:isSel?'white':isToday?'#2563EB':'#374151',marginBottom:'4px'}}>{d}</div>
                  <div style={{display:'flex',flexDirection:'column',gap:'2px'}}>
                    {evts.slice(0,2).map(ev=>(
                      <div key={ev.id} style={{fontSize:'9px',fontWeight:'600',borderRadius:'3px',padding:'1px 4px',background:isSel?'rgba(255,255,255,.25)':ev.color+'22',color:isSel?'white':ev.color,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.title.split(' ')[0]}</div>
                    ))}
                    {evts.length>2 && <div style={{fontSize:'9px',color:isSel?'rgba(255,255,255,.7)':'#94A3B8',textAlign:'center'}}>+{evts.length-2}</div>}
                  </div>
                </div>
              );
            })}
          </div>
          </>) : (<>
          {/* ── WEEK VIEW ── */}
          {(() => {
            const selDate = new Date(selDay + 'T12:00');
            const dow = selDate.getDay();
            const weekStart = new Date(selDate); weekStart.setDate(selDate.getDate() - dow);
            const days = Array.from({length:7},(_,i)=>{ const d=new Date(weekStart); d.setDate(weekStart.getDate()+i); return d; });
            const DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            return (
              <div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px',marginBottom:'4px'}}>
                  {days.map((d,i)=>{
                    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    const isSel = selDay===ds; const _td=new Date(); const isToday = ds===`${_td.getFullYear()}-${String(_td.getMonth()+1).padStart(2,'0')}-${String(_td.getDate()).padStart(2,'0')}`;
                    return(
                      <div key={i} onClick={()=>setSelDay(ds)} style={{cursor:'pointer',textAlign:'center',padding:'8px 2px',borderRadius:'10px',background:isSel?'#0F172A':isToday?'#EFF6FF':'transparent',border:`1.5px solid ${isSel?'#0F172A':isToday?'#BFDBFE':'transparent'}`,transition:'all .15s'}}>
                        <div style={{fontSize:'10px',fontWeight:'700',color:isSel?'rgba(255,255,255,.7)':'#94A3B8',marginBottom:'2px'}}>{DAY_LABELS[i]}</div>
                        <div style={{fontSize:'15px',fontWeight:'800',color:isSel?'white':isToday?'#2563EB':'#374151'}}>{d.getDate()}</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{marginTop:'12px',display:'flex',flexDirection:'column',gap:'6px'}}>
                  {days.map((d,i)=>{
                    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    const evts=dayEvents(ds);
                    if(!evts.length) return null;
                    return evts.map(ev=>(
                      <div key={ev.id} onClick={()=>setSelDay(ds)} style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 14px',borderRadius:'12px',background:ev.color+'12',border:`1px solid ${ev.color}33`,cursor:'pointer'}}>
                        <div style={{width:'3px',alignSelf:'stretch',borderRadius:'2px',background:ev.color,flexShrink:0}}/>
                        <div style={{flex:1}}>
                          <p style={{fontSize:'13px',fontWeight:'600',color:'#0F172A'}}>{ev.title}</p>
                          <p style={{fontSize:'11px',color:'#64748B'}}>{DAY_LABELS[d.getDay()]} · {ev.time}{ev.end?` – ${ev.end}`:''}</p>
                        </div>
                        <div style={{width:'32px',height:'32px',borderRadius:'8px',background:ev.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px'}}>
                          {ev.type==='work'?'💼':ev.type==='kids'?'👧':ev.type==='health'?'💪':'📅'}
                        </div>
                      </div>
                    ));
                  })}
                  {days.every(d=>{const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;return !dayEvents(ds).length;}) && (
                    <div style={{textAlign:'center',padding:'32px',color:'#94A3B8',fontSize:'13px'}}>No events this week 🎉</div>
                  )}
                </div>
              </div>
            );
          })()}
          </>)}
          {/* Type legend */}
          <div style={{display:'flex',gap:'14px',marginTop:'20px',paddingTop:'16px',borderTop:'1px solid #F8FAFC',flexWrap:'wrap'}}>
            {Object.entries(TYPE_COLOR).map(([k,c])=>(
              <div key={k} style={{display:'flex',alignItems:'center',gap:'5px'}}>
                <div style={{width:'10px',height:'10px',borderRadius:'3px',background:c}}/>
                <span style={{fontSize:'11px',color:'#64748B',textTransform:'capitalize'}}>{k}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Right panel */}
        <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
          {/* Selected day events */}
          <div style={{background:'white',borderRadius:'20px',padding:'22px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #F1F5F9'}}>
            <h3 style={{fontSize:'14px',fontWeight:'700',color:'#0F172A',marginBottom:'14px'}}>
              {new Date(selDay+'T12:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}
            </h3>
            {selEvents.length===0
              ? <p style={{fontSize:'13px',color:'#94A3B8',textAlign:'center',padding:'20px 0'}}>No events · free day 🎉</p>
              : selEvents.map(ev=>(
                <div key={ev.id} style={{display:'flex',gap:'12px',padding:'10px 0',borderBottom:'1px solid #F8FAFC',cursor:'pointer'}} onClick={()=>setSelEvt(selEvt?.id===ev.id?null:ev)}>
                  <div style={{width:'3px',borderRadius:'3px',background:ev.color,flexShrink:0}}/>
                  <div>
                    <p style={{fontSize:'13px',fontWeight:'600',color:'#0F172A'}}>{ev.title}</p>
                    <p style={{fontSize:'11px',color:'#94A3B8'}}>{ev.time} – {ev.end}</p>
                  </div>
                </div>
              ))
            }
          </div>
          {/* Upcoming */}
          <div style={{background:'white',borderRadius:'20px',padding:'22px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #F1F5F9'}}>
            <h3 style={{fontSize:'14px',fontWeight:'700',color:'#0F172A',marginBottom:'14px'}}>Coming up</h3>
            {upcoming.map(ev=>(
              <div key={ev.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'8px 0',borderBottom:'1px solid #F8FAFC'}}>
                <div style={{width:'34px',height:'34px',borderRadius:'10px',background:ev.color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px',border:`1.5px solid ${ev.color}33`,flexShrink:0}}>
                  {ev.type==='work'?'💼':ev.type==='kids'?'👧':ev.type==='health'?'💪':'📅'}
                </div>
                <div style={{flex:1}}>
                  <p style={{fontSize:'12px',fontWeight:'600',color:'#0F172A'}}>{ev.title}</p>
                  <p style={{fontSize:'11px',color:'#94A3B8'}}>{new Date(ev.date+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})} · {ev.time}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   VOICE JOURNAL
═══════════════════════════════════════ */
function VoiceJournal({ onBack }) {
  const mobile = useIsMobile();
  const [entries,  setEntries]  = useLocalStorage('lifeos_journal', JOURNAL_SEED);
  const [sel,      setSel]      = useState(null);
  const [rec,      setRec]      = useState(false);
  const [searchQ,  setSearchQ]  = useState('');
  const [newText,  setNewText]  = useState('');
  const [editing,  setEditing]  = useState(false);
  const [editText, setEditText] = useState('');
  const srRef   = useRef(null);
  const demoRef = useRef(null);
  const MOODS   = ['🤩','😊','😐','😔','⚡'];
  // Set sel to first entry after mount
  useEffect(() => {
    if (!sel && entries.length > 0) { setSel(entries[0]); return; }
    if (sel && entries.length > 0 && !entries.find(e => e.id === sel.id)) setSel(entries[0]);
  }, [entries, sel]);

  // Pick up any pending voice recording from the dashboard mic button
  useEffect(() => {
    try {
      const pending = window.localStorage.getItem('lifeos_pending_voice');
      if (pending) {
        const { text } = JSON.parse(pending);
        if (text) setNewText(text);
        window.localStorage.removeItem('lifeos_pending_voice');
      }
    } catch(e) {}
  }, []);

  const filtered = searchQ ? entries.filter(e=>e.title.toLowerCase().includes(searchQ.toLowerCase())||e.transcript.toLowerCase().includes(searchQ.toLowerCase())) : entries;

  const stopRec = (text) => {
    setRec(false); clearInterval(demoRef.current);
    if(srRef.current){try{srRef.current.stop();}catch(_){}}
    if(text&&text.trim()){ setNewText(text); }
  };

  const startRec = () => {
    setNewText(''); setRec(true);
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    if(SR){
      const r=new SR(); r.continuous=true; r.interimResults=true;
      let finalText = '';
      r.onresult=e=>{
        let interim = '';
        for(let i=0;i<e.results.length;i++){
          if(e.results[i].isFinal) finalText += e.results[i][0].transcript + ' ';
          else interim += e.results[i][0].transcript;
        }
        setNewText((finalText + interim).trim());
      };
      r.onend=()=>setRec(false); srRef.current=r; r.start();
    } else {
      const demo='Today was a great day. Got a lot done, feeling focused and grateful.'; let i=0;
      demoRef.current=setInterval(()=>{i++;setNewText(demo.slice(0,i));if(i>=demo.length){clearInterval(demoRef.current);setTimeout(()=>stopRec(demo),800);}},35);
    }
  };

  const saveEntry = () => {
    if(!newText.trim())return;
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
    const timeStr = now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    const entry={id:Date.now(),date:dateStr,time:timeStr,mood:'😊',moodLabel:'Good',duration:'0:30',title:newText.slice(0,50)+(newText.length>50?'…':''),transcript:newText,tags:['new']};
    setEntries(prev=>[entry,...prev]); setSel(entry); setNewText('');
  };

  const saveEdit = () => {
    if(!editText.trim())return;
    setEntries(prev=>prev.map(e=>e.id===sel.id?{...e,transcript:editText,title:editText.slice(0,50)+(editText.length>50?'…':'')}:e));
    setSel(s=>({...s,transcript:editText,title:editText.slice(0,50)+(editText.length>50?'…':'')}));
    setEditing(false);
  };

  const playEntry = (text) => {
    if('speechSynthesis' in window){
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 0.95; utter.pitch = 1;
      window.speechSynthesis.speak(utter);
    }
  };

  const totalMins = entries.reduce((s,e)=>{const m=e.duration.split(':');return s+parseInt(m[0])*60+parseInt(m[1]);},0);

  return (
    <div className="fade-up" style={{maxWidth:'1100px',margin:'0 auto',padding: mobile ? '0 0 40px' : '0 32px 60px'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px'}}>
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:'6px',padding:'8px 14px',borderRadius:'10px',border:'1px solid #E2E8F0',background:'white',fontSize:'13px',fontWeight:'500',color:'#374151',cursor:'pointer'}}><IcoBack/>Dashboard</button>
        <div style={{flex:1}}><h1 style={{fontSize: mobile ? '20px' : '26px',fontWeight:'800',color:'#0F172A',letterSpacing:'-.4px'}}>🎙️ Voice Journal</h1><p style={{fontSize:'13px',color:'#64748B'}}>{entries.length} entries</p></div>
      </div>
      {/* Record CTA */}
      <div style={{background:'linear-gradient(135deg,#4F46E5,#7C3AED)',borderRadius:'20px',padding: mobile ? '20px 16px' : '28px 32px',marginBottom:'24px',display:'flex',alignItems:'center',gap: mobile ? '16px' : '28px'}}>
        <button onClick={rec?()=>stopRec(newText):startRec} className={rec?'record-active':'record-idle'} style={{width:'68px',height:'68px',borderRadius:'50%',border:'none',cursor:'pointer',background:rec?'rgba(255,255,255,.2)':'rgba(255,255,255,.15)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          {rec?<div style={{display:'flex',alignItems:'center',height:'28px'}}>{[0,1,2,3,4].map(i=><span key={i} className="wave-bar" style={{background:'white',animationDelay:`${i*.12}s`}}/>)}</div>:<IcoMic/>}
        </button>
        <div style={{flex:1}}>
          {rec||newText
            ? <div>
                <p style={{color:'rgba(255,255,255,.7)',fontSize:'12px',marginBottom:'6px'}}>{rec?'Recording…':'Ready to save'}</p>
                <p style={{color:'white',fontSize:'14px',lineHeight:'1.6',fontStyle:'italic'}}>"{newText||'Listening…'}"</p>
              </div>
            : <div><p style={{color:'white',fontSize:'18px',fontWeight:'700',marginBottom:'4px'}}>Start a new entry</p><p style={{color:'rgba(255,255,255,.65)',fontSize:'13px'}}>Tap to record your thoughts. Transcribed automatically.</p></div>
          }
        </div>
        {newText && !rec && (
          <button onClick={saveEntry} style={{background:'white',border:'none',borderRadius:'12px',padding:'10px 20px',color:'#4F46E5',fontWeight:'700',fontSize:'13px',cursor:'pointer',fontFamily:'Inter,sans-serif',flexShrink:0}}>Save Entry</button>
        )}
      </div>
      {/* Main layout */}
      <div style={{display:'grid',gridTemplateColumns: mobile ? '1fr' : '320px 1fr',gap:'24px'}}>
        {/* Entry list */}
        <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
          <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="🔍  Search entries…" style={{padding:'10px 14px',borderRadius:'12px',border:'1.5px solid #E2E8F0',fontSize:'13px',background:'white',fontFamily:'Inter,sans-serif',outline:'none'}}/>
          <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
            {filtered.map(e=>(
              <div key={e.id} onClick={()=>setSel(e)} style={{background:'white',borderRadius:'16px',padding:'16px',boxShadow:'0 1px 4px rgba(0,0,0,.05)',border:`1.5px solid ${sel?.id===e.id?MOOD_COLORS[e.mood]||'#6366F1':'#F1F5F9'}`,cursor:'pointer',transition:'all .2s'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'6px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'7px'}}>
                    <span style={{fontSize:'18px'}}>{e.mood}</span>
                    <div><p style={{fontSize:'13px',fontWeight:'700',color:'#0F172A',lineHeight:1.2}}>{e.title}</p><p style={{fontSize:'11px',color:'#94A3B8'}}>{e.date} · {e.time}</p></div>
                  </div>
                  <span style={{fontSize:'10px',color:'#94A3B8',flexShrink:0}}>{e.duration}</span>
                </div>
                <div style={{display:'flex',gap:'5px',flexWrap:'wrap'}}>
                  {e.tags.map((tag,i)=><span key={i} style={{fontSize:'10px',fontWeight:'600',padding:'2px 8px',borderRadius:'100px',background:'#F1F5F9',color:'#64748B'}}>#{tag}</span>)}
                </div>
              </div>
            ))}
          </div>
        </div>
        {/* Entry detail */}
        {sel && (
          <div className="fade-in" style={{background:'white',borderRadius:'20px',padding:'30px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #F1F5F9'}}>
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'20px'}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'6px'}}>
                  <span style={{fontSize:'32px'}}>{sel.mood}</span>
                  <div>
                    <p style={{fontSize:'20px',fontWeight:'800',color:'#0F172A',letterSpacing:'-.3px'}}>{sel.title}</p>
                    <p style={{fontSize:'12px',color:'#94A3B8'}}>{sel.date} · {sel.time} · {sel.duration}</p>
                  </div>
                </div>
              </div>
              <div style={{display:'flex',gap:'6px'}}>
                {sel.tags.map((tag,i)=><span key={i} style={{fontSize:'11px',fontWeight:'600',padding:'4px 10px',borderRadius:'100px',background:(MOOD_COLORS[sel.mood]||'#6366F1')+'18',color:MOOD_COLORS[sel.mood]||'#6366F1'}}>#{tag}</span>)}
              </div>
            </div>
            {editing ? (
              <div>
                <textarea value={editText} onChange={e=>setEditText(e.target.value)} rows={6}
                  style={{width:'100%',padding:'16px',borderRadius:'12px',border:'1.5px solid #6366F1',fontSize:'14px',lineHeight:'1.8',fontFamily:'Inter,sans-serif',resize:'vertical',outline:'none'}}/>
                <div style={{display:'flex',gap:'8px',marginTop:'10px'}}>
                  <button onClick={()=>setEditing(false)} style={{flex:1,padding:'9px',borderRadius:'9px',border:'1px solid #E2E8F0',background:'white',cursor:'pointer',fontSize:'13px',fontFamily:'Inter,sans-serif'}}>Cancel</button>
                  <button onClick={saveEdit}              style={{flex:1,padding:'9px',borderRadius:'9px',border:'none',background:'#4F46E5',color:'white',cursor:'pointer',fontSize:'13px',fontWeight:'600',fontFamily:'Inter,sans-serif'}}>Save Changes</button>
                </div>
              </div>
            ) : (
              <div style={{background:'#F8FAFC',borderRadius:'16px',padding:'22px',lineHeight:'1.85',fontSize:'14px',color:'#374151',fontStyle:'italic',borderLeft:`4px solid ${MOOD_COLORS[sel.mood]||'#6366F1'}`}}>
                "{sel.transcript}"
              </div>
            )}
            <div style={{marginTop:'20px',display:'flex',gap:'10px'}}>
              {MOODS.map(m=>(
                <button key={m} onClick={()=>{setEntries(prev=>prev.map(e=>e.id===sel.id?{...e,mood:m}:e));setSel(s=>({...s,mood:m}));}} style={{width:'36px',height:'36px',borderRadius:'10px',border:`2px solid ${sel.mood===m?(MOOD_COLORS[m]||'#6366F1'):'#E2E8F0'}`,background:sel.mood===m?(MOOD_COLORS[m]||'#6366F1')+'18':'white',cursor:'pointer',fontSize:'18px',transition:'all .15s'}}>{m}</button>
              ))}
              <div style={{flex:1}}/>
              <button onClick={()=>{setEditing(true);setEditText(sel.transcript);}} style={{padding:'8px 16px',borderRadius:'10px',border:'1px solid #E2E8F0',background:'white',fontSize:'12px',fontWeight:'600',cursor:'pointer',color:'#64748B'}}>✏️ Edit</button>
              <button onClick={()=>playEntry(sel.transcript)} style={{padding:'8px 16px',borderRadius:'10px',border:'none',background:'#4F46E5',color:'white',fontSize:'12px',fontWeight:'600',cursor:'pointer'}}>🔊 Read aloud</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   AI ASSISTANT
═══════════════════════════════════════ */
function AIAssistant({ onBack }) {
  const mobile = useIsMobile();
  const [msgs,  setMsgs]  = useState([
    {role:'ai',  text:"Hey Brad 👋 I'm your LifeOS assistant. I have full context on your projects, co-parenting schedule, finances, and calendar. What do you need?"},
  ]);
  const [input, setInput] = useState('');
  const [typing,setTyping]= useState(false);
  const bottomRef         = useRef(null);

  const QUICK = [
    "What's on my plate this week?",
    "How much do I owe Mim?",
    "When's my next client deadline?",
    "Summarize my finances",
    "Draft an update email to Acme Corp",
    "How many days do I have the kids this month?",
  ];

  const readLS = (key, fallback) => {
    try {
      const rawUser = window.localStorage.getItem('lifeos_user');
      let scopedKey = key;
      if (rawUser && rawUser !== 'null') {
        const u = JSON.parse(rawUser);
        if (u && u.email) scopedKey = key + ':' + u.email;
      }
      const raw = window.localStorage.getItem(scopedKey);
      return raw ? JSON.parse(raw) : fallback;
    } catch(_) { return fallback; }
  };

  const getResponse = (q) => {
    const t = q.toLowerCase();
    const tasks     = readLS('lifeos_tasks', []);
    const events    = readLS('lifeos_cp_events', []);
    const calEvents = readLS('lifeos_cal_events', []);
    const custody   = readLS('lifeos_custody_apr2026', []);
    const journal   = readLS('lifeos_journal', []);
    const dayNotes  = readLS('lifeos_day_notes', {});
    const thread    = readLS('lifeos_cp_thread', []);
    const clients   = readLS('lifeos_clients', []);
    const projects  = readLS('lifeos_projects', []);

    // Tasks
    if (/\b(task|todo|to do|plate|what.*this week|what.*today|what.*need)/.test(t)) {
      const pending = tasks.filter(x=>!x.done);
      const urgent = pending.filter(x=>x.urgency==='urgent');
      if (!tasks.length) return "You haven't added any tasks yet. Tap '+ Add' on the dashboard Today's Tasks card to get started.";
      if (!pending.length) return `Clear plate! All ${tasks.length} tasks are done ✅`;
      let out = `You have **${pending.length} pending task${pending.length>1?'s':''}**${urgent.length?` (${urgent.length} urgent)`:''}:\n\n`;
      pending.slice(0,8).forEach(x => { out += `• ${x.urgency==='urgent'?'🔴 ':''}${x.text}\n`; });
      return out;
    }

    // Custody / kids days
    if (/\b(kid|custody|lilly|skylah|days.*kids|how many day|schedule)/.test(t)) {
      if (!custody.length) return "Your custody calendar is empty. Open Co-parenting → Schedule and tap days to set who has the kids.";
      const brad = custody.filter(d=>d.owner==='brad').length;
      const mim = custody.filter(d=>d.owner==='mim').length;
      const split = custody.filter(d=>d.owner==='shared').length;
      return `**April 2026 custody split:**\n\n• With you: ${brad} day${brad!==1?'s':''}\n• With Mim: ${mim} day${mim!==1?'s':''}\n• Split: ${split} day${split!==1?'s':''}\n\nTap any calendar day in Co-parenting → Schedule to change it or add a note.`;
    }

    // Expenses / money owed
    if (/\b(owe|money|expense|owed|mim.*pay|pay.*mim|balance)/.test(t)) {
      return "Open **Co-parenting → Expenses** to see the balance with Mim. Add expenses there and the balance updates automatically. I'll summarise once there's data.";
    }

    // Calendar / events
    if (/\b(event|calendar|upcoming|coming up|deadline|appointment|birthday)/.test(t)) {
      const combined = [...events, ...calEvents];
      if (!combined.length) return "No events on your calendar. Add events via the Calendar card or Co-parenting → Add Event.";
      const now = new Date();
      const future = combined.filter(e => {
        if (!e.date) return false;
        const d = /^\d{4}-\d{2}-\d{2}$/.test(e.date) ? new Date(e.date+'T00:00:00') : null;
        return d && d >= now;
      }).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,6);
      if (!future.length) return "No upcoming events — everything's in the past. Tap Add Event to schedule something.";
      let out = `**Upcoming events:**\n\n`;
      future.forEach(e => { out += `• ${e.date}${e.time?' '+e.time:''} — ${e.title}\n`; });
      return out;
    }

    // Projects / clients
    if (/\b(project|client|work|celx|acme|freelance|contract)/.test(t)) {
      if (!projects.length && !clients.length) return "Nothing in Projects & Clients yet. Open that section to add your Celx Digital projects, clients, deadlines, and rates.";
      let out = '';
      if (clients.length) out += `**Clients (${clients.length}):** ${clients.map(c=>c.name).join(', ')}\n\n`;
      if (projects.length) out += `**Projects (${projects.length}):**\n` + projects.slice(0,6).map(p=>`• ${p.name||p.title}${p.deadline?' — due '+p.deadline:''}`).join('\n');
      return out;
    }

    // Finance / money summary
    if (/\b(financ|money|budget|income|spending|subscription|save)/.test(t)) {
      return "Open **Money** to see your subscriptions and transactions. Once you've added your Centrelink payments and freelance income I can break down monthly cashflow.";
    }

    // Journal
    if (/\b(journal|voice|mood|feeling|reflect|diary)/.test(t)) {
      if (!journal.length) return "No journal entries yet. Tap the mic on the dashboard and pick 'Voice Journal' to record.";
      return `You've got **${journal.length} journal entr${journal.length===1?'y':'ies'}**. Most recent: "${journal[0].title||journal[0].transcript?.slice(0,60)}"`;
    }

    // Messages / co-parent
    if (/\b(message|text|mim|coparent|co-parent|chat)/.test(t)) {
      if (!thread.length) return "No messages in the co-parent log. Open Co-parenting → Messages to start a log.";
      const last = thread[thread.length-1];
      return `**Last message** (${last.date} ${last.time}) from ${last.from==='me'?'you':'Mim'}:\n\n"${last.text}"\n\n${thread.length} total messages logged.`;
    }

    // Day note lookup ("what happened saturday", etc)
    if (/\b(note|what happened|reminder)/.test(t)) {
      const notes = Object.entries(dayNotes);
      if (!notes.length) return "You haven't added any day notes yet. Tap any day in the custody calendar to add one.";
      let out = `**Your day notes (${notes.length}):**\n\n`;
      notes.slice(-5).forEach(([k,v]) => { out += `• ${k}: ${v}\n`; });
      return out;
    }

    // Summary / overview
    if (/\b(summary|summarize|overview|recap|everything|status)/.test(t)) {
      const pending = tasks.filter(x=>!x.done).length;
      const bradDays = custody.filter(d=>d.owner==='brad').length;
      return `**Quick snapshot:**\n\n• ${pending} pending task${pending!==1?'s':''}\n• ${bradDays} days with the kids this month\n• ${journal.length} journal entries\n• ${thread.length} co-parent messages logged\n• ${clients.length} clients, ${projects.length} projects\n\nAsk me about any of these for more detail.`;
    }

    // Fallback
    return "I can tell you about your **tasks**, **custody schedule**, **upcoming events**, **projects**, **journal**, or **co-parent messages**. Try asking something like \"what's on my plate?\" or \"how many days with the kids?\"";
  };

  const send = (text) => {
    const q = text||input; if(!q.trim())return;
    setMsgs(prev=>[...prev,{role:'user',text:q}]); setInput(''); setTyping(true);
    setTimeout(()=>{
      setMsgs(prev=>[...prev,{role:'ai',text:getResponse(q)}]);
      setTyping(false);
    },900+Math.random()*600);
  };

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs,typing]);

  const formatText = (t) => t.split('\n').map((line,i)=>{
    if(line.startsWith('**')&&line.endsWith('**')) return <p key={i} style={{fontWeight:'700',color:'#0F172A',marginBottom:'4px'}}>{line.slice(2,-2)}</p>;
    if(line.startsWith('- ')) return <p key={i} style={{paddingLeft:'12px',borderLeft:'2px solid #E2E8F0',marginBottom:'4px',color:'#374151'}}>· {line.slice(2)}</p>;
    if(line.startsWith('**')) return <p key={i} style={{marginBottom:'4px'}} dangerouslySetInnerHTML={{__html:line.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')}}/>
    return line ? <p key={i} style={{marginBottom:'6px',color:'#374151'}}>{line}</p> : <div key={i} style={{height:'8px'}}/>;
  });

  return (
    <div className="fade-up" style={{maxWidth:'900px',margin:'0 auto',padding: mobile ? '0 0 40px' : '0 32px 60px'}}>
      <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px',flexWrap:'wrap'}}>
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:'6px',padding:'8px 14px',borderRadius:'10px',border:'1px solid #E2E8F0',background:'white',fontSize:'13px',fontWeight:'500',color:'#374151',cursor:'pointer'}}><IcoBack/>Dashboard</button>

        <div style={{display:'flex',alignItems:'center',gap:'7px',background:'#F0FDFA',border:'1px solid #99F6E4',borderRadius:'10px',padding:'8px 14px'}}>
          <div style={{width:'7px',height:'7px',borderRadius:'50%',background:'#0D9488'}}/>

                {m.role==='ai' ? formatText(m.text) : m.text}

          {typing && (
            <div style={{display:'flex',gap:'10px',alignItems:'center'}}>

              <div style={{background:'#F8FAFC',border:'1px solid #F1F5F9',borderRadius:'18px 18px 18px 4px',padding:'14px 18px'}}>
                <div style={{display:'flex',gap:'4px',alignItems:'center',height:'16px'}}>
                  {[0,1,2].map(i=><div key={i} className="wave-bar" style={{background:'#94A3B8',width:'4px',animationDelay:`${i*.15}s`}}/>)}
                </div>

          <button onClick={()=>send()} style={{width:'46px',height:'46px',borderRadius:'14px',border:'none',background:'linear-gradient(135deg,#0D9488,#14B8A6)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}><IcoSend/></button>
        </div>

      {/* Quick prompts */}
      <div>
        <p style={{fontSize:'12px',fontWeight:'600',color:'#94A3B8',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'10px'}}>Quick prompts</p>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>

              onMouseLeave={e=>{e.currentTarget.style.background='white';e.currentTarget.style.borderColor='#E2E8F0';e.currentTarget.style.color='#374151';}}>
