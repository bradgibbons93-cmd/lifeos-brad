function FamilyCloud({ onBack }) {
  const mobile = useIsMobile();
  const SEED_FILES = [];
  const SEED_NOTES = [];

  const FOLDERS = ['All','Kids','Documents','Photos','Shared'];
  const FOLDER_META = {
    All:       { icon:'📁', color:'#64748B', bg:'#F8FAFC' },
    Kids:      { icon:'👨‍👧‍👦', color:'#7C3AED', bg:'#F5F3FF' },
    Documents: { icon:'📄', color:'#2563EB', bg:'#EFF6FF' },
    Photos:    { icon:'📸', color:'#D97706', bg:'#FFFBEB' },
    Shared:    { icon:'🤝', color:'#059669', bg:'#ECFDF5' },
  };

  const [folder,    setFolder]    = useState('All');
  const [files,     setFiles]     = useLocalStorage('lifeos_cloud_files', []);
  const [notes,     setNotes]     = useLocalStorage('lifeos_cloud_notes', SEED_NOTES);
  const [preview,   setPreview]   = useState(null);
  const [tab,       setTab]       = useState('files');
  const [noteInput, setNoteInput] = useState('');
  const [search,    setSearch]    = useState('');
  const fileRef = useRef(null);

  const formatSize = (b) => b < 1024*1024 ? `${(b/1024).toFixed(0)} KB` : `${(b/1024/1024).toFixed(1)} MB`;

  const fileIcon = (f) => {
    if (f.type?.startsWith('image/'))     return '🖼️';
    if (f.type === 'application/pdf')     return '📋';
    if (f.type === 'text/plain')          return '📝';
    if (f.type?.includes('video'))        return '🎬';
    if (f.type?.includes('audio'))        return '🎵';
    if (f.type?.includes('sheet'))        return '📊';
    if (f.type?.includes('word'))         return '📝';
    return '📎';
  };

  const fileBg = (f) => {
    if (f.type?.startsWith('image/'))  return { bg:'#F5F3FF', color:'#7C3AED' };
    if (f.type === 'application/pdf')  return { bg:'#FEF2F2', color:'#DC2626' };
    if (f.type === 'text/plain')       return { bg:'#ECFDF5', color:'#059669' };
    return { bg:'#F8FAFC', color:'#64748B' };
  };

  const visibleFiles = files
    .filter(f => folder === 'All' || f.folder === folder)
    .filter(f => !search || f.name.toLowerCase().includes(search.toLowerCase()));

  const handleUpload = (e) => {
    const selected = Array.from(e.target.files);
    if (!selected.length) return;
    const processFile = (file) => new Promise(resolve => {
      const ext = file.name.split('.').pop().toLowerCase();
      const isImage = file.type.startsWith('image/');
      const isText  = file.type === 'text/plain';
      const today   = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
      const meta = { id: Date.now() + Math.random(), name: file.name, folder: folder === 'All' ? 'Shared' : folder, type: file.type, size: file.size, date: today, preview: null, ext };
      if ((isImage || isText) && file.size < 4 * 1024 * 1024) {
        const reader = new FileReader();
        reader.onload = ev => resolve({ ...meta, preview: ev.target.result });
        if (isImage) reader.readAsDataURL(file);
        else         reader.readAsText(file);
      } else {
        resolve(meta);
      }
    });
    Promise.all(selected.map(processFile)).then(newFiles => setFiles(prev => [...newFiles, ...prev]));
    e.target.value = '';
  };

  const deleteFile = (id) => { setFiles(prev => prev.filter(f => f.id !== id)); if (preview?.id === id) setPreview(null); };
  const addNote = () => {
    if (!noteInput.trim()) return;
    setNotes(prev => [{ id:Date.now(), author:'You', emoji:'🧑', color:'#6366F1', text:noteInput.trim(), date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}), pinned:false }, ...prev]);
    setNoteInput('');
  };
  const deleteNote = (id) => setNotes(prev => prev.filter(n => n.id !== id));
  const togglePin  = (id) => setNotes(prev => prev.map(n => n.id === id ? {...n, pinned:!n.pinned} : n));
  const sortedNotes = [...notes].sort((a,b) => (b.pinned?1:0) - (a.pinned?1:0));
  const folderCounts = FOLDERS.reduce((acc,f) => ({ ...acc, [f]: f==='All' ? files.length : files.filter(x=>x.folder===f).length }), {});

  const card = { background:'white', borderRadius:'16px', boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' };

  return (
    <div className="fade-up" style={{ maxWidth:'1200px', margin:'0 auto', padding: mobile ? '0 0 40px' : '0 0 60px' }}>
      {/* ── Header ── */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'20px', gap:'12px', flexWrap:'wrap' }}>
        <div style={{ display:'flex', alignItems:'center', gap:'12px' }}>
          <button onClick={onBack} style={{ display:'flex', alignItems:'center', gap:'6px', padding:'8px 14px', borderRadius:'10px', border:'1px solid #E2E8F0', background:'white', fontSize:'13px', fontWeight:'500', color:'#374151', cursor:'pointer' }}>
            <IcoBack /> Dashboard
          </button>
          <div>
            <h1 style={{ fontSize: mobile ? '20px' : '26px', fontWeight:'800', color:'#0F172A', letterSpacing:'-.4px', lineHeight:1 }}>☁️ Family Cloud</h1>
            {!mobile && <p style={{ fontSize:'13px', color:'#64748B', marginTop:'4px' }}>{files.length} files · {notes.length} notes</p>}
          </div>
        </div>
        <div style={{ display:'flex', gap:'10px' }}>
          <input ref={fileRef} type="file" multiple style={{ display:'none' }} onChange={handleUpload} />
          <button onClick={() => fileRef.current?.click()} style={{ display:'flex', alignItems:'center', gap:'8px', padding:'10px 18px', borderRadius:'12px', border:'none', background:'linear-gradient(135deg,#D97706,#F59E0B)', color:'white', fontSize:'13px', fontWeight:'600', cursor:'pointer' }}>
            <IcoPlus /> Upload Files
          </button>
        </div>
      </div>

      {/* ── Tabs ── */}
      <div style={{ display:'flex', gap:'4px', marginBottom:'24px', background:'#F1F5F9', borderRadius:'12px', padding:'4px', width:'fit-content' }}>
        {[{id:'files',label:'📁 Files'},{id:'notes',label:'📌 Pinboard'}].map(t => (
          <button key={t.id} className="tab-btn" onClick={() => setTab(t.id)}
            style={{ padding:'8px 20px', borderRadius:'9px', fontSize:'13px', fontWeight:'600', background:tab===t.id?'white':'transparent', color:tab===t.id?'#0F172A':'#64748B', boxShadow:tab===t.id?'0 1px 3px rgba(0,0,0,.08)':'none' }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ══ FILES TAB ══ */}
      {tab === 'files' && (
        <div style={{ display:'grid', gridTemplateColumns: mobile ? '1fr' : '210px 1fr', gap:'24px', alignItems:'start' }}>
          {/* Sidebar */}
          <div style={{ display:'flex', flexDirection:'column', gap:'6px' }}>
            <div style={{ fontSize:'11px', fontWeight:'700', color:'#94A3B8', textTransform:'uppercase', letterSpacing:'.08em', marginBottom:'4px' }}>Folders</div>
            {FOLDERS.map(f => {
              const meta = FOLDER_META[f];
              const active = folder === f;
              return (
                <button key={f} onClick={() => setFolder(f)}
                  style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 14px', borderRadius:'12px', border:'none', background:active?meta.bg:'transparent', cursor:'pointer', transition:'all .15s' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:'9px' }}>
                    <span style={{ fontSize:'17px' }}>{meta.icon}</span>
                    <span style={{ fontSize:'13px', fontWeight:active?'600':'500', color:active?meta.color:'#374151' }}>{f}</span>
                  </div>
                  <span style={{ fontSize:'11px', fontWeight:'600', color:active?meta.color:'#94A3B8', background:active?`${meta.color}18`:'#F1F5F9', padding:'2px 8px', borderRadius:'20px' }}>{folderCounts[f]}</span>
                </button>
              );
            })}

            {/* Storage bar */}
            <div style={{ ...card, padding:'16px', marginTop:'12px' }}>
              <div style={{ fontSize:'11px', fontWeight:'700', color:'#94A3B8', textTransform:'uppercase', letterSpacing:'.08em', marginBottom:'10px' }}>Storage</div>
              {(() => {
                const used = files.reduce((s,f) => s+f.size, 0);
                const total = 15 * 1024 * 1024 * 1024;
                const pct = Math.min((used/total)*100, 100);
                const usedStr = used < 1024*1024 ? `${(used/1024).toFixed(0)} KB` : used < 1024**3 ? `${(used/1024/1024).toFixed(1)} MB` : `${(used/1024**3).toFixed(2)} GB`;
                return (
                  <>
                    <div style={{ height:'6px', background:'#F1F5F9', borderRadius:'4px', marginBottom:'8px', overflow:'hidden' }}>
                      <div style={{ height:'100%', width:`${Math.max(pct,1.5)}%`, background:'linear-gradient(90deg,#D97706,#F59E0B)', borderRadius:'4px' }} />
                    </div>
                    <div style={{ display:'flex', justifyContent:'space-between', fontSize:'11px', color:'#64748B' }}>
                      <span>{usedStr} used</span><span>15 GB</span>
                    </div>
                  </>
                );
              })()}
            </div>
          </div>

          {/* File grid + optional preview */}
          <div style={{ display:'grid', gridTemplateColumns: preview ? '1fr 320px' : '1fr', gap:'20px', alignItems:'start' }}>
            <div>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Search files…"
                style={{ width:'100%', padding:'10px 14px', borderRadius:'12px', border:'1.5px solid #E2E8F0', fontSize:'13px', background:'white', marginBottom:'14px' }} />
              <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'12px' }}>
                <span style={{ fontSize:'14px', fontWeight:'700', color:'#0F172A' }}>{FOLDER_META[folder].icon} {folder === 'All' ? 'All Files' : folder}</span>
                <span style={{ fontSize:'12px', color:'#94A3B8' }}>{visibleFiles.length} {visibleFiles.length===1?'file':'files'}</span>
              </div>

              {visibleFiles.length === 0 ? (
                <div style={{ ...card, padding:'48px', textAlign:'center' }}>
                  <div style={{ fontSize:'48px', marginBottom:'12px' }}>📂</div>
                  <div style={{ fontSize:'15px', fontWeight:'600', color:'#0F172A', marginBottom:'6px' }}>No files here yet</div>
                  <div style={{ fontSize:'13px', color:'#64748B' }}>Click "Upload Files" to get started</div>
                </div>
              ) : (
                <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(170px,1fr))', gap:'12px' }}>
                  {visibleFiles.map(f => {
                    const fc = fileBg(f);
                    const sel = preview?.id === f.id;
                    return (
                      <div key={f.id} onClick={() => setPreview(sel ? null : f)}
                        style={{ ...card, padding:'16px', cursor:'pointer', transition:'all .2s',
                          border: sel ? '1.5px solid #D97706' : '1px solid #F1F5F9',
                          transform: sel ? 'translateY(-2px)' : undefined,
                          boxShadow: sel ? '0 8px 24px rgba(217,119,6,.15)' : card.boxShadow }}>
                        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:'10px' }}>
                          <div style={{ width:'44px', height:'44px', borderRadius:'12px', background:fc.bg, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'22px' }}>
                            {fileIcon(f)}
                          </div>
                          <button onClick={e => { e.stopPropagation(); deleteFile(f.id); }}
                            style={{ width:'22px', height:'22px', borderRadius:'6px', border:'none', background:'transparent', cursor:'pointer', fontSize:'13px', color:'#CBD5E1', display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                        </div>
                        <div style={{ fontSize:'12px', fontWeight:'600', color:'#0F172A', lineHeight:'1.3', marginBottom:'5px', wordBreak:'break-word' }}>{f.name}</div>
                        <div style={{ fontSize:'11px', color:'#94A3B8', marginBottom:'8px' }}>{formatSize(f.size)} · {f.date.split(',')[0]}</div>
                        <span style={{ fontSize:'10px', fontWeight:'600', color:FOLDER_META[f.folder]?.color||'#64748B', background:FOLDER_META[f.folder]?.bg||'#F8FAFC', padding:'2px 8px', borderRadius:'20px' }}>
                          {FOLDER_META[f.folder]?.icon} {f.folder}
                        </span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Preview panel */}
            {preview && (
              <div style={{ ...card, padding:0, overflow:'hidden', position:'sticky', top:'80px' }}>
                <div style={{ padding:'14px 18px', borderBottom:'1px solid #F1F5F9', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                  <span style={{ fontSize:'13px', fontWeight:'700', color:'#0F172A' }}>Preview</span>
                  <button onClick={() => setPreview(null)} style={{ width:'26px', height:'26px', borderRadius:'8px', border:'none', background:'#F1F5F9', cursor:'pointer', fontSize:'13px', color:'#64748B', display:'flex', alignItems:'center', justifyContent:'center' }}>✕</button>
                </div>
                <div style={{ padding:'18px' }}>
                  {preview.type?.startsWith('image/') && preview.preview ? (
                    <img src={preview.preview} alt={preview.name} style={{ width:'100%', borderRadius:'10px', objectFit:'cover', maxHeight:'220px' }} />
                  ) : preview.type === 'text/plain' && preview.preview ? (
                    <pre style={{ fontSize:'12px', color:'#374151', lineHeight:'1.7', whiteSpace:'pre-wrap', wordBreak:'break-word', fontFamily:'ui-monospace,monospace', background:'#F8FAFC', padding:'14px', borderRadius:'10px', maxHeight:'260px', overflow:'auto', margin:0 }}>{preview.preview}</pre>
                  ) : (
                    <div style={{ textAlign:'center', padding:'28px 0' }}>
                      <div style={{ fontSize:'52px', marginBottom:'10px' }}>{fileIcon(preview)}</div>
                      <div style={{ fontSize:'13px', color:'#94A3B8' }}>No preview available</div>
                    </div>
                  )}
                  <div style={{ marginTop:'14px', padding:'12px 14px', background:'#F8FAFC', borderRadius:'12px' }}>
                    <div style={{ fontSize:'13px', fontWeight:'700', color:'#0F172A', marginBottom:'10px', wordBreak:'break-word' }}>{preview.name}</div>
                    {[['Folder', <span style={{ fontWeight:'600', color:FOLDER_META[preview.folder]?.color }}>{FOLDER_META[preview.folder]?.icon} {preview.folder}</span>], ['Size', formatSize(preview.size)], ['Added', preview.date]].map(([k,v]) => (
                      <div key={k} style={{ display:'flex', justifyContent:'space-between', fontSize:'12px', marginBottom:'5px' }}>
                        <span style={{ color:'#64748B' }}>{k}</span>
                        <span style={{ fontWeight:'600', color:'#374151' }}>{v}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ══ PINBOARD TAB ══ */}
      {tab === 'notes' && (
        <div style={{ maxWidth:'680px' }}>
          <div style={{ ...card, padding:'20px', marginBottom:'18px' }}>
            <div style={{ fontSize:'14px', fontWeight:'700', color:'#0F172A', marginBottom:'12px' }}>📌 Leave a note for the family</div>
            <textarea value={noteInput} onChange={e=>setNoteInput(e.target.value)}
              onKeyDown={e => { if (e.key==='Enter' && (e.metaKey||e.ctrlKey)) addNote(); }}
              placeholder="Write a reminder, update, or fun note…" rows={3}
              style={{ width:'100%', padding:'12px 14px', borderRadius:'12px', border:'1.5px solid #E2E8F0', fontSize:'13px', resize:'none', lineHeight:'1.6', background:'#FAFAFA', fontFamily:'Inter,sans-serif', outline:'none' }} />
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:'10px' }}>
              <span style={{ fontSize:'12px', color:'#94A3B8' }}>⌘↵ to post</span>
              <button onClick={addNote} disabled={!noteInput.trim()}
                style={{ padding:'9px 20px', borderRadius:'10px', border:'none', background:'linear-gradient(135deg,#D97706,#F59E0B)', color:'white', fontSize:'13px', fontWeight:'600', cursor:noteInput.trim()?'pointer':'not-allowed', opacity:noteInput.trim()?1:.5 }}>
                Post Note
              </button>
            </div>
          </div>

          <div style={{ display:'flex', flexDirection:'column', gap:'12px' }}>
            {sortedNotes.map(n => (
              <div key={n.id} style={{ ...card, padding:'18px 20px', border:n.pinned?`1.5px solid ${n.color}28`:'1px solid #F1F5F9' }}>
                <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:'10px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
                    <div style={{ width:'34px', height:'34px', borderRadius:'50%', background:`${n.color}14`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:'18px' }}>{n.emoji}</div>
                    <div>
                      <div style={{ fontSize:'13px', fontWeight:'700', color:n.color }}>{n.author}</div>
                      <div style={{ fontSize:'11px', color:'#94A3B8' }}>{n.date}</div>
                    </div>
                    {n.pinned && <span style={{ fontSize:'11px', fontWeight:'700', color:'#D97706', background:'#FFFBEB', padding:'2px 8px', borderRadius:'20px', border:'1px solid #FDE68A' }}>📌 Pinned</span>}
                  </div>
                  <div style={{ display:'flex', gap:'2px' }}>
                    <button onClick={() => togglePin(n.id)} title={n.pinned?'Unpin':'Pin'}
                      style={{ padding:'4px 8px', borderRadius:'7px', border:'none', background:'transparent', cursor:'pointer', fontSize:'15px', color:'#94A3B8' }}>
                      {n.pinned ? '📌' : '📍'}
                    </button>
                    <button onClick={() => deleteNote(n.id)}
                      style={{ padding:'4px 8px', borderRadius:'7px', border:'none', background:'transparent', cursor:'pointer', fontSize:'13px', color:'#CBD5E1' }}>✕</button>
                  </div>
                </div>
                <p style={{ fontSize:'14px', color:'#374151', lineHeight:'1.65', whiteSpace:'pre-wrap', margin:0 }}>{n.text}</p>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   MONEY & SUBSCRIPTIONS
═══════════════════════════════════════ */
function MoneyTracker({ user, onBack }) {
  const mobile = useIsMobile();
  const [tab,      setTab]      = useState('overview');
  const [subs,     setSubs]     = useLocalStorage('lifeos_subs', SUBSCRIPTIONS);
  const [txns,     setTxns]     = useLocalStorage('lifeos_txns', TRANSACTIONS);
  const [filter,   setFilter]   = useState('All');
  const [showSub,  setShowSub]  = useState(false);
  const [showTxn,  setShowTxn]  = useState(false);
  const [subForm,  setSubForm]  = useState({ name:'', amount:'', cycle:'mo', category:'Work', emoji:'💳', nextBill:'' });
  const [txnForm,  setTxnForm]  = useState({ desc:'', amount:'', category:'Groceries', emoji:'🛒' });
  const [annual,   setAnnual]   = useState(false);
  const [incomeSources, setIncomeSources] = useLocalStorage('lifeos_income_sources', INCOME_SOURCES_DEFAULT);
  const [showIncome, setShowIncome] = useState(false);
  const [incForm, setIncForm] = useState({ name:'', amount:'', frequency:'fortnightly', emoji:'💰' });

  const FREQ_MULT = { weekly:4.33, fortnightly:2.17, monthly:1, yearly:1/12 };
  const monthlyIncome = incomeSources.reduce((s,src) => s + (src.amount * (FREQ_MULT[src.frequency]||1)), 0);

  const addIncome = () => {
    if (!incForm.name || !incForm.amount) return;
    setIncomeSources(prev => [...prev, { id:Date.now(), ...incForm, amount:parseFloat(incForm.amount) }]);
    setIncForm({ name:'', amount:'', frequency:'fortnightly', emoji:'💰' });
    setShowIncome(false);
  };
  const deleteIncome = (id) => setIncomeSources(prev => prev.filter(s=>s.id!==id));

  const TABS = [
    { id:'overview',       label:'Overview'       },
    { id:'income',         label:'Income'         },
    { id:'subscriptions',  label:'Subscriptions'  },
    { id:'transactions',   label:'Transactions'   },
    { id:'budget',         label:'Budget'         },
  ];

  const totalSubs    = subs.reduce((s,x) => s + x.amount, 0);
  const totalIncome  = monthlyIncome || txns.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  const totalSpend   = Math.abs(txns.filter(t=>t.amount<0).reduce((s,t)=>s+t.amount,0));
  const savings      = totalIncome - totalSpend;
  const savingsRate  = totalIncome ? Math.round((savings/totalIncome)*100) : 0;

  const txnCats   = ['All', ...new Set(txns.map(t=>t.category))];
  const filtTxns  = filter==='All' ? txns : txns.filter(t=>t.category===filter);

  const addSub = () => {
    if (!subForm.name || !subForm.amount) return;
    setSubs(prev => [...prev, { id:Date.now(), ...subForm, amount:parseFloat(subForm.amount), annual:parseFloat(subForm.amount)*12 }]);
    setSubForm({ name:'', amount:'', cycle:'mo', category:'Work', emoji:'💳', nextBill:'' });
    setShowSub(false);
  };

  const addTxn = () => {
    if (!txnForm.desc || !txnForm.amount) return;
    const amt = parseFloat(txnForm.amount);
    setTxns(prev => [{ id:Date.now(), ...txnForm, amount: txnForm.category==='Income'?amt:-Math.abs(amt), date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}) }, ...prev]);
    setTxnForm({ desc:'', amount:'', category:'Groceries', emoji:'🛒' });
    setShowTxn(false);
  };

  const deleteSub = (id) => setSubs(prev => prev.filter(s=>s.id!==id));
  const deleteTxn = (id) => setTxns(prev => prev.filter(t=>t.id!==id));

  const clearAllData = () => {
    if (!window.confirm('Clear all sample data and start fresh? This cannot be undone.')) return;
    setSubs([]);
    setTxns([]);
  };

  const inp = { padding:'9px 14px', borderRadius:'9px', border:'1px solid #E2E8F0',
    fontSize:'13px', background:'white', fontFamily:'Inter,sans-serif', outline:'none' };

  // Mini donut chart via SVG
  const DonutChart = ({ data, size=120 }) => {
    const total = data.filter(d=>d.name!=='Income').reduce((s,d)=>s+d.total,0);
    const r = 44; const cx = size/2; const cy = size/2;
    const circ = 2*Math.PI*r;
    let offset = 0;
    const slices = data.filter(d=>d.name!=='Income').map(d => {
      const pct   = d.total / total;
      const dash  = pct * circ;
      const slice = { ...d, dash, offset, pct };
      offset += dash;
      return slice;
    });
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#F1F5F9" strokeWidth="18"/>
        {slices.map((s,i) => (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none"
            stroke={s.color} strokeWidth="18"
            strokeDasharray={`${s.dash} ${circ-s.dash}`}
            strokeDashoffset={-s.offset + circ/4}
            style={{ transition:'stroke-dasharray .6s ease' }}/>
        ))}
        <text x={cx} y={cy-6}  textAnchor="middle" fontSize="14" fontWeight="800" fill="#0F172A">${Math.round(totalSpend)}</text>
        <text x={cx} y={cy+10} textAnchor="middle" fontSize="9"  fill="#94A3B8">this month</text>
      </svg>
    );
  };

  return (
    <div className="fade-up" style={{ maxWidth:'1100px', margin:'0 auto', padding: mobile ? '0 0 40px' : '0 32px 60px' }}>

      {/* ── Header ── */}

                          ${b.spent.toFixed(0)}
                        </span>
                        <span style={{ fontSize:'12px', color:'#94A3B8' }}> / ${b.budget}</span>
                      </div>
                    </div>
                    <div style={{ height:'8px', background:'#F1F5F9', borderRadius:'8px', overflow:'hidden' }}>
                      <div style={{ height:'100%', width:`${pct}%`, borderRadius:'8px', transition:'width .7s ease',
                        background: over
                          ? 'linear-gradient(90deg,#DC2626,#EF4444)'
                          : pct>80
                            ? `linear-gradient(90deg,${b.color},#F59E0B)`
                            : `linear-gradient(90deg,${b.color},${b.color}88)` }}/>
                    </div>
                    <div style={{ display:'flex', justifyContent:'space-between', marginTop:'4px' }}>
                      <span style={{ fontSize:'10px', color:'#94A3B8' }}>{Math.round(pct)}% used</span>
                      <span style={{ fontSize:'10px', color: over?'#DC2626':'#94A3B8' }}>
                        {over ? `$${(b.spent-b.budget).toFixed(0)} over` : `$${(b.budget-b.spent).toFixed(0)} left`}
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Budget summary + tips */}
          <div style={{ display:'flex', flexDirection:'column', gap:'16px' }}>
            <div style={{ background:'linear-gradient(135deg,#7C3AED,#6366F1)', borderRadius:'20px',
              padding:'24px', color:'white' }}>
              <p style={{ fontSize:'13px', opacity:.75, marginBottom:'8px' }}>Total budget</p>
              <p style={{ fontSize:'36px', fontWeight:'800', letterSpacing:'-.5px' }}>
                ${BUDGET_CATS.reduce((s,b)=>s+b.budget,0).toLocaleString()}
              </p>
              <div style={{ marginTop:'16px', display:'flex', gap:'16px' }}>
                {[
                  { l:'Spent',     v:`$${BUDGET_CATS.reduce((s,b)=>s+b.spent,0).toFixed(0)}` },
                  { l:'Remaining', v:`$${BUDGET_CATS.reduce((s,b)=>s+(b.budget-b.spent),0).toFixed(0)}` },
                ].map((x,i)=>(
                  <div key={i}>
                    <p style={{ fontSize:'18px', fontWeight:'700' }}>{x.v}</p>
                    <p style={{ fontSize:'11px', opacity:.65 }}>{x.l}</p>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ background:'white', borderRadius:'20px', padding:'22px',
              boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' }}>
              <h3 style={{ fontSize:'14px', fontWeight:'700', color:'#0F172A', marginBottom:'14px' }}>💡 Insights</h3>
              {[
                { icon:'✅', text:'Groceries on track — 39% of budget used midway through the month.' },
                { icon:'⚠️', text:'Subscriptions at 91% of budget with 29 days left. Consider auditing.' },
                { icon:'💰', text:`You're saving ${savingsRate}% of income — above the recommended 20%.` },
                { icon:'🔁', text:'Adobe CC ($54.99) is your largest single subscription. Annual plan saves 17%.' },
              ].map((tip,i)=>(
                <div key={i} style={{ display:'flex', gap:'10px', padding:'10px 0',
                  borderBottom: i<3 ? '1px solid #F8FAFC' : 'none' }}>
                  <span style={{ fontSize:'16px', flexShrink:0 }}>{tip.icon}</span>
                  <p style={{ fontSize:'12px', color:'#374151', lineHeight:'1.5' }}>{tip.text}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ════ INCOME TAB ════ */}
      {tab==='income' && (
        <div>
          {/* Add income form */}
          {showIncome && (
            <div style={{ background:'white', borderRadius:'16px', padding:'20px', marginBottom:'20px',
              boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' }}>
              <h3 style={{ fontSize:'14px', fontWeight:'700', color:'#0F172A', marginBottom:'14px' }}>Add Income Source</h3>
              <div style={{ display:'grid', gridTemplateColumns: mobile ? '1fr' : '1fr 1fr 1fr auto', gap:'10px', alignItems:'end' }}>
                <div>
                  <label style={{ fontSize:'11px', fontWeight:'600', color:'#64748B', display:'block', marginBottom:'4px' }}>Source name</label>
                  <input value={incForm.name} onChange={e=>setIncForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Centrelink" style={inp}/>
                </div>
                <div>
                  <label style={{ fontSize:'11px', fontWeight:'600', color:'#64748B', display:'block', marginBottom:'4px' }}>Amount ($)</label>
                  <input type="number" value={incForm.amount} onChange={e=>setIncForm(f=>({...f,amount:e.target.value}))} placeholder="1200" style={inp}/>
                </div>
                <div>
                  <label style={{ fontSize:'11px', fontWeight:'600', color:'#64748B', display:'block', marginBottom:'4px' }}>Frequency</label>
                  <select value={incForm.frequency} onChange={e=>setIncForm(f=>({...f,frequency:e.target.value}))} style={{...inp, cursor:'pointer'}}>
                    <option value="weekly">Weekly</option>
                    <option value="fortnightly">Fortnightly</option>
                    <option value="monthly">Monthly</option>
                    <option value="yearly">Yearly</option>
                  </select>
                </div>
                <div style={{ display:'flex', gap:'8px' }}>
                  <button onClick={addIncome} style={{ padding:'9px 18px', borderRadius:'10px', border:'none',
                    background:'linear-gradient(135deg,#059669,#10B981)', color:'white', fontSize:'13px', fontWeight:'600', cursor:'pointer' }}>Add</button>
                  <button onClick={()=>setShowIncome(false)} style={{ padding:'9px 14px', borderRadius:'10px', border:'1px solid #E2E8F0',
                    background:'white', fontSize:'13px', color:'#64748B', cursor:'pointer' }}>Cancel</button>
                </div>
              </div>
            </div>
          )}

          {!showIncome && (
            <button onClick={()=>setShowIncome(true)} style={{ display:'flex', alignItems:'center', gap:'6px',
              background:'linear-gradient(135deg,#059669,#10B981)', color:'white', border:'none',
              borderRadius:'11px', padding:'10px 18px', fontSize:'13px', fontWeight:'600', cursor:'pointer', marginBottom:'20px' }}>
              <IcoPlus /> Add Income Source
            </button>
          )}

          {/* Monthly total hero */}
          <div style={{ background:'linear-gradient(135deg,#059669,#10B981)', borderRadius:'20px', padding:'28px',
            color:'white', marginBottom:'20px', position:'relative', overflow:'hidden' }}>
            <div style={{ position:'absolute', top:'-20px', right:'-10px', fontSize:'100px', opacity:.1 }}>💰</div>
            <p style={{ fontSize:'13px', opacity:.8, marginBottom:'6px' }}>Estimated monthly income</p>
            <p style={{ fontSize:'42px', fontWeight:'800', letterSpacing:'-1px' }}>${monthlyIncome.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0})}</p>
            <p style={{ fontSize:'13px', opacity:.7, marginTop:'6px' }}>{incomeSources.length} source{incomeSources.length!==1?'s':''} configured</p>
          </div>

          {/* Source list */}
          {incomeSources.length === 0 ? (
            <div style={{ background:'white', borderRadius:'18px', padding:'40px', textAlign:'center',
              boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' }}>
              <div style={{ fontSize:'40px', marginBottom:'12px' }}>💵</div>
              <p style={{ fontSize:'15px', fontWeight:'600', color:'#374151', marginBottom:'6px' }}>No income sources yet</p>
              <p style={{ fontSize:'13px', color:'#94A3B8' }}>Add your income sources like Centrelink, freelance work, etc.</p>
            </div>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:'12px' }}>
              {incomeSources.map(src => {
                const mo = src.amount * (FREQ_MULT[src.frequency]||1);
                return (
                  <div key={src.id} style={{ background:'white', borderRadius:'16px', padding:'18px 20px',
                    boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9',
                    display:'flex', alignItems:'center', gap:'14px' }}>
                    <div style={{ width:'44px', height:'44px', borderRadius:'12px', background:'#ECFDF5',
                      display:'flex', alignItems:'center', justifyContent:'center', fontSize:'20px', flexShrink:0 }}>
                      {src.emoji || '💰'}
                    </div>
                    <div style={{ flex:1 }}>
                      <p style={{ fontSize:'14px', fontWeight:'700', color:'#0F172A' }}>{src.name}</p>
                      <p style={{ fontSize:'12px', color:'#64748B' }}>
                        ${src.amount.toLocaleString()} {src.frequency} → <strong style={{ color:'#059669' }}>${mo.toFixed(0)}/mo</strong>
                      </p>
                    </div>
                    <button onClick={()=>deleteIncome(src.id)} style={{ background:'none', border:'none', cursor:'pointer',
                      fontSize:'16px', color:'#CBD5E1', padding:'4px' }}>✕</button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   PERSONAL LOCATION TRACKER
═══════════════════════════════════════ */
function PersonalLocationTracker({ user, onBack }) {
  const mobile = useIsMobile();
  const mapRef      = useRef(null);
  const mapInst     = useRef(null);
  const pathRef     = useRef(null);
  const [locStatus, setLocStatus]   = useState('loading');
  const [userLoc,   setUserLoc]     = useState(null);
  const [selDate,   setSelDate]     = useState('Apr 1, 2026');
  const [selPlace,  setSelPlace]    = useState(null);
  const [view,      setView]        = useState('timeline'); // 'timeline' | 'stats'
  const [searchQ,   setSearchQ]     = useState('');

  const dates    = Object.keys(LOCATION_HISTORY);
  const dayData  = LOCATION_HISTORY[selDate] || [];
  const filtered = searchQ
    ? dayData.filter(p => p.name.toLowerCase().includes(searchQ.toLowerCase()) || p.address.toLowerCase().includes(searchQ.toLowerCase()))
    : dayData;

  // Compute day stats
  const totalPlaces   = dayData.length;
  const totalMins     = dayData.reduce((s, p) => {
    if (p.duration === 'ongoing' || p.duration === 'now') return s + 60;
    const m = p.duration.match(/(\d+)h\s*(\d+)?m?/);
    if (!m) { const mm = p.duration.match(/(\d+)m/); return s + (mm ? +mm[1] : 0); }
    return s + (+m[1] || 0)*60 + (+m[2] || 0);
  }, 0);
  const totalHours    = Math.floor(totalMins / 60);
  const estMiles      = (totalPlaces * 1.4).toFixed(1);
  const homeTime      = dayData.filter(p=>p.category==='home').reduce((s,p)=>{
    const m = p.duration.match(/(\d+)h/); return s + (m ? +m[1] : 0);
  }, 0);

  // Geolocation
  useEffect(() => {
    if (!navigator.geolocation) { setLocStatus('demo'); return; }
    navigator.geolocation.getCurrentPosition(
      pos => { setUserLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude }); setLocStatus('granted'); },
      ()  => setLocStatus('demo')
    );
  }, []);

  // Build / rebuild map whenever date changes
  useEffect(() => {
    if (!mapRef.current || !window.L) return;
    if (mapInst.current) { mapInst.current.remove(); mapInst.current = null; }

    const places = LOCATION_HISTORY[selDate] || [];
    const center = userLoc && selDate === 'Apr 1, 2026'
      ? [userLoc.lat, userLoc.lng]
      : [places[0]?.lat || -38.1499, places[0]?.lng || 144.3617];

    const map = window.L.map(mapRef.current, { zoomControl:true }).setView(center, 13);
    mapInst.current = map;

    window.L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution:'© <a href="https://openstreetmap.org">OSM</a> © <a href="https://carto.com">CARTO</a>', maxZoom:19,
    }).addTo(map);

    // Draw path polyline
    const coords = places.map(p => [p.lat, p.lng]);
    if (coords.length > 1) {
      window.L.polyline(coords, { color:'#6366F1', weight:3, opacity:.6, dashArray:'6 4' }).addTo(map);
    }

    // Markers
    places.forEach((p, i) => {
      const isFirst = i === 0;
      const isLast  = i === places.length - 1;
      const cat     = CAT_COLORS[p.category] || CAT_COLORS.home;
      const isNow   = p.departure === 'now' || p.departure === 'ongoing';

      const icon = window.L.divIcon({
        html: `<div style="position:relative;width:38px;height:38px;">
          ${isNow ? `<div class="loc-pulse" style="position:absolute;inset:4px;border-radius:50%;background:#DC2626;opacity:.25;"></div>` : ''}
          <div style="position:absolute;inset:0;background:${isNow ? '#DC2626' : cat.bg.replace('22','')};
            color:${isNow ? 'white' : cat.color};border-radius:50%;border:2.5px solid ${isNow ? '#DC2626' : cat.color};
            display:flex;align-items:center;justify-content:center;font-size:16px;
            box-shadow:0 2px 8px rgba(0,0,0,.2);">${p.emoji}</div>
          <div style="position:absolute;top:-6px;right:-4px;background:${isNow?'#DC2626':'#374151'};
            color:white;border-radius:100px;padding:1px 5px;font-size:9px;font-weight:700;white-space:nowrap;">
            ${isNow ? 'NOW' : i + 1}
          </div>
        </div>`,
        className:'', iconSize:[38,38], iconAnchor:[19,19],
      });

      window.L.marker([p.lat, p.lng], { icon })
        .addTo(map)
        .bindPopup(`<div style="font-weight:700;font-size:14px;">${p.emoji} ${p.name}</div>
          <div style="color:#64748B;font-size:12px;margin-top:4px;">${p.address}</div>
          <div style="color:#94A3B8;font-size:11px;margin-top:6px;">
            ${p.arrival} → ${p.departure === 'now' ? '<b style="color:#DC2626">Now</b>' : p.departure}
            &nbsp;·&nbsp; ${p.duration}
          </div>`);
    });

    // Fit bounds
    if (coords.length > 1) {
      try { map.fitBounds(coords, { padding:[32,32] }); } catch(_){}
    }

    return () => { if (mapInst.current) { mapInst.current.remove(); mapInst.current = null; } };
  }, [selDate, locStatus]);

  const flyTo = (p) => {
    setSelPlace(p);
    if (mapInst.current) mapInst.current.flyTo([p.lat, p.lng], 16, { animate:true, duration:.9 });
  };

  const inputStyle = { padding:'9px 14px', borderRadius:'10px', border:'1.5px solid #E2E8F0',
    fontSize:'13px', background:'white', outline:'none', fontFamily:'Inter,sans-serif' };

  return (
    <div className="fade-up" style={{ maxWidth:'1200px', margin:'0 auto', padding: mobile ? '0 0 40px' : '0 32px 60px' }}>

      {/* ── Header ── */}
      <div style={{ display:'flex', alignItems:'center', gap:'12px', marginBottom:'20px', flexWrap:'wrap' }}>
        <button onClick={onBack} style={{ display:'flex', alignItems:'center', gap:'6px',
          padding:'8px 14px', borderRadius:'10px', border:'1px solid #E2E8F0',
          background:'white', fontSize:'13px', fontWeight:'500', color:'#374151', cursor:'pointer' }}>
          <IcoBack /> Dashboard
        </button>
        <div style={{ flex:1 }}>
          <h1 style={{ fontSize: mobile ? '20px' : '26px', fontWeight:'800', color:'#0F172A', letterSpacing:'-.4px' }}>
            🗺️ My Location
          </h1>
          {!mobile && <p style={{ fontSize:'13px', color:'#64748B' }}>Your personal location history — private to you</p>}
        </div>
        {locStatus==='granted' && (
          <div style={{ display:'flex', alignItems:'center', gap:'7px', background:'#F0FDF4',
            border:'1px solid #BBF7D0', borderRadius:'10px', padding:'8px 14px' }}>
            <div style={{ width:'7px', height:'7px', borderRadius:'50%', background:'#10B981' }}/>
            <span style={{ fontSize:'12px', color:'#14532D', fontWeight:'600' }}>GPS Active</span>
          </div>
        )}
      </div>

      {/* ── Stats bar ── */}
      <div style={{ display:'grid', gridTemplateColumns: mobile ? 'repeat(3,1fr)' : 'repeat(5,1fr)', gap: mobile ? '10px' : '14px', marginBottom:'20px' }}>
        {[
          { icon:'📍', label:'Places today',   val:totalPlaces,          c:'#6366F1' },
          { icon:'⏱️', label:'Hours tracked',  val:`${totalHours}h`,     c:'#2563EB' },
          { icon:'🚗', label:'Est. miles',      val:estMiles,             c:'#0891B2' },
          { icon:'🏠', label:'Home time',       val:`${homeTime}h`,       c:'#7C3AED' },
          { icon:'📅', label:'Days logged',     val:dates.length,         c:'#DC2626' },
        ].map((s,i) => (
          <div key={i} style={{ background:'white', borderRadius:'14px', padding: mobile ? '12px' : '16px 18px',
            boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' }}>
            <div style={{ fontSize:'18px', marginBottom:'6px' }}>{s.icon}</div>
            <div style={{ fontSize: mobile ? '18px' : '22px', fontWeight:'800', color:s.c, letterSpacing:'-.4px' }}>{s.val}</div>
            <div style={{ fontSize:'11px', color:'#94A3B8', marginTop:'3px' }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* ── Main grid ── */}
      <div style={{ display:'grid', gridTemplateColumns: mobile ? '1fr' : '1fr 380px', gap:'24px' }}>

        {/* Left: Map */}
        <div style={{ display:'flex', flexDirection:'column', gap:'16px' }}>
          {/* Date picker row */}
          <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
            <label style={{ fontSize:'13px', fontWeight:'600', color:'#374151', whiteSpace:'nowrap' }}>Viewing:</label>
            <div style={{ display:'flex', gap:'6px', flexWrap:'wrap' }}>
              {dates.map(d => (
                <button key={d} onClick={() => { setSelDate(d); setSelPlace(null); }}
                  style={{ padding:'6px 14px', borderRadius:'100px', border:'none', cursor:'pointer',
                    fontSize:'12px', fontWeight:'600', transition:'all .15s',
                    background: selDate===d ? '#DC2626' : '#F1F5F9',
                    color:      selDate===d ? 'white'   : '#64748B' }}>
                  {d}
                </button>
              ))}
            </div>
          </div>

          {/* Map */}
          <div ref={mapRef} style={{ width:'100%', height:'440px', borderRadius:'20px',
            boxShadow:'0 4px 24px rgba(0,0,0,.1)', border:'1px solid #E2E8F0', overflow:'hidden' }}/>

          {/* Category legend */}
          <div style={{ display:'flex', gap:'8px', flexWrap:'wrap' }}>
            {Object.entries(CAT_COLORS).map(([k,v]) => (
              <div key={k} style={{ display:'flex', alignItems:'center', gap:'5px',
                background:v.bg, borderRadius:'100px', padding:'4px 10px',
                border:`1px solid ${v.color}33` }}>
                <span style={{ fontSize:'10px', fontWeight:'700', color:v.color }}>{v.label}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Right: Timeline / Stats */}
        <div style={{ display:'flex', flexDirection:'column' }}>
          {/* Toggle */}
          <div style={{ display:'flex', gap:'4px', background:'#F1F5F9', padding:'4px',
            borderRadius:'12px', marginBottom:'16px' }}>
            {[{id:'timeline',label:'Timeline'},{id:'stats',label:'Top Places'}].map(p => (
              <button key={p.id} className="tab-btn" onClick={()=>setView(p.id)} style={{
                flex:1, padding:'8px', borderRadius:'8px', fontSize:'13px',
                background: view===p.id ? 'white' : 'transparent',
                color:       view===p.id ? '#0F172A' : '#64748B',
                fontWeight:  view===p.id ? '700' : '400',
                boxShadow:   view===p.id ? '0 1px 3px rgba(0,0,0,.08)' : 'none',
              }}>{p.label}</button>
            ))}
          </div>

          {/* ── TIMELINE VIEW ── */}
          {view==='timeline' && (
            <div style={{ flex:1 }}>
              <input value={searchQ} onChange={e=>setSearchQ(e.target.value)}
                placeholder="🔍  Search places…"
                style={{ ...inputStyle, width:'100%', marginBottom:'16px' }} />

              <div style={{ position:'relative' }}>
                {/* vertical line */}
                <div style={{ position:'absolute', left:'18px', top:0, bottom:0, width:'2px',
                  background:'linear-gradient(to bottom, #E2E8F0, #F8FAFC)', zIndex:0 }}/>

                <div style={{ display:'flex', flexDirection:'column', gap:'4px' }}>
                  {filtered.map((p, i) => {
                    const cat  = CAT_COLORS[p.category] || CAT_COLORS.home;
                    const isSel = selPlace?.id === p.id;
                    const isNow = p.departure === 'now' || p.departure === 'ongoing';
                    return (
                      <div key={p.id} onClick={() => flyTo(p)}
                        style={{ display:'flex', gap:'14px', cursor:'pointer',
                          padding:'10px 12px 10px 0', borderRadius:'14px',
                          background: isSel ? cat.bg : 'transparent',
                          transition:'background .15s', position:'relative', zIndex:1 }}>
                        {/* dot */}
                        <div style={{ flexShrink:0, width:'38px', display:'flex', justifyContent:'center', paddingTop:'2px' }}>
                          <div style={{ width:'36px', height:'36px', borderRadius:'50%',
                            background: isSel ? cat.color : '#F1F5F9',
                            color: isSel ? 'white' : '#374151',
                            display:'flex', alignItems:'center', justifyContent:'center',
                            fontSize:'16px', border:`2px solid ${isSel ? cat.color : '#E2E8F0'}`,
                            boxShadow: isNow ? `0 0 0 4px ${cat.bg}` : 'none',
                            transition:'all .2s' }}>
                            {p.emoji}
                          </div>
                        </div>
                        {/* content */}
                        <div style={{ flex:1, paddingTop:'4px' }}>
                          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                            <div>
                              <p style={{ fontSize:'13px', fontWeight:'700', color:'#0F172A', lineHeight:1.2 }}>{p.name}</p>
                              <p style={{ fontSize:'11px', color:'#94A3B8', marginTop:'2px' }}>{p.address}</p>
                            </div>
                            {isNow && (
                              <div style={{ display:'flex', alignItems:'center', gap:'4px',
                                background:'#FEF2F2', border:'1px solid #FECACA',
                                borderRadius:'100px', padding:'2px 8px', flexShrink:0 }}>
                                <div style={{ width:'5px', height:'5px', borderRadius:'50%', background:'#DC2626' }}/>
                                <span style={{ fontSize:'10px', fontWeight:'700', color:'#DC2626' }}>NOW</span>
                              </div>
                            )}
                          </div>
                          <div style={{ display:'flex', alignItems:'center', gap:'8px', marginTop:'5px', flexWrap:'wrap' }}>
                            <span style={{ fontSize:'11px', color:'#64748B' }}>
                              {p.arrival} → {isNow ? 'ongoing' : p.departure}
                            </span>
                            <span style={{ fontSize:'10px', fontWeight:'600', padding:'2px 7px',
                              borderRadius:'100px', background:cat.bg, color:cat.color }}>
                              {p.duration}
                            </span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {filtered.length === 0 && (
                <div style={{ textAlign:'center', padding:'40px', color:'#94A3B8', fontSize:'14px' }}>
                  No places match "{searchQ}"
                </div>
              )}
            </div>
          )}

          {/* ── STATS VIEW ── */}
          {view==='stats' && (
            <div>
              <p style={{ fontSize:'13px', color:'#94A3B8', marginBottom:'16px' }}>
                Your most visited places this month

/* ═══════════════════════════════════════
   LIVE LOCATION TRACKER
═══════════════════════════════════════ */
function LiveLocationTracker({ user, onBack }) {
  const mapRef      = useRef(null);
  const mapInst     = useRef(null);
  const markerRef   = useRef(null);
  const polyRef     = useRef(null);
  const watchIdRef  = useRef(null);

  const [tracking,   setTracking]   = useState(false);
  const [currentPos, setCurrentPos] = useState(null);
  const [history,    setHistory]    = useLocalStorage('lifeos_gps_history', []);
  const [error,      setError]      = useState(null);

  // Draw polyline trail from history
  const updateTrail = (hist) => {
    if (!mapInst.current || !window.L) return;
    const coords = hist.slice().reverse().map(h => [h.lat, h.lng]);
    if (coords.length < 2) return;
    if (polyRef.current) polyRef.current.setLatLngs(coords);
    else {
      polyRef.current = window.L.polyline(coords, {
        color: '#6366F1', weight: 4, opacity: 0.7, smoothFactor: 1, dashArray: '8 6',
      }).addTo(mapInst.current);
    }
  };

  // Init map once — center on last known position or Geelong default
  useEffect(() => {
    if (!mapRef.current || !window.L || mapInst.current) return;
    const lastPos = history.length > 0 ? [history[0].lat, history[0].lng] : [-38.1499, 144.3617];
    const map = window.L.map(mapRef.current, { zoomControl: true }).setView(lastPos, 14);
    mapInst.current = map;
    window.L.tileLayer('https://cartodb-basemaps-a.global.ssl.fastly.net/dark_all/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://openstreetmap.org">OSM</a> © <a href="https://carto.com">CARTO</a>',
      maxZoom: 19,
    }).addTo(map);
    // Draw existing trail on load
    if (history.length > 0) updateTrail(history);
    return () => { if (mapInst.current) { mapInst.current.remove(); mapInst.current = null; polyRef.current = null; } };
  }, []);

  const clearHistory = () => { setHistory([]); if (polyRef.current) { polyRef.current.remove(); polyRef.current = null; } };

  const startTracking = () => {
    if (!navigator.geolocation) { setError('Geolocation is not supported by your browser.'); return; }
    setError(null);
    setTracking(true);
    watchIdRef.current = navigator.geolocation.watchPosition(
      (pos) => {
        const { latitude: lat, longitude: lng, accuracy, speed } = pos.coords;
        const ts = new Date().toLocaleTimeString();
        const dateStr = new Date().toLocaleDateString();
        setCurrentPos({ lat, lng, accuracy, speed, ts });
        setHistory(h => {
          const updated = [{ lat, lng, accuracy, speed, ts, date: dateStr, id: Date.now() }, ...h].slice(0, 500);
          updateTrail(updated);
          return updated;
        });
        if (mapInst.current) {
          if (!markerRef.current) {
            const icon = window.L.divIcon({
              html: `<div style="position:relative;width:42px;height:42px;">
                <div class="loc-pulse" style="position:absolute;inset:4px;border-radius:50%;background:#6366F1;opacity:.35;"></div>
                <div style="position:absolute;inset:0;background:#6366F1;border-radius:50%;border:3px solid white;
                  display:flex;align-items:center;justify-content:center;font-size:17px;
                  box-shadow:0 2px 14px rgba(99,102,241,.7);">📍</div>
              </div>`,
              className: '', iconSize: [42, 42], iconAnchor: [21, 21],
            });
            markerRef.current = window.L.marker([lat, lng], { icon }).addTo(mapInst.current);
          } else {
            markerRef.current.setLatLng([lat, lng]);
          }
          mapInst.current.flyTo([lat, lng], 16, { animate: true, duration: 0.8 });
        }
      },
      (err) => { setError(`GPS error: ${err.message}`); setTracking(false); },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
    );
  };

  const stopTracking = () => {
    if (watchIdRef.current !== null) {
      navigator.geolocation.clearWatch(watchIdRef.current);
      watchIdRef.current = null;
    }
    setTracking(false);
  };

  useEffect(() => {
    return () => { if (watchIdRef.current !== null) navigator.geolocation.clearWatch(watchIdRef.current); };
  }, []);

  return (
    <div className="fade-up" style={{ maxWidth: '1200px', margin: '0 auto', padding: '0 32px 60px' }}>

      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: '16px', marginBottom: '24px' }}>
        <button onClick={onBack} style={{ display: 'flex', alignItems: 'center', gap: '6px',
          padding: '8px 14px', borderRadius: '10px', border: '1px solid #E2E8F0',
          background: 'white', fontSize: '13px', fontWeight: '500', color: '#374151', cursor: 'pointer' }}>
          <IcoBack /> Dashboard
        </button>
        <div style={{ flex: 1 }}>
          <h1 style={{ fontSize: '26px', fontWeight: '800', color: '#0F172A', letterSpacing: '-.4px' }}>
            📍 Live Location
          </h1>
          <p style={{ fontSize: '13px', color: '#64748B' }}>Real-time GPS tracking — private to you</p>
        </div>
        {!tracking ? (
          <button onClick={startTracking} style={{
            background: 'linear-gradient(135deg,#6366F1,#8B5CF6)', color: 'white',
            border: 'none', borderRadius: '11px', padding: '10px 22px',
            fontSize: '14px', fontWeight: '700', cursor: 'pointer',
            boxShadow: '0 4px 14px rgba(99,102,241,.4)' }}>
            ▶ Start Tracking
          </button>
        ) : (
          <button onClick={stopTracking} style={{
            background: 'linear-gradient(135deg,#DC2626,#EF4444)', color: 'white',
            border: 'none', borderRadius: '11px', padding: '10px 22px',
            fontSize: '14px', fontWeight: '700', cursor: 'pointer',
            boxShadow: '0 4px 14px rgba(220,38,38,.4)' }}>
            ■ Stop Tracking
          </button>
        )}
        {history.length > 0 && !tracking && (
          <button onClick={clearHistory} style={{
            padding: '10px 18px', borderRadius: '11px', border: '1px solid #E2E8F0',
            background: 'white', fontSize: '13px', fontWeight: '600', color: '#64748B', cursor: 'pointer' }}>
            🗑 Clear History ({history.length})
          </button>
        )}
      </div>

      {/* Status pill */}
      {tracking && (
        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', background: '#F0FDF4',
          border: '1px solid #BBF7D0', borderRadius: '12px', padding: '10px 18px', marginBottom: '20px' }}>
          <div style={{ width: '8px', height: '8px', borderRadius: '50%', background: '#10B981' }}/>
          <span style={{ fontSize: '13px', color: '#14532D', fontWeight: '600' }}>Live GPS tracking active</span>
          {currentPos && <span style={{ fontSize: '12px', color: '#64748B', marginLeft: '8px' }}>
            Last fix: {currentPos.ts}
          </span>}
        </div>
      )}

      {error && (
        <div style={{ background: '#FEF2F2', border: '1px solid #FECACA', borderRadius: '12px',
          padding: '12px 18px', marginBottom: '20px', fontSize: '13px', color: '#DC2626' }}>
          ⚠️ {error}
        </div>
      )}

      {/* Map + Sidebar */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 340px', gap: '20px', alignItems: 'start' }}>

        {/* Dark map */}
        <div ref={mapRef} style={{ height: '520px', borderRadius: '20px',
          boxShadow: '0 4px 32px rgba(0,0,0,.2)', overflow: 'hidden',
          border: '1px solid #1E293B' }}/>

        {/* Sidebar */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>

          {/* Current position */}
          <div style={{ background: 'white', borderRadius: '18px', padding: '20px',
            boxShadow: '0 1px 4px rgba(0,0,0,.06)', border: '1px solid #F1F5F9' }}>
            <p style={{ fontSize: '11px', fontWeight: '700', color: '#94A3B8', marginBottom: '14px',
              textTransform: 'uppercase', letterSpacing: '.6px' }}>Current Position</p>
            {currentPos ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px' }}>
                {[
                  { label: 'Latitude',  val: currentPos.lat.toFixed(6), icon: '↕️' },
                  { label: 'Longitude', val: currentPos.lng.toFixed(6), icon: '↔️' },
                  { label: 'Accuracy',  val: `±${currentPos.accuracy?.toFixed(0) ?? '—'} m`, icon: '🎯' },
                  { label: 'Speed',     val: currentPos.speed != null ? `${(currentPos.speed * 3.6).toFixed(1)} km/h` : '—', icon: '💨' },
                  { label: 'Updated',   val: currentPos.ts, icon: '🕐' },
                ].map(({ label, val, icon }) => (
                  <div key={label} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '8px 10px', background: '#F8FAFC', borderRadius: '10px' }}>
                    <span style={{ fontSize: '12px', color: '#64748B' }}>{icon} {label}</span>
                    <span style={{ fontSize: '12px', fontWeight: '700', color: '#0F172A', fontVariantNumeric: 'tabular-nums' }}>{val}</span>
                  </div>
                ))}
              </div>
            ) : (
              <div style={{ textAlign: 'center', padding: '20px 0', color: '#CBD5E1' }}>
                <div style={{ fontSize: '32px', marginBottom: '8px' }}>📍</div>
                <p style={{ fontSize: '13px' }}>Press Start Tracking to begin</p>
              </div>
            )}
          </div>

          {/* History log */}
          <div style={{ background: 'white', borderRadius: '18px', padding: '20px',
            boxShadow: '0 1px 4px rgba(0,0,0,.06)', border: '1px solid #F1F5F9' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px' }}>
              <p style={{ fontSize: '11px', fontWeight: '700', color: '#94A3B8',
                textTransform: 'uppercase', letterSpacing: '.6px' }}>Location Log</p>
              {history.length > 0 && (
                <span style={{ fontSize: '11px', color: '#CBD5E1' }}>{history.length} pts</span>
              )}
            </div>
            <div style={{ overflowY: 'auto', maxHeight: '260px', display: 'flex', flexDirection: 'column', gap: '6px' }}>
              {history.length === 0 ? (
                <p style={{ fontSize: '13px', color: '#CBD5E1', textAlign: 'center', padding: '20px 0' }}>
                  No history yet
                </p>
              ) : history.map((h, i) => (
                <div key={h.id} className={i === 0 ? 'slide-in' : ''} style={{ padding: '8px 10px',
                  background: i === 0 ? '#EEF2FF' : '#F8FAFC', borderRadius: '10px',
                  border: i === 0 ? '1px solid #C7D2FE' : '1px solid transparent' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <span style={{ fontSize: '11px', fontWeight: '700', color: i === 0 ? '#4F46E5' : '#374151', fontVariantNumeric: 'tabular-nums' }}>
                      {h.lat.toFixed(5)}, {h.lng.toFixed(5)}
                    </span>
                    <span style={{ fontSize: '10px', color: '#94A3B8' }}>{h.ts}</span>
                  </div>
                  <div style={{ fontSize: '10px', color: '#94A3B8', marginTop: '2px' }}>
                    ±{h.accuracy?.toFixed(0) ?? '?'}m
                    {h.speed != null && ` · ${(h.speed * 3.6).toFixed(1)} km/h`}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

                  <input value={invForm.client} onChange={e=>setInvForm(f=>({...f,client:e.target.value}))} placeholder="Client name" style={{padding:'8px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>

                </div>
                <div style={{display:'flex',gap:'8px'}}>
                  <button onClick={()=>setShowInvForm(false)} style={{flex:1,padding:'8px',borderRadius:'9px',border:'1px solid #E2E8F0',background:'white',cursor:'pointer',fontSize:'12px',fontFamily:'Inter,sans-serif'}}>Cancel</button>
                  <button onClick={addInvoice} style={{flex:1,padding:'8px',borderRadius:'9px',border:'none',background:'#2563EB',color:'white',cursor:'pointer',fontSize:'12px',fontWeight:'600',fontFamily:'Inter,sans-serif'}}>Create Invoice</button>

              <div key={inv.id} className="exp-row" style={{display:'flex',alignItems:'center',gap:'14px',padding:'14px 22px',borderBottom:i<invoices.length-1?'1px solid #F8FAFC':'none',transition:'background .15s'}}>

                <div style={{flex:1}}>
                  <p style={{fontSize:'13px',fontWeight:'700',color:'#0F172A'}}>{inv.num}</p>
                  <p style={{fontSize:'11px',color:'#94A3B8'}}>{inv.client} · Issued {inv.issued} · Due {inv.due}</p>
                </div>
                <div style={{textAlign:'right'}}>
                  <p style={{fontSize:'15px',fontWeight:'800',color:'#0F172A'}}>${inv.amount.toLocaleString()}</p>
                  <span style={{fontSize:'10px',fontWeight:'700',padding:'2px 9px',borderRadius:'100px',background:invColor[inv.status]+'18',color:invColor[inv.status],border:`1px solid ${invColor[inv.status]}33`}}>{inv.status.toUpperCase()}</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'14px'}}>
            {[{label:'Paid',      color:'#059669', ids:['paid']   },{label:'Pending', color:'#F59E0B', ids:['pending']},{label:'Overdue', color:'#DC2626', ids:['overdue']},{label:'Draft',   color:'#94A3B8', ids:['draft']  }].map(s=>{
              const total=invoices.filter(i=>s.ids.includes(i.status)).reduce((sum,i)=>sum+i.amount,0);
              return(
                <div key={s.label} style={{background:'white',borderRadius:'16px',padding:'18px 20px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #F1F5F9',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div><p style={{fontSize:'12px',color:'#64748B'}}>{s.label}</p><p style={{fontSize:'20px',fontWeight:'800',color:s.color,letterSpacing:'-.3px'}}>${total.toLocaleString()}</p></div>
                  <div style={{width:'40px',height:'40px',borderRadius:'12px',background:s.color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px'}}>
                    {s.label==='Paid'?'✅':s.label==='Pending'?'⏳':s.label==='Overdue'?'⚠️':'📝'}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function CalendarSection({ onBack }) {
  const mobile = useIsMobile();
  const [view,    setView]   = useState('month');
  const [selDay,  setSelDay] = useState('2026-04-01');
  const [selEvt,  setSelEvt] = useState(null);
  const [calEvents, setCalEvents] = useLocalStorage('lifeos_cal_events', CAL_EVENTS);
  const [showForm, setShowForm] = useState(false);
  const [evtForm, setEvtForm] = useState({ title:'', date:'', time:'', end:'', type:'personal' });
  const TYPE_COLOR = {work:'#2563EB',kids:'#F59E0B',personal:'#7C3AED',health:'#DC2626'};
  const typeColors = {work:'#2563EB',kids:'#F59E0B',personal:'#7C3AED',health:'#DC2626'};
  const dayEvents = (d) => calEvents.filter(e=>e.date===d);
  const selEvents = dayEvents(selDay);
  const upcoming  = [...calEvents].sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time)).filter(e=>e.date>='2026-04-01').slice(0,6);

  const addCalEvent = () => {
    if (!evtForm.title || !evtForm.date) return;
    setCalEvents(prev=>[...prev,{id:Date.now(),title:evtForm.title,date:evtForm.date,time:evtForm.time||'',end:evtForm.end||'',color:typeColors[evtForm.type]||'#7C3AED',type:evtForm.type}]);
    setEvtForm({ title:'', date:'', time:'', end:'', type:'personal' });
    setShowForm(false);
  };

  return (
    <div className="fade-up" style={{maxWidth:'1100px',margin:'0 auto',padding: mobile ? '0 0 40px' : '0 32px 60px'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px',flexWrap:'wrap'}}>
        <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:'6px',padding:'8px 14px',borderRadius:'10px',border:'1px solid #E2E8F0',background:'white',fontSize:'13px',fontWeight:'500',color:'#374151',cursor:'pointer'}}><IcoBack/>Dashboard</button>
        <div style={{flex:1}}><h1 style={{fontSize: mobile ? '20px' : '26px',fontWeight:'800',color:'#0F172A',letterSpacing:'-.4px'}}>📅 Calendar</h1>{!mobile && <p style={{fontSize:'13px',color:'#64748B'}}>April 2026 · {calEvents.length} events</p>}</div>
        {!mobile && <div style={{display:'flex',alignItems:'center',gap:'8px',background:'#EFF6FF',border:'1px solid #BFDBFE',borderRadius:'10px',padding:'8px 14px'}}>
          <span style={{fontSize:'14px'}}>🔗</span><span style={{fontSize:'12px',color:'#1D4ED8',fontWeight:'600'}}>Connect Google Calendar</span>
        </div>}
        <button onClick={()=>setShowForm(v=>!v)} style={{display:'flex',alignItems:'center',gap:'6px',background:'linear-gradient(135deg,#0891B2,#06B6D4)',color:'white',border:'none',borderRadius:'11px',padding:'10px 18px',fontSize:'13px',fontWeight:'600',cursor:'pointer'}}><IcoPlus/>{mobile ? 'Add' : 'Add Event'}</button>
      </div>

      {showForm && (
        <div className="fade-up" style={{background:'white',borderRadius:'16px',padding:'20px',marginBottom:'20px',border:'1px solid #BAE6FD',boxShadow:'0 4px 16px rgba(8,145,178,.08)'}}>
          <p style={{fontSize:'14px',fontWeight:'700',color:'#0F172A',marginBottom:'14px'}}>➕ New Event</p>
          <div style={{display:'grid',gridTemplateColumns: mobile ? '1fr' : '1fr 140px 80px 80px auto',gap:'10px',marginBottom:'12px'}}>

            <input value={evtForm.date}  onChange={e=>setEvtForm(f=>({...f,date:e.target.value}))}  placeholder="2026-04-15"  style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
            <input value={evtForm.time}  onChange={e=>setEvtForm(f=>({...f,time:e.target.value}))}  placeholder="14:00"       style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>
            <input value={evtForm.end}   onChange={e=>setEvtForm(f=>({...f,end:e.target.value}))}   placeholder="15:00"       style={{padding:'9px 12px',borderRadius:'9px',border:'1px solid #E2E8F0',fontSize:'13px',fontFamily:'Inter,sans-serif',outline:'none'}}/>

          <div style={{display:'flex',gap:'8px'}}>
            <button onClick={()=>setShowForm(false)} style={{flex:1,padding:'9px',borderRadius:'9px',border:'1px solid #E2E8F0',background:'white',cursor:'pointer',fontSize:'13px',fontFamily:'Inter,sans-serif'}}>Cancel</button>

            {[...Array(APR_START_DOW)].map((_,i)=><div key={`e${i}`}/>)}
            {Array.from({length:30},(_,i)=>{
              const d = i+1;
              const dateStr = `2026-04-${String(d).padStart(2,'0')}`;
              const evts = dayEvents(dateStr);
              const isSel = selDay===dateStr;
              const isToday = d===1;
              return (
                <div key={d} onClick={()=>setSelDay(dateStr)} style={{borderRadius:'10px',padding:'6px 4px',cursor:'pointer',background:isSel?'#0F172A':isToday?'#EFF6FF':'transparent',border:`1.5px solid ${isSel?'#0F172A':isToday?'#BFDBFE':'transparent'}`,transition:'all .15s',minHeight: mobile ? '44px' : '60px'}}
                  onMouseEnter={e=>{if(!isSel)e.currentTarget.style.background='#F8FAFC'}}
                  onMouseLeave={e=>{if(!isSel)e.currentTarget.style.background=isToday?'#EFF6FF':'transparent'}}>
                  <div style={{textAlign:'center',fontSize:'13px',fontWeight:isToday||isSel?'800':'500',color:isSel?'white':isToday?'#2563EB':'#374151',marginBottom:'4px'}}>{d}</div>
                  <div style={{display:'flex',flexDirection:'column',gap:'2px'}}>
                    {evts.slice(0,2).map(ev=>(
                      <div key={ev.id} style={{fontSize:'9px',fontWeight:'600',borderRadius:'3px',padding:'1px 4px',background:isSel?'rgba(255,255,255,.25)':ev.color+'22',color:isSel?'white':ev.color,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.title.split(' ')[0]}</div>
                    ))}
                    {evts.length>2 && <div style={{fontSize:'9px',color:isSel?'rgba(255,255,255,.7)':'#94A3B8',textAlign:'center'}}>+{evts.length-2}</div>}
                  </div>
                </div>
              );
            })}
          </div>
          </>) : (<>
          {/* ── WEEK VIEW ── */}
          {(() => {
            const selDate = new Date(selDay + 'T12:00');
            const dow = selDate.getDay();
            const weekStart = new Date(selDate); weekStart.setDate(selDate.getDate() - dow);
            const days = Array.from({length:7},(_,i)=>{ const d=new Date(weekStart); d.setDate(weekStart.getDate()+i); return d; });
            const DAY_LABELS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            return (
              <div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'4px',marginBottom:'4px'}}>
                  {days.map((d,i)=>{
                    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    const isSel = selDay===ds; const isToday = ds==='2026-04-01';
                    return(
                      <div key={i} onClick={()=>setSelDay(ds)} style={{cursor:'pointer',textAlign:'center',padding:'8px 2px',borderRadius:'10px',background:isSel?'#0F172A':isToday?'#EFF6FF':'transparent',border:`1.5px solid ${isSel?'#0F172A':isToday?'#BFDBFE':'transparent'}`,transition:'all .15s'}}>
                        <div style={{fontSize:'10px',fontWeight:'700',color:isSel?'rgba(255,255,255,.7)':'#94A3B8',marginBottom:'2px'}}>{DAY_LABELS[i]}</div>
                        <div style={{fontSize:'15px',fontWeight:'800',color:isSel?'white':isToday?'#2563EB':'#374151'}}>{d.getDate()}</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{marginTop:'12px',display:'flex',flexDirection:'column',gap:'6px'}}>
                  {days.map((d,i)=>{
                    const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                    const evts=dayEvents(ds);
                    if(!evts.length) return null;
                    return evts.map(ev=>(
                      <div key={ev.id} onClick={()=>setSelDay(ds)} style={{display:'flex',alignItems:'center',gap:'10px',padding:'10px 14px',borderRadius:'12px',background:ev.color+'12',border:`1px solid ${ev.color}33`,cursor:'pointer'}}>
                        <div style={{width:'3px',alignSelf:'stretch',borderRadius:'2px',background:ev.color,flexShrink:0}}/>
                        <div style={{flex:1}}>
                          <p style={{fontSize:'13px',fontWeight:'600',color:'#0F172A'}}>{ev.title}</p>
                          <p style={{fontSize:'11px',color:'#64748B'}}>{DAY_LABELS[d.getDay()]} · {ev.time}{ev.end?` – ${ev.end}`:''}</p>
                        </div>
                        <div style={{width:'32px',height:'32px',borderRadius:'8px',background:ev.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px'}}>
                          {ev.type==='work'?'💼':ev.type==='kids'?'👧':ev.type==='health'?'💪':'📅'}
                        </div>
                      </div>
                    ));
                  })}
                  {days.every(d=>{const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;return !dayEvents(ds).length;}) && (
                    <div style={{textAlign:'center',padding:'32px',color:'#94A3B8',fontSize:'13px'}}>No events this week 🎉</div>
                  )}
                </div>
              </div>
            );
          })()}
          </>)}
          {/* Type legend */}
          <div style={{display:'flex',gap:'14px',marginTop:'20px',paddingTop:'16px',borderTop:'1px solid #F8FAFC',flexWrap:'wrap'}}>
            {Object.entries(TYPE_COLOR).map(([k,c])=>(
              <div key={k} style={{display:'flex',alignItems:'center',gap:'5px'}}>
                <div style={{width:'10px',height:'10px',borderRadius:'3px',background:c}}/>
                <span style={{fontSize:'11px',color:'#64748B',textTransform:'capitalize'}}>{k}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Right panel */}
        <div style={{display:'flex',flexDirection:'column',gap:'16px'}}>
          {/* Selected day events */}
          <div style={{background:'white',borderRadius:'20px',padding:'22px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #F1F5F9'}}>
            <h3 style={{fontSize:'14px',fontWeight:'700',color:'#0F172A',marginBottom:'14px'}}>
              {new Date(selDay+'T12:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}
            </h3>
            {selEvents.length===0
              ? <p style={{fontSize:'13px',color:'#94A3B8',textAlign:'center',padding:'20px 0'}}>No events · free day 🎉</p>
              : selEvents.map(ev=>(
                <div key={ev.id} style={{display:'flex',gap:'12px',padding:'10px 0',borderBottom:'1px solid #F8FAFC',cursor:'pointer'}} onClick={()=>setSelEvt(selEvt?.id===ev.id?null:ev)}>
                  <div style={{width:'3px',borderRadius:'3px',background:ev.color,flexShrink:0}}/>
                  <div>
                    <p style={{fontSize:'13px',fontWeight:'600',color:'#0F172A'}}>{ev.title}</p>
                    <p style={{fontSize:'11px',color:'#94A3B8'}}>{ev.time} – {ev.end}</p>
                  </div>
                </div>
              ))
            }
          </div>
          {/* Upcoming */}
          <div style={{background:'white',borderRadius:'20px',padding:'22px',boxShadow:'0 1px 4px rgba(0,0,0,.06)',border:'1px solid #F1F5F9'}}>
            <h3 style={{fontSize:'14px',fontWeight:'700',color:'#0F172A',marginBottom:'14px'}}>Coming up</h3>
            {upcoming.map(ev=>(
              <div key={ev.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'8px 0',borderBottom:'1px solid #F8FAFC'}}>
                <div style={{width:'34px',height:'34px',borderRadius:'10px',background:ev.color+'18',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px',border:`1.5px solid ${ev.color}33`,flexShrink:0}}>
                  {ev.type==='work'?'💼':ev.type==='kids'?'👧':ev.type==='health'?'💪':'📅'}
                </div>
                <div style={{flex:1}}>
                  <p style={{fontSize:'12px',fontWeight:'600',color:'#0F172A'}}>{ev.title}</p>
                  <p style={{fontSize:'11px',color:'#94A3B8'}}>{new Date(ev.date+'T12:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})} · {ev.time}</p>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}
