    /* ── Animations ── */

function greet(name) {
  const h = new Date().getHours();
  const tod = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  return `Good ${tod}, ${name} 👋`;
}

function routeVoice(text) {
  const t = text.toLowerCase();
  if (/expense|cost|pay|money|subscri|price|bill|rent|budget/.test(t))         return { label:'💳 Money', id:'money' };
  if (/pick up|drop off|lilly|skylah|mim|custody|exchange|school|pick up|drop off/.test(t))     return { label:'👨‍👧‍👦 Co-parenting', id:'coparenting' };
  if (/meeting|client|project|deadline|invoice|proposal|milestone/.test(t))    return { label:'🎯 Projects & Clients', id:'projects' };
  if (/remind|schedule|appointment|calendar|event|book|dentist/.test(t))       return { label:'📅 Calendar', id:'calendar' };
  if (/journal|feeling|today was|note to self|reflect|grateful|mood/.test(t)) return { label:'🎙️ Voice Journal', id:'journal' };
  if (/message|text|send|tell|email|contact/.test(t))                          return { label:'💬 Messages', id:'messages' };
  return { label:'✨ AI Assistant', id:'ai' };
}

/* ═══════════════════════════════════════
   LOCAL STORAGE HOOK (user-scoped)
   Each user's data is isolated by email.
   System keys (user, screen) are shared.
═══════════════════════════════════════ */
const UNSCOPED_KEYS = new Set(['lifeos_user', 'lifeos_screen']);

function getUserScopedKey(key) {
  if (UNSCOPED_KEYS.has(key)) return key;
  try {
    const raw = window.localStorage.getItem('lifeos_user');
    if (!raw || raw === 'null') return key;
    const u = JSON.parse(raw);
    return u && u.email ? key + ':' + u.email : key;
  } catch(e) { return key; }
}

function useLocalStorage(key, initialValue) {
  const scopedKey = getUserScopedKey(key);

  const [stored, setStored] = useState(() => {
    try {
      const item = window.localStorage.getItem(scopedKey);
      if (item !== null) return JSON.parse(item);
      // Migration: copy old unscoped data to new scoped key on first use
      if (scopedKey !== key) {
        const old = window.localStorage.getItem(key);
        if (old !== null) {
          window.localStorage.setItem(scopedKey, old);
          return JSON.parse(old);
        }
      }
      return initialValue;
    } catch(e) { return initialValue; }
  });

  const setValue = (value) => {
    try {
      const currentKey = getUserScopedKey(key);
      const val = value instanceof Function ? value(stored) : value;
      setStored(val);
      window.localStorage.setItem(currentKey, JSON.stringify(val));
    } catch(e) { console.error(e); }
  };

  return [stored, setValue];
}

/* ═══════════════════════════════════════
   RESPONSIVE HOOK
═══════════════════════════════════════ */
function useIsMobile() {
  const [m, setM] = useState(typeof window !== 'undefined' && window.innerWidth < 768);
  useEffect(() => {
    const h = () => setM(window.innerWidth < 768);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  return m;
}

/* ═══════════════════════════════════════
   SHARED LOCATION HOOK
   Stores last known GPS position in
   localStorage so all screens show the
   same value without requesting again.
═══════════════════════════════════════ */
function useSharedLocation() {
  const CACHE_KEY = 'lifeos_shared_gps';
  const [loc, setLoc] = useState(() => {
    try {
      const raw = window.localStorage.getItem(CACHE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  });

  useEffect(() => {
    if (!navigator.geolocation) return;
    // Only request if we don't already have a fresh fix (< 5 min old)
    if (loc && (Date.now() - new Date(loc.ts).getTime()) < 5 * 60 * 1000) return;
    navigator.geolocation.getCurrentPosition(
      pos => {
        const next = { lat: pos.coords.latitude, lng: pos.coords.longitude, ts: new Date().toISOString() };
        setLoc(next);
        try { window.localStorage.setItem(CACHE_KEY, JSON.stringify(next)); } catch(e) {}
      },
      () => {}
    );
  }, []);

  return loc;
}

/* ═══════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════ */
function LoginScreen({ onLogin }) {
  const [name, setName]         = useState('');
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');
  const [isReturning, setIsReturning] = useState(false);

  const hashPw = async (em, pw) => {
    const data = new TextEncoder().encode(em + ':' + pw);
    const buf  = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  };

  const onEmailChange = e => {
    const val = e.target.value;
    setEmail(val); setError('');
    if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val.trim())) {
      setIsReturning(!!localStorage.getItem('lifeos_pw:' + val.trim().toLowerCase()));
    } else { setIsReturning(false); }
  };

  const go = async () => {
    if (!name.trim())    { setError('Please enter your name'); return; }
    if (!email.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) {
      setError('Please enter a valid email'); return;
    }
    if (!password.trim()) { setError('Please enter a password'); return; }
    if (password.length < 4) { setError('Password must be at least 4 characters'); return; }
    setLoading(true); setError('');
    const em   = email.trim().toLowerCase();
    const hash = await hashPw(em, password);
    const stored = localStorage.getItem('lifeos_pw:' + em);
    if (stored) {
      if (stored !== hash) { setLoading(false); setError('Incorrect password — try again'); return; }
    } else {
      localStorage.setItem('lifeos_pw:' + em, hash);
    }
    setTimeout(() => onLogin({ name: name.trim(), email: em }), 400);
  };

  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center',
      background:'linear-gradient(145deg,#F8FAFC 0%,#EEF2FF 100%)', padding:'24px' }}>
      <div className="fade-up" style={{ background:'white', borderRadius:'28px', padding:'60px 52px',
        width:'100%', maxWidth:'440px', boxShadow:'0 32px 80px rgba(0,0,0,.1)', textAlign:'center' }}>

        {/* Logo */}
        <div style={{ width:'76px', height:'76px', margin:'0 auto 28px',
          background:'linear-gradient(135deg,#6366F1,#8B5CF6)',
          borderRadius:'22px', display:'flex', alignItems:'center', justifyContent:'center',
          fontSize:'36px', boxShadow:'0 12px 32px rgba(99,102,241,.3)' }}>
          ◎
        </div>

        <h1 style={{ fontSize:'30px', fontWeight:'800', color:'#0F172A', letterSpacing:'-.5px', marginBottom:'10px' }}>
          {isReturning ? 'Welcome back' : 'Welcome to LifeOS'}
        </h1>
        <p style={{ fontSize:'15px', color:'#64748B', lineHeight:'1.6', marginBottom:'32px' }}>
          {isReturning ? 'Enter your password to continue.' : 'Your entire life, beautifully organized.'}

        <div style={{ textAlign:'left', marginBottom:'16px' }}>
          <label style={{ display:'block', fontSize:'13px', fontWeight:'600', color:'#374151', marginBottom:'6px' }}>Name</label>
          <input value={name} onChange={e => { setName(e.target.value); setError(''); }}
            placeholder="Brad Gibbons"
            style={{ width:'100%', padding:'12px 16px', border:'1.5px solid #E2E8F0', borderRadius:'12px',
              fontSize:'15px', background:'#F8FAFC' }} />

        <div style={{ textAlign:'left', marginBottom:'16px' }}>
          <label style={{ display:'block', fontSize:'13px', fontWeight:'600', color:'#374151', marginBottom:'6px' }}>Email</label>
          <input value={email} onChange={onEmailChange}
            placeholder="you@gmail.com" type="email"
            style={{ width:'100%', padding:'12px 16px', border:'1.5px solid #E2E8F0', borderRadius:'12px',
              fontSize:'15px', background:'#F8FAFC' }} />
        </div>

        <div style={{ textAlign:'left', marginBottom:'24px' }}>
          <label style={{ display:'block', fontSize:'13px', fontWeight:'600', color:'#374151', marginBottom:'6px' }}>
            {isReturning ? 'Password' : 'Create Password'}

            placeholder={isReturning ? '••••••••' : 'Min 4 characters'} type="password"
            onKeyDown={e => e.key === 'Enter' && go()}
            style={{ width:'100%', padding:'12px 16px', border:'1.5px solid #E2E8F0', borderRadius:'12px',
              fontSize:'15px', background:'#F8FAFC' }} />
        </div>

        {error && <p style={{ color:'#EF4444', fontSize:'13px', marginBottom:'16px', fontWeight:'500' }}>{error}</p>}

        <button onClick={go} disabled={loading} style={{
          display:'flex', alignItems:'center', justifyContent:'center', gap:'10px',
          width:'100%', padding:'14px 24px', border:'none', borderRadius:'14px',
          background: loading ? '#CBD5E1' : 'linear-gradient(135deg,#6366F1,#8B5CF6)',
          color:'white', cursor: loading ? 'not-allowed' : 'pointer',
          fontFamily:'Inter,sans-serif', fontSize:'15px', fontWeight:'700',
          boxShadow: loading ? 'none' : '0 8px 24px rgba(99,102,241,.35)',
          transition:'all .2s',
        }}>
          {loading
            ? <><div style={{ width:'18px', height:'18px', border:'2px solid rgba(255,255,255,.3)',
                borderTopColor:'white', borderRadius:'50%', animation:'spin .7s linear infinite' }}/>
                Signing in…</>
            : <>🔒 {isReturning ? 'Sign in' : 'Create Account'}</>}

        <p style={{ marginTop:'28px', fontSize:'12px', color:'#94A3B8', lineHeight:'1.6' }}>
          Your data is stored locally on this device.<br/>Each email gets its own private data space.
        </p>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   RECORD BUTTON
   Saves completed recordings directly to
   lifeos_journal (Voice Journal) in
   localStorage and shows a saved toast.
═══════════════════════════════════════ */
function RecordButton({ onRoute }) {
  const [rec, setRec] = useState(false);
  const [transcript, setTranscript] = useState('');
  const [saved, setSaved]   = useState(false);
  const [savedLabel, setSavedLabel] = useState('');
  const [picker, setPicker] = useState(null); // text awaiting destination choice
  const srRef = useRef(null);
  const demoRef = useRef(null);
  // Ref to hold latest transcript so onend closure can read current value
  const transcriptRef = useRef('');

  const scopedKey = (base) => {
    try {
      const rawUser = window.localStorage.getItem('lifeos_user');
      if (rawUser && rawUser !== 'null') {
        const u = JSON.parse(rawUser);
        if (u && u.email) return base + ':' + u.email;
      }
    } catch(_){}
    return base;
  };

  const pushTo = (key, item, prepend = true) => {
    try {
      const k = scopedKey(key);
      const existing = window.localStorage.getItem(k);
      const arr = existing ? JSON.parse(existing) : [];
      if (prepend) arr.unshift(item); else arr.push(item);
      window.localStorage.setItem(k, JSON.stringify(arr));
    } catch(e) { console.error(e); }
  };

  const saveToJournal = useCallback((text) => {
    if (!text || !text.trim()) return;
    const now = new Date();
    pushTo('lifeos_journal', {
      id: Date.now(),
      date: now.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' }),
      time: now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }),
      mood: '😊', moodLabel: 'Good', duration: '0:30',
      title: text.slice(0, 50) + (text.length > 50 ? '…' : ''),
      transcript: text,
      tags: ['voice'],
    });
    try { window.localStorage.setItem('lifeos_pending_voice', JSON.stringify({ text, ts: now.toISOString() })); } catch(_){}
  }, []);

  const saveToCoParent = useCallback((text) => {
    if (!text || !text.trim()) return;
    const now = new Date();
    pushTo('lifeos_cp_thread', {
      id: Date.now(),
      from: 'me',
      text: text.trim(),
      time: now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }),
      date: now.toLocaleDateString('en-US', { month:'short', day:'numeric' }),
      ts: now.toISOString(),
      voice: true,
    }, false);
  }, []);

  const saveToCalendar = useCallback((text) => {
    if (!text || !text.trim()) return;
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    pushTo('lifeos_cp_events', {
      id: Date.now(),
      title: text.slice(0, 80) + (text.length > 80 ? '…' : ''),
      date: `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`,
      time: '',
      owner: 'brad',
      icon: '🎙️',
      voice: true,
    }, false);
  }, []);

  const saveToTasks = useCallback((text) => {
    if (!text || !text.trim()) return;
    pushTo('lifeos_tasks', {
      id: Date.now(),
      text: text.trim(),
      urgency: 'normal',
      done: false,
      created: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}),
      voice: true,
    }, false);
  }, []);

  const routeTo = useCallback((dest) => {
    const text = picker;
    setPicker(null);
    if (!text || dest === 'discard') { setTranscript(''); return; }
    let label = '';
    if (dest === 'journal')    { saveToJournal(text);    label = 'Saved to Voice Journal'; }
    if (dest === 'coparent')   { saveToCoParent(text);   label = 'Logged in Co-parenting'; }
    if (dest === 'calendar')   { saveToCalendar(text);   label = 'Added to Calendar'; }
    if (dest === 'task')       { saveToTasks(text);      label = 'Added as Task'; }
    setSaved(true);
    setSavedLabel(label);
    onRoute && onRoute(text, { id: dest });
    setTimeout(() => { setTranscript(''); setSaved(false); setSavedLabel(''); }, 3200);
  }, [picker, saveToJournal, saveToCoParent, saveToCalendar, saveToTasks, onRoute]);

  const stop = useCallback((text) => {
    setRec(false);
    if (srRef.current) { try { srRef.current.stop(); } catch(_){} }
    clearInterval(demoRef.current);
    if (text && text.trim()) {
      setPicker(text.trim());
    }
  }, []);

  const toggle = useCallback(() => {
    if (rec) { stop(transcript); return; }
    setTranscript(''); setSaved(false); setSavedLabel(''); setPicker(null); setRec(true); transcriptRef.current = '';

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      const r = new SR(); r.continuous = true; r.interimResults = true;
      r.onresult = e => {
        let t = ''; for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
        transcriptRef.current = t;
        setTranscript(t);
      };
      // Use ref so onend always sees the latest transcript, not a stale closure value
      r.onend = () => { if (transcriptRef.current) stop(transcriptRef.current); else setRec(false); };
      srRef.current = r; r.start();
    } else {
      // demo typewriter
      const demo = 'Remind me to pick up Lilly from soccer at 4:30 today';
      let i = 0;
      demoRef.current = setInterval(() => {
        i++; setTranscript(demo.slice(0, i));
        if (i >= demo.length) { clearInterval(demoRef.current); setTimeout(() => stop(demo), 600); }
      }, 38);
    }
  }, [rec, transcript, stop]);

  const DEST_BTNS = [
    { id:'journal',  label:'🎙️ Voice Journal',   bg:'#EEF2FF', color:'#4F46E5' },
    { id:'coparent', label:'👨‍👧‍👦 Co-parenting log', bg:'#FFF7ED', color:'#EA580C' },
    { id:'calendar', label:'📅 Add to Calendar',   bg:'#ECFDF5', color:'#059669' },
    { id:'task',     label:'✅ Add as Task',       bg:'#FEF3C7', color:'#B45309' },
    { id:'discard',  label:'🗑️ Discard',          bg:'#F1F5F9', color:'#64748B' },
  ];

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:'18px' }}>

      {/* Transcript / saved pill */}
      {(transcript || saved || picker) && (
        <div className="fade-up" style={{ background:'white', border:'1px solid #E2E8F0',
          borderRadius:'18px', padding:'14px 22px', maxWidth:'500px', width:'100%',
          boxShadow:'0 4px 20px rgba(0,0,0,.07)', textAlign:'left' }}>
          {(picker || transcript) && (
            <p style={{ fontSize:'14px', color:'#374151', marginBottom: (saved || picker) ? '12px' : 0, lineHeight:'1.5' }}>
              "{picker || transcript}"
            </p>
          )}
          {picker && (
            <div>
              <p style={{ fontSize:'12px', color:'#64748B', fontWeight:'600', marginBottom:'10px' }}>
                Where should this go?
              </p>
              <div style={{ display:'flex', flexWrap:'wrap', gap:'8px' }}>
                {DEST_BTNS.map(b => (
                  <button key={b.id} onClick={() => routeTo(b.id)}
                    style={{ padding:'8px 14px', borderRadius:'100px', border:'none',
                      background:b.bg, color:b.color, fontSize:'12px', fontWeight:'700',
                      cursor:'pointer' }}>
                    {b.label}
                  </button>
                ))}
              </div>
            </div>
          )}
          {saved && (
            <div style={{ display:'flex', alignItems:'center', gap:'7px' }}>
              <div style={{ width:'7px', height:'7px', borderRadius:'50%', background:'#10B981' }}/>
              <span style={{ fontSize:'12px', color:'#10B981', fontWeight:'600' }}>
                {savedLabel || 'Saved'}
              </span>
            </div>
          )}
        </div>
      )}

      {/* Big red button */}
      <button
        onClick={toggle}
        className={rec ? 'record-active' : 'record-idle'}
        style={{ width:'76px', height:'76px', borderRadius:'50%', border:'none', cursor:'pointer',
          background: rec
            ? 'linear-gradient(135deg,#DC2626,#EF4444)'
            : 'linear-gradient(135deg,#EF4444,#F87171)',
          display:'flex', alignItems:'center', justifyContent:'center',
          transition:'transform .15s, box-shadow .15s' }}>
        {rec
          ? <div style={{ display:'flex', alignItems:'center', height:'30px' }}>
              {[0,1,2,3,4].map(i => <span key={i} className="wave-bar" style={{ animationDelay:`${i*.12}s` }}/>)}
            </div>
          : <IcoMic />}
      </button>

      <span style={{ fontSize:'11px', color:'#94A3B8', fontWeight:'600', letterSpacing:'1px' }}>
        {rec ? 'TAP TO STOP' : 'TAP TO SPEAK'}
      </span>
    </div>
  );
}

/* ═══════════════════════════════════════
   TASKS WIDGET
═══════════════════════════════════════ */
const TASK_SEED = [];

function TasksWidget({ onCard }) {
  const mobile = useIsMobile();
  const [tasks, setTasks] = useLocalStorage('lifeos_tasks', TASK_SEED);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ text:'', urgency:'normal' });

  const addTask = () => {
    if (!form.text.trim()) return;
    setTasks(prev => [...prev, { id:Date.now(), text:form.text.trim(), urgency:form.urgency, done:false, created: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}) }]);
    setForm({ text:'', urgency:'normal' }); setShowForm(false);
  };
  const toggle = (id) => setTasks(prev => prev.map(t => t.id===id ? {...t, done:!t.done} : t));
  const remove  = (id) => setTasks(prev => prev.filter(t => t.id!==id));

  const urgent  = tasks.filter(t => t.urgency==='urgent'  && !t.done);
  const normal  = tasks.filter(t => t.urgency==='normal'  && !t.done);
  const done    = tasks.filter(t => t.done);

  const URGENCY = { urgent:{bg:'#FEF2F2',border:'#FECACA',dot:'#DC2626',label:'Urgent'}, normal:{bg:'#F0FDF4',border:'#BBF7D0',dot:'#10B981',label:'Today'} };

  const TaskRow = ({ task }) => (
    <div style={{ display:'flex', alignItems:'flex-start', gap:'10px', padding:'8px 12px', borderRadius:'10px',
      background: task.done ? 'transparent' : URGENCY[task.urgency]?.bg || '#F8FAFC',
      border: `1px solid ${task.done ? '#F1F5F9' : URGENCY[task.urgency]?.border || '#E2E8F0'}`,
      marginBottom:'6px', transition:'all .15s' }}>
      <div onClick={() => toggle(task.id)} style={{ width:'18px', height:'18px', borderRadius:'5px', flexShrink:0, marginTop:'1px',
        border:`2px solid ${task.done ? '#10B981' : URGENCY[task.urgency]?.dot || '#94A3B8'}`,
        background: task.done ? '#10B981' : 'white', cursor:'pointer', transition:'all .15s',
        display:'flex', alignItems:'center', justifyContent:'center' }}>
        {task.done && <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><polyline points="2,6 5,9 10,3" stroke="white" strokeWidth="2.2" strokeLinecap="round"/></svg>}
      </div>
      <span style={{ flex:1, fontSize:'13px', color: task.done ? '#94A3B8' : '#0F172A', textDecoration: task.done ? 'line-through' : 'none', lineHeight:'1.4' }}>{task.text}</span>
      {!task.done && task.urgency==='urgent' && <span style={{ fontSize:'10px', fontWeight:'700', color:'#DC2626', background:'#FEE2E2', borderRadius:'100px', padding:'2px 7px', flexShrink:0 }}>URGENT</span>}
      <button onClick={() => remove(task.id)} style={{ background:'none', border:'none', color:'#CBD5E1', cursor:'pointer', fontSize:'14px', padding:'0 2px', lineHeight:1 }}>×</button>
    </div>
  );

  return (
    <div className="fade-up" style={{ background:'white', borderRadius:'20px', padding: mobile ? '18px 16px' : '24px 28px',
      boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9', marginBottom:'28px' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'16px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
          <h2 style={{ fontSize:'16px', fontWeight:'800', color:'#0F172A' }}>Today's Tasks</h2>
          {urgent.length > 0 && (
            <span style={{ fontSize:'11px', fontWeight:'700', color:'#DC2626', background:'#FEE2E2', borderRadius:'100px', padding:'3px 9px' }}>
              {urgent.length} urgent
            </span>
          )}
        </div>
        <button onClick={() => setShowForm(v=>!v)} style={{ display:'flex', alignItems:'center', gap:'5px', background:'#F1F5F9', border:'none', borderRadius:'9px', padding:'7px 12px', color:'#374151', fontWeight:'600', fontSize:'12px', cursor:'pointer' }}>
          <IcoPlus /> Add
        </button>
      </div>

      {showForm && (
        <div className="fade-up" style={{ background:'#F8FAFC', borderRadius:'12px', padding:'14px', marginBottom:'14px', border:'1px solid #E2E8F0' }}>
          <div style={{ display:'flex', gap:'8px', marginBottom:'10px' }}>
            <input value={form.text} onChange={e=>setForm(f=>({...f,text:e.target.value}))}
              onKeyDown={e=>e.key==='Enter'&&addTask()}
              placeholder="What needs to get done?" autoFocus
              style={{ flex:1, padding:'9px 12px', borderRadius:'9px', border:'1.5px solid #E2E8F0', fontSize:'13px', fontFamily:'Inter,sans-serif', outline:'none' }}/>
            <select value={form.urgency} onChange={e=>setForm(f=>({...f,urgency:e.target.value}))}
              style={{ padding:'9px 12px', borderRadius:'9px', border:'1.5px solid #E2E8F0', fontSize:'13px', fontFamily:'Inter,sans-serif', cursor:'pointer', background:'white' }}>
              <option value="urgent">🔴 Urgent</option>
              <option value="normal">🟢 Today</option>
            </select>
          </div>
          <div style={{ display:'flex', gap:'8px' }}>
            <button onClick={()=>setShowForm(false)} style={{ flex:1, padding:'8px', borderRadius:'9px', border:'1px solid #E2E8F0', background:'white', cursor:'pointer', fontSize:'13px', fontFamily:'Inter,sans-serif' }}>Cancel</button>
            <button onClick={addTask} style={{ flex:1, padding:'8px', borderRadius:'9px', border:'none', background:'#0F172A', color:'white', cursor:'pointer', fontSize:'13px', fontWeight:'600', fontFamily:'Inter,sans-serif' }}>Add Task</button>
          </div>
        </div>
      )}

      {tasks.length === 0 && !showForm && (
        <p style={{ fontSize:'13px', color:'#94A3B8', textAlign:'center', padding:'16px 0' }}>No tasks yet — tap Add to get started</p>
      )}

      {urgent.length > 0 && (
        <div style={{ marginBottom:'10px' }}>
          {urgent.map(t => <TaskRow key={t.id} task={t} />)}
        </div>
      )}
      {normal.length > 0 && (
        <div style={{ marginBottom: done.length > 0 ? '10px' : 0 }}>
          {normal.map(t => <TaskRow key={t.id} task={t} />)}
        </div>
      )}
      {done.length > 0 && (
        <details style={{ marginTop:'6px' }}>
          <summary style={{ fontSize:'12px', color:'#94A3B8', cursor:'pointer', fontWeight:'600', userSelect:'none', listStyle:'none' }}>
            ✓ {done.length} completed
          </summary>
          <div style={{ marginTop:'8px', opacity:.65 }}>
            {done.map(t => <TaskRow key={t.id} task={t} />)}
          </div>
        </details>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════

═══════════════════════════════════════ */
function DashCard({ card, idx, draggingIdx, overIdx, onDragStart, onDragOver, onDrop, onDragEnd, onClick, preview }) {
  const isDragging = draggingIdx === idx;
  const isOver     = overIdx === idx && draggingIdx !== idx;

  return (
    <div
      draggable
      onDragStart={() => onDragStart(idx)}
      onDragOver={e  => { e.preventDefault(); onDragOver(idx); }}
      onDrop={() => onDrop(idx)}
      onDragEnd={onDragEnd}
      onClick={onClick}
      className={`dash-card ${isDragging ? 'dragging' : ''} ${isOver ? 'drag-over' : ''}`}
      style={{ background:'white', borderRadius:'22px', padding:'18px', position:'relative',
        overflow:'hidden', boxShadow:'0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04)',
        border:'1px solid rgba(226,232,240,.8)', userSelect:'none', minHeight:'130px' }}>

      {/* Decorative blob */}
      <div style={{ position:'absolute', top:'-24px', right:'-24px', width:'90px', height:'90px',
        borderRadius:'50%', background:card.bg, opacity:.9 }}/>

      {/* Icon badge */}
      <div style={{ width:'46px', height:'46px', borderRadius:'14px', background:card.bg,
        display:'flex', alignItems:'center', justifyContent:'center',
        fontSize:'22px', marginBottom:'18px', border:`1.5px solid ${card.color}22` }}>
        {card.icon}
      </div>

      <h3 style={{ fontSize:'15px', fontWeight:'700', color:'#0F172A', marginBottom:'4px' }}>{card.label}</h3>
      <p  style={{ fontSize:'13px', color:'#94A3B8', marginBottom: preview ? '14px' : 0 }}>{card.desc}</p>

      {preview && <div>{preview}</div>}

      <div style={{ position:'absolute', bottom:'22px', right:'22px', color:'#CBD5E1', lineHeight:0 }}>
        <IcoChevron />
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   WEEKLY RECAP WIDGET
═══════════════════════════════════════ */
function WeeklyRecap() {
  const mobile = useIsMobile();
  const [open, setOpen] = useState(false);
  const [tasks]    = useLocalStorage('lifeos_tasks', []);
  const [events]   = useLocalStorage('lifeos_cp_events', EVENTS_SEED);
  const [custody]  = useLocalStorage('lifeos_custody_apr2026', APR_DAYS_DEFAULT);
  const [journal]  = useLocalStorage('lifeos_journal', []);

  const now = new Date();
  const weekAgo = new Date(now); weekAgo.setDate(now.getDate() - 7);
  const nextWeek = new Date(now); nextWeek.setDate(now.getDate() + 7);

  // Tasks
  const pendingTasks  = tasks.filter(t => !t.done);
  const urgentTasks   = pendingTasks.filter(t => t.urgency === 'urgent');
  const completedThis = tasks.filter(t => t.done).length;

  // Events this week (date stored as YYYY-MM-DD from new entries, or 'Apr 17' from seed)
  const upcomingEvents = events.filter(ev => {
    if (!ev.date) return false;
    // Parse YYYY-MM-DD format
    if (/^\d{4}-\d{2}-\d{2}$/.test(ev.date)) {
      const d = new Date(ev.date + 'T00:00:00');
      return d >= now && d <= nextWeek;
    }
    return false;
  });

  // Custody: days with Brad this week
  const todayD = now.getDate();
  const weekDays = [0,1,2,3,4,5,6].map(i => {
    const d = new Date(now); d.setDate(now.getDate() - now.getDay() + i);
    return d.getDate();
  });
  const bradDaysThisWeek = custody.filter(c => weekDays.includes(c.d) && c.owner === 'brad').length;
  const mimDaysThisWeek  = custody.filter(c => weekDays.includes(c.d) && c.owner === 'mim').length;

  // Journal entries this week
  const journalThisWeek = journal.filter(e => {
    try { const d = new Date(e.date); return d >= weekAgo && d <= now; } catch(_){ return false; }
  }).length;

  const STATS = [
    { label:'Kids with you', value: bradDaysThisWeek, unit:'days', emoji:'👨‍👧‍👦', color:'#6366F1', bg:'#EEF2FF' },
    { label:'Pending tasks', value: pendingTasks.length, unit: urgentTasks.length > 0 ? `(${urgentTasks.length} urgent)` : '', emoji:'✅', color: urgentTasks.length ? '#DC2626' : '#10B981', bg: urgentTasks.length ? '#FEF2F2' : '#ECFDF5' },
    { label:'Upcoming events', value: upcomingEvents.length, unit:'next 7 days', emoji:'📅', color:'#F59E0B', bg:'#FFFBEB' },
    { label:'Voice entries', value: journalThisWeek, unit:'this week', emoji:'🎙️', color:'#8B5CF6', bg:'#F5F3FF' },
  ];

  return (
    <div className="fade-up" style={{ background:'white', borderRadius:'20px', border:'1px solid #F1F5F9',
      boxShadow:'0 1px 4px rgba(0,0,0,.06)', marginBottom:'28px', overflow:'hidden' }}>

      {/* Header — always visible */}
      <div onClick={() => setOpen(o => !o)}

/* ═══════════════════════════════════════

function Dashboard({ user, onCard, onLogout }) {
  const mobile = useIsMobile();
  // Persist card order per user, reconcile against the current CARDS_DEF so
  // stale/removed card IDs are dropped and new ones are appended.
  const [savedOrder, setSavedOrder] = useLocalStorage('lifeos_card_order', CARDS_DEF.map(c=>c.id));
  const cards = useMemo(() => {
    const byId = Object.fromEntries(CARDS_DEF.map(c=>[c.id,c]));
    const ordered = savedOrder.map(id => byId[id]).filter(Boolean);
    const missing = CARDS_DEF.filter(c => !savedOrder.includes(c.id));
    return [...ordered, ...missing];
  }, [savedOrder]);
  const setCards = (updater) => {
    const next = typeof updater === 'function' ? updater(cards) : updater;
    setSavedOrder(next.map(c=>c.id));
  };
  const [draggingIdx, setDragging] = useState(null);
  const [overIdx, setOver]         = useState(null);

  // Use shared GPS hook so dashboard and Kids Area show the same location
  const sharedLoc = useSharedLocation();
  const dashLoc = sharedLoc ? { lat: sharedLoc.lat, lng: sharedLoc.lng, ts: new Date(sharedLoc.ts) } : null;

  // Read real data for dashboard card previews
  const [cpEvents]   = useLocalStorage('lifeos_cp_events', EVENTS_SEED);
  const [cpProjects] = useLocalStorage('lifeos_projects', PROJECTS_SEED);

  // Record button asks user where to save after each recording. If they picked
  // a destination that corresponds to a section, take them there so they can see it.
  const handleVoiceRoute = useCallback((text, dest) => {
    if (!dest || !dest.id) return;
    const map = { coparent: 'coparenting', calendar: 'calendar' };
    const target = map[dest.id];
    if (target) onCard(target);
  }, [onCard]);

  const handleDragStart = (i)  => setDragging(i);
  const handleDragOver  = (i)  => setOver(i);
  const handleDragEnd   = ()   => { setDragging(null); setOver(null); };
  const handleDrop      = (i)  => {
    if (draggingIdx === null || draggingIdx === i) { handleDragEnd(); return; }
    setCards(prev => {
      const next = [...prev];
      const [moved] = next.splice(draggingIdx, 1);
      next.splice(i, 0, moved);
      return next;
    });
    handleDragEnd();
  };

  const previews = {
    coparenting: (
      <div>
        <div style={{ display:'flex', gap:'3px', marginBottom:'10px' }}>

    money: (() => {

function BackupStrip() {
  const mobile = useIsMobile();
  const fileRef = useRef(null);
  const [msg, setMsg] = useState('');

  const exportData = () => {
    try {
      const data = {};
      for (let i = 0; i < window.localStorage.length; i++) {
        const k = window.localStorage.key(i);
        if (k && k.startsWith('lifeos_')) data[k] = window.localStorage.getItem(k);
      }
      const blob = new Blob([JSON.stringify({ version:1, exportedAt:new Date().toISOString(), data }, null, 2)],
        { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `lifeos-backup-${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      setMsg('Downloaded. AirDrop/email this file to your other device and tap Restore there.');
      setTimeout(()=>setMsg(''), 6000);
    } catch(e) { setMsg('Export failed: ' + e.message); }
  };

  const importData = (ev) => {
    const f = ev.target.files && ev.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || !parsed.data) throw new Error('Invalid backup file');
        if (!window.confirm('Restore backup? This overwrites the data on this device.')) return;
        Object.entries(parsed.data).forEach(([k, v]) => { if (typeof v === 'string') window.localStorage.setItem(k, v); });
        setMsg('Restored. Reloading…');
        setTimeout(()=>window.location.reload(), 800);
      } catch(e) { setMsg('Import failed: ' + e.message); }
    };
    reader.readAsText(f);
    ev.target.value = '';
  };

  return (
    <div className="fade-up" style={{ marginTop:'20px', background:'white', borderRadius:'18px',
      padding: mobile ? '18px' : '22px 28px', boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems: mobile?'flex-start':'center', gap:'12px', flexDirection: mobile?'column':'row' }}>
        <div>
          <p style={{ fontSize:'11px', fontWeight:'700', color:'#94A3B8', textTransform:'uppercase', letterSpacing:'1.2px', marginBottom:'4px' }}>DEVICE BACKUP</p>
          <p style={{ fontSize:'13px', color:'#334155', fontWeight:'600' }}>Move your data between phone &amp; laptop</p>
          <p style={{ fontSize:'11px', color:'#94A3B8', marginTop:'2px' }}>Your data lives in this browser. Export, then Restore on the other device.</p>
        </div>
        <div style={{ display:'flex', gap:'8px' }}>
          <button onClick={exportData} style={{ padding:'10px 14px', borderRadius:'10px', border:'1px solid #E2E8F0',
            background:'white', color:'#0F172A', fontSize:'12px', fontWeight:'700', cursor:'pointer' }}>⬇ Export</button>
          <button onClick={()=>fileRef.current && fileRef.current.click()} style={{ padding:'10px 14px', borderRadius:'10px', border:'none',
            background:'linear-gradient(135deg,#6366F1,#7C3AED)', color:'white', fontSize:'12px', fontWeight:'700', cursor:'pointer' }}>⬆ Restore</button>
          <input ref={fileRef} type="file" accept="application/json" onChange={importData} style={{ display:'none' }}/>
        </div>
      </div>
      {msg && <p style={{ marginTop:'10px', fontSize:'11px', color:'#6366F1', fontWeight:'600' }}>{msg}</p>}
    </div>
  );
}

  const mobile = useIsMobile();

  const [showAddEvt, setShowAddEvt] = useState(false);
  const [addForm, setAddForm] = useState({ title:'', date:'', time:'', who:'brad' });
  const today = new Date().getDate();
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const baseMonth = 3; // April = index 3
  const displayMonth = MONTHS[(baseMonth + monthOffset + 12) % 12];
  const displayYear = 2026 + Math.floor((baseMonth + monthOffset) / 12);
  const [custodyDays, setCustodyDays] = useLocalStorage('lifeos_custody_apr2026', APR_DAYS_DEFAULT);
  const [dayNotes, setDayNotes] = useLocalStorage('lifeos_day_notes', {});
  const [scheduleTemplate, setScheduleTemplate] = useLocalStorage('lifeos_schedule_template',
    { 0:'none', 1:'none', 2:'none', 3:'none', 4:'none', 5:'none', 6:'none' });
  const [overrides, setOverrides] = useLocalStorage('lifeos_custody_overrides', {});
  const [openDay, setOpenDay] = useState(null); // { d, month, year } or null
  const [noteDraft, setNoteDraft] = useState('');
  const [showTemplate, setShowTemplate] = useState(false);
  const [tmplDraft, setTmplDraft] = useState(null);
  const OWNER_CYCLE = ['none','brad','mim','shared'];
  const dayKey = (d, m, y) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const dowOf = (d, m, y) => new Date(y, m, d).getDay();
  const cycleCustody = (d) => {
    const k = dayKey(d, 3, 2026);
    setOverrides(prev => ({ ...prev, [k]: true }));
    setCustodyDays(prev => prev.map(day => {
      if (day.d !== d) return day;
      const idx = OWNER_CYCLE.indexOf(day.owner);
      return { ...day, owner: OWNER_CYCLE[(idx + 1) % OWNER_CYCLE.length] };
    }));
  };
  const resetDayToTemplate = (d, m, y) => {
    const k = dayKey(d, m, y);
    setOverrides(prev => { const n = { ...prev }; delete n[k]; return n; });
    const tmplOwner = scheduleTemplate[dowOf(d, m, y)] || 'none';
    setCustodyDays(prev => prev.map(day => day.d === d ? { ...day, owner: tmplOwner } : day));
  };
  const openTemplate = () => { setTmplDraft({ ...scheduleTemplate }); setShowTemplate(true); };
  const saveTemplate = () => {
    if (!tmplDraft) return;
    setScheduleTemplate(tmplDraft);
    // Apply to all April days that are NOT overridden
    setCustodyDays(prev => prev.map(day => {
      const k = dayKey(day.d, 3, 2026);
      if (overrides[k]) return day; // keep manual overrides
      const dow = dowOf(day.d, 3, 2026);
      return { ...day, owner: tmplDraft[dow] || 'none' };
    }));
    setShowTemplate(false);
    setTmplDraft(null);
  };
  const openDayDetail = (d, m = 3, y = 2026) => {
    const k = dayKey(d, m, y);
    setNoteDraft(dayNotes[k] || '');
    setOpenDay({ d, month: m, year: y, key: k });
  };
  const saveDayNote = () => {
    if (!openDay) return;
    setDayNotes(prev => {
      const next = { ...prev };
      if (noteDraft.trim()) next[openDay.key] = noteDraft.trim();
      else delete next[openDay.key];
      return next;
    });
    setOpenDay(null); setNoteDraft('');
  };
  const bradDays = custodyDays.filter(d=>d.owner==='brad').length;
  const mimDays = custodyDays.filter(d=>d.owner==='mim').length;
  const splitDays = custodyDays.filter(d=>d.owner==='shared').length;
  const [legendLabels, setLegendLabels] = useLocalStorage('lifeos_custody_labels', {
    brad: 'With Brad', mim: "With Mim", shared: 'Split (1 kid each)'
  });
  const [editingLabel, setEditingLabel] = useState(null);
  const [labelDraft, setLabelDraft] = useState('');

  // Other-parent editable name (Bug 3)
  const [otherParentName, setOtherParentName] = useLocalStorage('lifeos_otherParentName', 'Other Parent');
  const [editingParentName, setEditingParentName] = useState(false);
  const [parentNameDraft, setParentNameDraft] = useState('');

  const saveLabel = () => {
    if (editingLabel && labelDraft.trim()) setLegendLabels(prev=>({...prev,[editingLabel]:labelDraft.trim()}));
    setEditingLabel(null); setLabelDraft('');
  };

  const saveParentName = () => {
    if (parentNameDraft.trim()) setOtherParentName(parentNameDraft.trim());
    setEditingParentName(false); setParentNameDraft('');
  };

  const submitAddEvt = () => {
    if (!addForm.title || !addForm.date) return;
    onAddEvent && onAddEvent({ id:Date.now(), title:addForm.title, date:addForm.date, time:addForm.time||'', owner:addForm.who, icon:'📅' });
    setAddForm({ title:'', date:'', time:'', who:'brad' });
    setShowAddEvt(false);
  };

  // Week view helpers — show week containing today (Apr 1 default)
  const weekAnchor = new Date(2026, 3, today || 1);
  const weekDow = weekAnchor.getDay();
  const weekStart = new Date(weekAnchor); weekStart.setDate(weekAnchor.getDate() - weekDow);
  const weekDays = Array.from({length:7}, (_, i) => {
    const d = new Date(weekStart); d.setDate(weekStart.getDate() + i);
    return d;
  });

  return (
    <div style={{ display:'grid', gridTemplateColumns: mobile ? '1fr' : '1fr 1fr', gap:'24px' }}>

      {/* Calendar */}
      <div style={{ background:'white', borderRadius:'20px', padding:'26px',
        boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'22px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'10px' }}>
            <h3 style={{ fontSize:'16px', fontWeight:'700', color:'#0F172A' }}>{displayMonth} {displayYear}</h3>
            {/* Other parent name with pencil edit (Bug 3) */}
            <div style={{ display:'flex', alignItems:'center', gap:'4px', fontSize:'12px', color:'#94A3B8' }}>
              {editingParentName
                ? <input autoFocus value={parentNameDraft}
                    onChange={e=>setParentNameDraft(e.target.value)}
                    onBlur={saveParentName}
                    onKeyDown={e=>e.key==='Enter'&&saveParentName()}
                    style={{ fontSize:'12px', border:'none', borderBottom:'1px solid #6366F1',
                      outline:'none', width:'110px', background:'transparent', fontFamily:'Inter,sans-serif', color:'#374151' }}/>
                : <span style={{ fontSize:'11px', color:'#94A3B8' }}>vs {otherParentName}</span>
              }
              <button onClick={()=>{setEditingParentName(true);setParentNameDraft(otherParentName);}}
                title="Edit other parent's name"
                style={{ background:'none', border:'none', cursor:'pointer', padding:'2px', lineHeight:1, fontSize:'13px', color:'#CBD5E1' }}>✏️</button>
            </div>
          </div>
          <div style={{ display:'flex', gap:'6px', alignItems:'center' }}>
            <button onClick={openTemplate} title="Set a repeating weekly schedule"
              style={{ padding:'6px 10px', borderRadius:'8px', border:'1px solid #E2E8F0',
                background:'linear-gradient(135deg,#6366F1,#7C3AED)', color:'white',
                cursor:'pointer', fontSize:'11px', fontWeight:'700', whiteSpace:'nowrap' }}>
              🔁 Schedule
            </button>
            {/* Weekly / Monthly view toggle (Bug 2) */}
            <div style={{ display:'flex', background:'#F1F5F9', borderRadius:'8px', padding:'2px' }}>
              {[{id:'month',label:'Month'},{id:'week',label:'Week'}].map(v => (
                <button key={v.id} onClick={()=>setCalView(v.id)} style={{
                  padding:'4px 10px', borderRadius:'6px', border:'none', cursor:'pointer',
                  fontSize:'11px', fontWeight:'600',
                  background: calView===v.id ? 'white' : 'transparent',
                  color:       calView===v.id ? '#0F172A' : '#94A3B8',
                  boxShadow:   calView===v.id ? '0 1px 3px rgba(0,0,0,.08)' : 'none',
                }}>{v.label}</button>
              ))}
            </div>
            <button onClick={()=>{setMonthOffset(o=>o-1);setSel(null);}} style={{ width:'30px', height:'30px', borderRadius:'8px', border:'1px solid #E2E8F0', background:'white', cursor:'pointer', fontSize:'14px' }}>‹</button>
            <button onClick={()=>{setMonthOffset(o=>o+1);setSel(null);}} style={{ width:'30px', height:'30px', borderRadius:'8px', border:'1px solid #E2E8F0', background:'white', cursor:'pointer', fontSize:'14px' }}>›</button>
          </div>
        </div>

        {/* DOW headers */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:'4px', marginBottom:'8px' }}>
          {['Su','Mo','Tu','We','Th','Fr','Sa'].map(d => (
            <div key={d} style={{ textAlign:'center', fontSize:'11px', fontWeight:'700', color:'#CBD5E1', padding:'4px 0' }}>{d}</div>
          ))}
        </div>

        {/* Month view */}
        {calView === 'month' && (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:'4px' }}>
            {monthOffset === 0 ? (
              <>
                {[...Array(APR_START_DOW)].map((_,i) => <div key={`e${i}`} className="cal-day empty"/>)}
                {custodyDays.map(({ d, owner }) => {
                  const k = dayKey(d, 3, 2026);
                  const hasNote = !!dayNotes[k];
                  const isOverride = !!overrides[k];
                  return (
                    <div key={d} className={`cal-day ${owner} ${d===today?'today':''}`}
                      onClick={() => openDayDetail(d, 3, 2026)}
                      title={isOverride ? "Custom day — differs from your schedule" : "Tap to set custody / add a note"}
                      style={{ border: sel===d ? '2px solid #6366F1' : '2px solid transparent', cursor:'pointer', position:'relative' }}>
                      {d}
                      {hasNote && <span style={{ position:'absolute', top:'3px', right:'4px', fontSize:'9px' }}>📝</span>}
                      {isOverride && <span title="Overrides schedule" style={{ position:'absolute', bottom:'3px', right:'4px', width:'7px', height:'7px', borderRadius:'50%', background:'#F59E0B', boxShadow:'0 0 0 2px white' }}/>}
                    </div>
                  );
                })}
              </>
            ) : (
              Array.from({length:30},(_,i)=>(
                <div key={i+1} className="cal-day none" style={{ border:'2px solid transparent', opacity:.6 }}>{i+1}</div>
              ))
            )}
          </div>
        )}

        {/* Week view (Bug 2) */}
        {calView === 'week' && (
          <div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:'4px' }}>
              {weekDays.map((d, i) => {
                const dayNum = d.getDate();
                const isApr = d.getMonth() === 3 && d.getFullYear() === 2026;
                const owner = isApr ? (custodyDays.find(x => x.d === dayNum)?.owner || 'none') : 'none';
                const isToday = dayNum === today && isApr;
                const k = isApr ? dayKey(dayNum, 3, 2026) : '';
                const hasNote = isApr && !!dayNotes[k];
                const isOverride = isApr && !!overrides[k];
                return (
                  <div key={i}
                    className={`cal-day ${owner} ${isToday ? 'today' : ''}`}
                    onClick={() => isApr && openDayDetail(dayNum, 3, 2026)}
                    title={isApr ? (isOverride ? 'Custom day — differs from schedule' : 'Tap to set custody / add a note') : ''}
                    style={{ border: '2px solid transparent', cursor: isApr ? 'pointer' : 'default',
                      display:'flex', flexDirection:'column', gap:'2px', aspectRatio:'unset', padding:'8px 4px', minHeight:'52px', position:'relative' }}>
                    <span style={{ fontSize:'10px', fontWeight:'700', opacity:.6 }}>
                      {['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()]}
                    </span>
                    <span>{dayNum}</span>
                    {hasNote && <span style={{ position:'absolute', top:'3px', right:'4px', fontSize:'9px' }}>📝</span>}
                    {isOverride && <span title="Overrides schedule" style={{ position:'absolute', bottom:'3px', right:'4px', width:'7px', height:'7px', borderRadius:'50%', background:'#F59E0B', boxShadow:'0 0 0 2px white' }}/>}
                  </div>
                );
              })}
            </div>
            <p style={{ fontSize:'11px', color:'#94A3B8', marginTop:'10px', textAlign:'center' }}>
              Week of {weekDays[0].toLocaleDateString('en-US',{month:'short',day:'numeric'})} — tap days to set custody
            </p>
          </div>
        )}

        {/* Custody summary */}
        <div style={{ display:'flex', gap:'12px', marginTop:'16px', padding:'12px 16px', background:'#F8FAFC', borderRadius:'12px', fontSize:'12px', flexWrap:'wrap' }}>
          <span style={{ color:'#1D4ED8', fontWeight:'700' }}>Brad: {bradDays}d</span>
          <span style={{ color:'#BE185D', fontWeight:'700' }}>{otherParentName}: {mimDays}d</span>
          <span style={{ color:'#7E22CE', fontWeight:'700' }}>Split: {splitDays}d</span>
          <span style={{ color:'#94A3B8' }}>Unset: {30-bradDays-mimDays-splitDays}d</span>
          <span style={{ color:'#94A3B8', marginLeft:'auto', fontSize:'11px' }}>tap days to set</span>
        </div>

        {/* Legend — editable labels */}
        <div style={{ display:'flex', gap:'10px', marginTop:'12px', paddingTop:'12px', borderTop:'1px solid #F8FAFC', flexWrap:'wrap', alignItems:'center' }}>
          {[
            { key:'brad',   bg:'#DBEAFE', border:'#BFDBFE' },
            { key:'mim',    bg:'#FCE7F3', border:'#FBCFE8' },
            { key:'shared', bg:'linear-gradient(135deg,#DBEAFE 50%,#FCE7F3 50%)', border:'#E9D5FF' },
          ].map((x) => (
            <div key={x.key} style={{ display:'flex', alignItems:'center', gap:'6px' }}>
              <div style={{ width:'13px', height:'13px', borderRadius:'4px', background:x.bg, border:`1px solid ${x.border}` }}/>
              {editingLabel === x.key
                ? <input autoFocus value={labelDraft} onChange={e=>setLabelDraft(e.target.value)}
                    onBlur={saveLabel} onKeyDown={e=>e.key==='Enter'&&saveLabel()}
                    style={{ fontSize:'11px', color:'#6366F1', border:'none', borderBottom:'1px solid #6366F1', outline:'none', width:'120px', background:'transparent', fontFamily:'Inter,sans-serif' }}/>
                : <span onClick={()=>{setEditingLabel(x.key);setLabelDraft(legendLabels[x.key]);}}
                    style={{ fontSize:'11px', color:'#64748B', cursor:'pointer', textDecoration:'underline dotted' }}
                    title="Click to rename">{legendLabels[x.key]}</span>
              }
            </div>
          ))}
          <span style={{ fontSize:'10px', color:'#CBD5E1', marginLeft:'4px' }}>tap labels to rename</span>
        </div>
      </div>

      {/* Upcoming */}
      <div style={{ background:'white', borderRadius:'20px', padding:'26px',
        boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px' }}>
          <h3 style={{ fontSize:'16px', fontWeight:'700', color:'#0F172A' }}>Upcoming Events</h3>
          <button onClick={()=>setShowAddEvt(v=>!v)} style={{ display:'flex', alignItems:'center', gap:'4px', background:'#F5F3FF', border:'none', borderRadius:'9px', padding:'6px 12px', color:'#7C3AED', fontWeight:'600', fontSize:'12px', cursor:'pointer' }}>
            <IcoPlus/> Add
          </button>
        </div>
        {showAddEvt && (
          <div className="fade-up" style={{ background:'#FAFAFA', borderRadius:'12px', padding:'14px', marginBottom:'14px', border:'1px solid #E2E8F0' }}>
            <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
              <input value={addForm.title} onChange={e=>setAddForm(f=>({...f,title:e.target.value}))} placeholder="Event title" style={{ padding:'8px 12px', borderRadius:'8px', border:'1px solid #E2E8F0', fontSize:'12px', fontFamily:'Inter,sans-serif', outline:'none' }}/>
              <div style={{ display:'flex', gap:'6px' }}>
                <input value={addForm.date} onChange={e=>setAddForm(f=>({...f,date:e.target.value}))} placeholder="Date (Apr 10)" style={{ flex:1, padding:'8px 12px', borderRadius:'8px', border:'1px solid #E2E8F0', fontSize:'12px', fontFamily:'Inter,sans-serif', outline:'none' }}/>
                <input value={addForm.time} onChange={e=>setAddForm(f=>({...f,time:e.target.value}))} placeholder="Time" style={{ flex:1, padding:'8px 12px', borderRadius:'8px', border:'1px solid #E2E8F0', fontSize:'12px', fontFamily:'Inter,sans-serif', outline:'none' }}/>
                <select value={addForm.who} onChange={e=>setAddForm(f=>({...f,who:e.target.value}))} style={{ flex:1, padding:'8px 12px', borderRadius:'8px', border:'1px solid #E2E8F0', fontSize:'12px', fontFamily:'Inter,sans-serif', outline:'none', cursor:'pointer' }}>
                  <option value="brad">You</option><option value="mim">Mim</option><option value="shared">Shared</option>
                </select>
              </div>
              <div style={{ display:'flex', gap:'6px' }}>
                <button onClick={()=>setShowAddEvt(false)} style={{ flex:1, padding:'7px', borderRadius:'8px', border:'1px solid #E2E8F0', background:'white', cursor:'pointer', fontSize:'12px', fontFamily:'Inter,sans-serif' }}>Cancel</button>
                <button onClick={submitAddEvt} style={{ flex:1, padding:'7px', borderRadius:'8px', border:'none', background:'#7C3AED', color:'white', cursor:'pointer', fontSize:'12px', fontWeight:'600', fontFamily:'Inter,sans-serif' }}>Save</button>
              </div>
            </div>
          </div>
        )}
        <div style={{ display:'flex', flexDirection:'column', gap:'10px' }}>
          {events.map(ev => (
            <div key={ev.id} style={{
              display:'flex', alignItems:'center', gap:'12px', padding:'12px 14px', borderRadius:'14px',
              background: ev.owner==='brad' ? '#EFF6FF' : ev.owner==='mim' ? '#FDF2F8' : '#F5F3FF',
              cursor:'pointer', transition:'filter .15s',
            }}
            onMouseEnter={e=>e.currentTarget.style.filter='brightness(.97)'}
            onMouseLeave={e=>e.currentTarget.style.filter='brightness(1)'}>
              <span style={{ fontSize:'20px' }}>{ev.icon}</span>
              <div style={{ flex:1 }}>
                <p style={{ fontSize:'13px', fontWeight:'600', color:'#0F172A' }}>{ev.title}</p>
                <p style={{ fontSize:'11px', color:'#64748B' }}>{ev.date} · {ev.time}</p>
              </div>
              <span style={{
                fontSize:'11px', fontWeight:'600', padding:'3px 10px', borderRadius:'100px',
                color:  ev.owner==='brad'?'#1D4ED8':ev.owner==='mim'?'#BE185D':'#6D28D9',
                background: ev.owner==='brad'?'#DBEAFE':ev.owner==='mim'?'#FCE7F3':'#EDE9FE',
              }}>
                {ev.owner==='brad'?'You':ev.owner==='mim'?otherParentName:'Shared'}
              </span>
            </div>
          ))}
        </div>
      </div>

      {/* Day detail modal — tap any day to set custody + add a note */}
      {openDay && (() => {
        const dayObj = custodyDays.find(x => x.d === openDay.d) || { d: openDay.d, owner: 'none' };
        const OWNER_LABEL = { none:'Not set', brad:'With you', mim:`With ${otherParentName}`, shared:'Split (1 kid each)' };
        const OWNER_COLOR = { none:'#94A3B8', brad:'#2563EB', mim:'#DB2777', shared:'#7C3AED' };
        return (
          <div onClick={() => { setOpenDay(null); setNoteDraft(''); }}
            style={{ position:'fixed', inset:0, background:'rgba(15,23,42,.5)', zIndex:1000,
              display:'flex', alignItems:'center', justifyContent:'center', padding:'20px' }}>
            <div onClick={e => e.stopPropagation()} className="fade-up"
              style={{ background:'white', borderRadius:'20px', padding:'26px', maxWidth:'440px',
                width:'100%', boxShadow:'0 24px 60px rgba(0,0,0,.25)' }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:'18px' }}>
                <div>
                  <p style={{ fontSize:'11px', fontWeight:'700', color:'#94A3B8', letterSpacing:'1px', textTransform:'uppercase' }}>
                    {MONTHS[openDay.month]} {openDay.year}
                  </p>
                  <h3 style={{ fontSize:'24px', fontWeight:'800', color:'#0F172A', letterSpacing:'-.3px' }}>
                    {MONTHS[openDay.month].slice(0,3)} {openDay.d}
                  </h3>
                </div>
                <button onClick={() => { setOpenDay(null); setNoteDraft(''); }}
                  style={{ background:'#F1F5F9', border:'none', width:'30px', height:'30px', borderRadius:'50%', fontSize:'16px', cursor:'pointer', color:'#64748B' }}>×</button>
              </div>

              <p style={{ fontSize:'12px', fontWeight:'700', color:'#64748B', marginBottom:'8px', textTransform:'uppercase', letterSpacing:'.5px' }}>Scheduled</p>
              <div style={{ display:'flex', alignItems:'center', gap:'10px', marginBottom:'10px' }}>
                <div style={{ flex:1, padding:'12px 16px', borderRadius:'12px',
                  background: OWNER_COLOR[dayObj.owner] + '18', border:`1px solid ${OWNER_COLOR[dayObj.owner]}33`,
                  color: OWNER_COLOR[dayObj.owner], fontSize:'14px', fontWeight:'700' }}>
                  {OWNER_LABEL[dayObj.owner]}
                </div>
                <button onClick={() => cycleCustody(openDay.d)} style={{
                  background:'#0F172A', color:'white', border:'none', borderRadius:'12px',
                  padding:'12px 16px', fontSize:'12px', fontWeight:'700', cursor:'pointer', whiteSpace:'nowrap' }}>
                  Cycle →
                </button>
              </div>
              {overrides[openDay.key] && (
                <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'18px',
                  padding:'8px 12px', borderRadius:'10px', background:'#FFFBEB', border:'1px solid #FDE68A' }}>
                  <span style={{ width:'8px', height:'8px', borderRadius:'50%', background:'#F59E0B' }}/>
                  <span style={{ fontSize:'11px', color:'#92400E', flex:1 }}>This day overrides your schedule</span>
                  <button onClick={() => resetDayToTemplate(openDay.d, openDay.month, openDay.year)}
                    style={{ background:'white', border:'1px solid #FDE68A', color:'#92400E',
                      borderRadius:'8px', padding:'4px 10px', fontSize:'11px', fontWeight:'700', cursor:'pointer' }}>
                    Reset to schedule
                  </button>
                </div>
              )}
              {!overrides[openDay.key] && scheduleTemplate[dowOf(openDay.d, openDay.month, openDay.year)] !== 'none' && (
                <p style={{ fontSize:'11px', color:'#94A3B8', marginBottom:'18px' }}>
                  Following your weekly schedule. Tap Cycle to override just this day.
                </p>
              )}

              <p style={{ fontSize:'12px', fontWeight:'700', color:'#64748B', marginBottom:'8px', textTransform:'uppercase', letterSpacing:'.5px' }}>Notes for this day</p>
              <textarea value={noteDraft} onChange={e => setNoteDraft(e.target.value)}
                placeholder={`What happened on this day? E.g. "Skylah stayed with me because ${otherParentName} was sick" or "Dropped off at 5pm at the park"`}
                rows={4}
                style={{ width:'100%', padding:'12px 14px', borderRadius:'12px', border:'1.5px solid #E2E8F0',
                  fontSize:'13px', fontFamily:'Inter,sans-serif', resize:'vertical', outline:'none', marginBottom:'16px',
                  background:'#FAFBFC', lineHeight:'1.5' }}/>

              <div style={{ display:'flex', gap:'8px' }}>
                <button onClick={() => { setOpenDay(null); setNoteDraft(''); }}
                  style={{ flex:1, padding:'11px', borderRadius:'11px', border:'1px solid #E2E8F0',
                    background:'white', cursor:'pointer', fontSize:'13px', fontWeight:'500' }}>Cancel</button>
                <button onClick={saveDayNote}
                  style={{ flex:2, padding:'11px', borderRadius:'11px', border:'none',
                    background:'linear-gradient(135deg,#6366F1,#7C3AED)', color:'white',
                    cursor:'pointer', fontSize:'13px', fontWeight:'700' }}>Save note</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Weekly schedule template modal */}
      {showTemplate && tmplDraft && (
        <div onClick={() => { setShowTemplate(false); setTmplDraft(null); }}

            </div>

        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════
   CO-PARENTING — EXPENSES TAB
═══════════════════════════════════════ */
function TabExpenses() {
  const mobile = useIsMobile();
  const [expenses, setExpenses]   = useLocalStorage('lifeos_expenses', EXPENSES_SEED);
  const [showForm, setShowForm]   = useState(false);
  const [form, setForm]           = useState({ desc:'', amount:'', paidBy:'You' });

  const pending = expenses.filter(e=>e.status==='pending');
  const youOwed = pending.filter(e=>e.paidBy==='You').reduce((s,e)=>s+e.amount,0);
  const theyOwed= pending.filter(e=>e.paidBy==='Mim').reduce((s,e)=>s+e.amount,0);
  const balance = (youOwed - theyOwed) / 2;

  const addExpense = () => {
    if (!form.desc || !form.amount) return;
    setExpenses(prev => [...prev, {
      id: Date.now(), desc:form.desc, amount:parseFloat(form.amount),
      date:'Apr 1', paidBy:form.paidBy, status:'pending', emoji:'💵'
    }]);
    setForm({ desc:'', amount:'', paidBy:'You' });
    setShowForm(false);
  };

  return (
    <div style={{ display:'grid', gridTemplateColumns: mobile ? '1fr' : '1fr 300px', gap:'24px' }}>
      <div>
        {/* Balance hero */}
        <div style={{ background:'linear-gradient(135deg,#7C3AED,#6366F1)', borderRadius:'20px',
          padding:'28px 32px', marginBottom:'20px', color:'white' }}>
          <p style={{ fontSize:'13px', opacity:.75, marginBottom:'8px' }}>
            {balance>=0 ? '← Mim owes you' : '→ You owe Mim'}
          </p>
          <p style={{ fontSize:'44px', fontWeight:'800', letterSpacing:'-1px' }}>
            ${Math.abs(balance).toFixed(2)}
          </p>
          <p style={{ fontSize:'12px', opacity:.6, marginTop:'4px' }}>Based on unsettled expenses</p>
          <button onClick={() => setExpenses(prev => prev.map(e => ({...e, status:'settled'})))}
            style={{ marginTop:'20px', background:'rgba(255,255,255,.18)',
            border:'1.5px solid rgba(255,255,255,.3)', borderRadius:'10px',
            padding:'9px 18px', color:'white', cursor:'pointer', fontSize:'13px',
            fontWeight:'600', fontFamily:'Inter,sans-serif' }}>
            Mark all settled ✓
          </button>
        </div>

        {/* List */}
        <div style={{ background:'white', borderRadius:'20px', padding:'24px',
          boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px' }}>
            <h3 style={{ fontSize:'15px', fontWeight:'700', color:'#0F172A' }}>Expenses</h3>
            <button onClick={() => setShowForm(v=>!v)} style={{
              display:'flex', alignItems:'center', gap:'5px',
              background:'#F5F3FF', border:'none', borderRadius:'9px',
              padding:'8px 14px', color:'#7C3AED', fontWeight:'600', fontSize:'13px', cursor:'pointer' }}>
              <IcoPlus /> Add expense
            </button>
          </div>

          {showForm && (
            <div className="fade-up" style={{ background:'#FAFAFA', borderRadius:'14px',
              padding:'18px', marginBottom:'16px', border:'1px solid #E2E8F0' }}>
              <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr 1fr', gap:'10px', marginBottom:'12px' }}>
                <input value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))}
                  placeholder="Description" style={{ padding:'9px 14px', borderRadius:'9px',
                  border:'1px solid #E2E8F0', fontSize:'13px', background:'white' }} />
                <input value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))}
                  placeholder="Amount ($)" type="number" style={{ padding:'9px 14px', borderRadius:'9px',
                  border:'1px solid #E2E8F0', fontSize:'13px', background:'white' }} />
                <select value={form.paidBy} onChange={e=>setForm(f=>({...f,paidBy:e.target.value}))}
                  style={{ padding:'9px 14px', borderRadius:'9px', border:'1px solid #E2E8F0',
                  fontSize:'13px', background:'white', fontFamily:'Inter,sans-serif', cursor:'pointer' }}>
                  <option>You</option><option>Mim</option>
                </select>
              </div>
              <div style={{ display:'flex', gap:'8px' }}>
                <button onClick={()=>setShowForm(false)} style={{ flex:1, padding:'9px', borderRadius:'9px',
                  border:'1px solid #E2E8F0', background:'white', cursor:'pointer', fontSize:'13px' }}>Cancel</button>
                <button onClick={addExpense} style={{ flex:1, padding:'9px', borderRadius:'9px',
                  border:'none', background:'#7C3AED', color:'white', cursor:'pointer',
                  fontSize:'13px', fontWeight:'600' }}>Save</button>
              </div>
            </div>
          )}

          {expenses.map(exp => (
            <div key={exp.id} className="exp-row" style={{ display:'flex', alignItems:'center',
              gap:'12px', padding:'13px 10px', borderRadius:'12px', transition:'background .15s' }}>
              <span style={{ fontSize:'20px' }}>{exp.emoji}</span>
              <div style={{ flex:1 }}>
                <p style={{ fontSize:'13px', fontWeight:'600', color:'#0F172A' }}>{exp.desc}</p>
                <p style={{ fontSize:'11px', color:'#94A3B8' }}>{exp.date} · Paid by {exp.paidBy}</p>
              </div>
              <div style={{ textAlign:'right' }}>
                <p style={{ fontSize:'15px', fontWeight:'700', color:'#0F172A' }}>${exp.amount}</p>
                <p style={{ fontSize:'11px', color:'#94A3B8' }}>each: ${(exp.amount/2).toFixed(2)}</p>
              </div>
              <div style={{ width:'8px', height:'8px', borderRadius:'50%', flexShrink:0,
                background: exp.status==='pending' ? '#F59E0B' : '#10B981' }} title={exp.status}/>
            </div>
          ))}
        </div>
      </div>

      {/* Sidebar */}
      <div style={{ display:'flex', flexDirection:'column', gap:'16px' }}>
        <div style={{ background:'white', borderRadius:'20px', padding:'22px',
          boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' }}>
          <h3 style={{ fontSize:'14px', fontWeight:'700', color:'#0F172A', marginBottom:'16px' }}>This Month</h3>
          {[
            { k:'Total shared',   v:`$${expenses.reduce((s,e)=>s+e.amount,0)}`,       c:'#0F172A' },
            { k:'Your share',     v:`$${(expenses.reduce((s,e)=>s+e.amount,0)/2).toFixed(2)}`, c:'#2563EB' },
            { k:"Mim's share",  v:`$${(expenses.reduce((s,e)=>s+e.amount,0)/2).toFixed(2)}`, c:'#DB2777' },
            { k:'Settled',        v:`$${expenses.filter(e=>e.status==='settled').reduce((s,e)=>s+e.amount,0)}`, c:'#10B981' },
            { k:'Pending',        v:`$${expenses.filter(e=>e.status==='pending').reduce((s,e)=>s+e.amount,0)}`, c:'#F59E0B' },
          ].map(({k,v,c},i,arr) => (
            <div key={i} style={{ display:'flex', justifyContent:'space-between', padding:'7px 0',
              borderBottom: i<arr.length-1 ? '1px solid #F8FAFC' : 'none' }}>
              <span style={{ fontSize:'12px', color:'#64748B' }}>{k}</span>
              <span style={{ fontSize:'12px', fontWeight:'700', color:c }}>{v}</span>
            </div>
          ))}
        </div>

        <div style={{ background:'white', borderRadius:'20px', padding:'22px',
          boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' }}>
          <h3 style={{ fontSize:'14px', fontWeight:'700', color:'#0F172A', marginBottom:'14px' }}>Status</h3>
          {[
            { c:'#F59E0B', label:'Pending settlement' },
            { c:'#10B981', label:'Fully settled' },
          ].map((x,i) => (
            <div key={i} style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'8px' }}>
              <div style={{ width:'8px', height:'8px', borderRadius:'50%', background:x.c }}/>
              <span style={{ fontSize:'12px', color:'#64748B' }}>{x.label}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   CO-PARENTING — MESSAGES TAB
═══════════════════════════════════════ */
function TabMessages() {
  const mobile = useIsMobile();
  const [otherParentName] = useLocalStorage('lifeos_otherParentName', 'Other Parent');
  const [thread, setThread] = useLocalStorage('lifeos_cp_thread', []);
  const [reply, setReply] = useState('');
  const [sender, setSender] = useState('me'); // 'me' | 'them'
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [thread.length]);

  const sendMsg = () => {
    const text = reply.trim();
    if (!text) return;
    const now = new Date();
    const time = now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
    const date = now.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    setThread(prev => [...prev, { id: Date.now(), from: sender, text, time, date, ts: now.toISOString() }]);
    setReply('');
  };

  const deleteMsg = (id) => setThread(prev => prev.filter(m => m.id !== id));

  const clearAll = () => {
    if (window.confirm('Clear the entire co-parent chat log? This cannot be undone.')) setThread([]);
  };

  return (
    <div style={{ background:'white', borderRadius:'20px', overflow:'hidden',
      boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9',
      display:'flex', flexDirection:'column', height: mobile ? '520px' : '560px' }}>

      {/* Header */}
      <div style={{ padding:'16px 22px', borderBottom:'1px solid #F1F5F9',
        display:'flex', alignItems:'center', justifyContent:'space-between', gap:'12px' }}>
        <div>
          <p style={{ fontSize:'14px', fontWeight:'700', color:'#0F172A' }}>Co-parent Log — You &amp; {otherParentName}</p>
          <p style={{ fontSize:'11px', color:'#94A3B8' }}>A shared record of what&apos;s been communicated. Tap a bubble to delete.</p>
        </div>
        {thread.length > 0 && (
          <button onClick={clearAll} style={{ background:'none', border:'1px solid #E2E8F0',
            borderRadius:'8px', padding:'5px 10px', fontSize:'11px', color:'#64748B', cursor:'pointer' }}>
            Clear log
          </button>
        )}
      </div>

      {/* Thread */}
      <div style={{ flex:1, padding:'20px 22px', overflowY:'auto', display:'flex',
        flexDirection:'column', gap:'10px', background:'#FAFBFC' }}>
        {thread.length === 0 && (
          <div style={{ margin:'auto', textAlign:'center', color:'#94A3B8', fontSize:'13px', maxWidth:'320px' }}>
            <div style={{ fontSize:'36px', marginBottom:'10px' }}>💬</div>
            <p style={{ marginBottom:'6px', color:'#64748B', fontWeight:'600' }}>No messages yet</p>
            <p>Log anything {otherParentName} tells you, or write yourself a note about what you told them. Use the toggle below to mark who said it.</p>
          </div>
        )}
        {thread.map(msg => {
          const mine = msg.from === 'me';
          return (
            <div key={msg.id} style={{ display:'flex', justifyContent: mine ? 'flex-end' : 'flex-start' }}>
              <div onClick={() => deleteMsg(msg.id)} title="Click to delete"
                style={{
                  background: mine ? 'linear-gradient(135deg,#6366F1,#7C3AED)' : 'white',
                  color: mine ? 'white' : '#0F172A',
                  borderRadius: mine ? '18px 18px 4px 18px' : '18px 18px 18px 4px',
                  padding:'10px 14px', maxWidth:'78%', fontSize:'13px', lineHeight:'1.5',
                  border: mine ? 'none' : '1px solid #E2E8F0', cursor:'pointer',
                  boxShadow:'0 1px 2px rgba(0,0,0,.04)',
                }}>
                <div style={{ fontSize:'10px', fontWeight:'700', opacity: mine ? 0.8 : 0.55,
                  marginBottom:'3px', letterSpacing:'.3px', textTransform:'uppercase' }}>
                  {mine ? 'You' : otherParentName} · {msg.date} {msg.time}
                </div>
                {msg.text}
              </div>
            </div>
          );
        })}
        <div ref={bottomRef} />
      </div>

      {/* Composer */}
      <div style={{ padding:'14px 18px', borderTop:'1px solid #F1F5F9', background:'white' }}>
        <div style={{ display:'flex', gap:'6px', marginBottom:'10px' }}>
          {[
            { id:'me',   label:'You said' },
            { id:'them', label:`${otherParentName} said` },
          ].map(opt => (
            <button key={opt.id} onClick={() => setSender(opt.id)} style={{
              padding:'6px 12px', borderRadius:'8px', border:'none', cursor:'pointer',
              fontSize:'11px', fontWeight:'600',
              background: sender === opt.id ? '#0F172A' : '#F1F5F9',
              color:      sender === opt.id ? 'white' : '#64748B',
            }}>{opt.label}</button>
          ))}
        </div>
        <div style={{ display:'flex', gap:'10px' }}>
          <input value={reply} onChange={e => setReply(e.target.value)}
            placeholder={sender === 'me' ? `What did you tell ${otherParentName}?` : `What did ${otherParentName} say?`}
            onKeyDown={e => e.key === 'Enter' && sendMsg()}
            style={{ flex:1, padding:'10px 16px', borderRadius:'12px', border:'1.5px solid #E2E8F0',
            fontSize:'13px', background:'#FAFBFC' }} />
          <button onClick={sendMsg} style={{
            width:'40px', height:'40px', borderRadius:'12px', border:'none',
            background:'linear-gradient(135deg,#6366F1,#7C3AED)',
            display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
            <IcoSend />
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   CO-PARENTING — KIDS TAB
═══════════════════════════════════════ */
function TabKids() {
  const mobile = useIsMobile();
  const [uploadedDocs, setUploadedDocs] = useLocalStorage('lifeos_kid_docs', {});
  const fileRefs = useRef({});
  // "Coming soon" modal state for Bug 6
  const [comingSoonDoc, setComingSoonDoc] = useState(null);

  const handleDocUpload = (kidName, docLabel, e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      setUploadedDocs(prev => ({
        ...prev,
        [`${kidName}_${docLabel}`]: { name: file.name, type: file.type, data: ev.target.result, date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) }
      }));
    };
    if (file.type.startsWith('image/') || file.type === 'text/plain') reader.readAsDataURL(file);
    else reader.readAsDataURL(file);
    e.target.value = '';
  };

  const kids = [
    {
      name:'Lilly', age:8, emoji:'👧', grade:'Year 3', school:'',
      activities:['⚽ Soccer — Tue & Thu 4:30 PM', '🎨 Art class — Sat 10:00 AM'],
      medical:{ dr:'Dr. Michelle Chen', allergies:'None', meds:'None', notes:'Annual checkup in June' },
      docs:['📄 Birth certificate', '🏥 Immunization record', '📚 School IEP (none)'],
    },
    {
      name:'Skylah', age:5, emoji:'👧', grade:'Prep', school:'',
      activities:['🎹 Piano — Wed 3:00 PM', '📚 Reading club — Mon 3:30 PM'],
      medical:{ dr:'Dr. Michelle Chen', allergies:'⚠️ Peanuts (EpiPen in bag)', meds:'None', notes:'Retainer — worn at night' },
      docs:['📄 Birth certificate', '🏥 Immunization record', '⚠️ Allergy action plan'],
    },
  ];

  return (
    <div style={{ display:'grid', gridTemplateColumns: mobile ? '1fr' : '1fr 1fr', gap:'24px' }}>
      {kids.map(kid => (
        <div key={kid.name} style={{ background:'white', borderRadius:'20px', padding:'26px',
          boxShadow:'0 1px 4px rgba(0,0,0,.06)', border:'1px solid #F1F5F9' }}>

          <div style={{ display:'flex', alignItems:'center', gap:'16px', marginBottom:'22px' }}>
            <div style={{ width:'60px', height:'60px', borderRadius:'50%', background:'#F5F3FF',
              display:'flex', alignItems:'center', justifyContent:'center', fontSize:'30px',
              border:'3px solid #EDE9FE' }}>
              {kid.emoji}
            </div>
            <div>
              <h2 style={{ fontSize:'20px', fontWeight:'800', color:'#0F172A', letterSpacing:'-.3px' }}>{kid.name}</h2>
              <p style={{ fontSize:'13px', color:'#64748B' }}>Age {kid.age} · {kid.grade} · {kid.school}</p>
            </div>
          </div>

          <Section label="Activities">
            {kid.activities.map((a,i) => (
              <p key={i} style={{ fontSize:'13px', color:'#374151', padding:'7px 0',
                borderBottom: i<kid.activities.length-1 ? '1px solid #F8FAFC' : 'none' }}>{a}</p>
            ))}
          </Section>

          <Section label="Medical" style={{ marginTop:'16px' }}>
            <div style={{
              background: kid.medical.allergies.startsWith('⚠️') ? '#FEF2F2' : '#F0FDF4',
              border: `1px solid ${kid.medical.allergies.startsWith('⚠️') ? '#FECACA' : '#BBF7D0'}`,
              borderRadius:'10px', padding:'12px 14px', marginBottom:'10px',
            }}>
              <p style={{ fontSize:'13px', fontWeight:'600',
                color: kid.medical.allergies.startsWith('⚠️') ? '#DC2626' : '#15803D' }}>
                Allergies: {kid.medical.allergies}
              </p>
            </div>
            <p style={{ fontSize:'12px', color:'#64748B', marginBottom:'4px' }}>👨‍⚕️ Doctor: {kid.medical.dr}</p>
            <p style={{ fontSize:'12px', color:'#64748B', marginBottom:'4px' }}>💊 Medications: {kid.medical.meds}</p>
            <p style={{ fontSize:'12px', color:'#64748B' }}>📝 {kid.medical.notes}</p>
          </Section>

          <Section label="Documents" style={{ marginTop:'16px' }}>
            {kid.docs.map((d,i) => {
              const key = `${kid.name}_${d}`;
              const uploaded = uploadedDocs[key];
              const refKey = key;
              return (
                <div key={i}
                  onClick={() => setComingSoonDoc({ kid: kid.name, doc: d })}
                  style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 10px',
                    borderRadius:'10px', borderBottom: i < kid.docs.length-1 ? '1px solid #F8FAFC' : 'none',
                    cursor:'pointer', transition:'background .15s' }}
                  onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <input ref={el=>fileRefs.current[refKey]=el} type="file" style={{ display:'none' }} onChange={e=>{e.stopPropagation();handleDocUpload(kid.name,d,e);}} accept=".pdf,.jpg,.jpeg,.png,.txt" />
                  <div style={{ display:'flex', alignItems:'center', gap:'8px', flex:1 }}>
                    {uploaded
                      ? <span style={{ fontSize:'12px', color:'#059669', fontWeight:'600' }}>✅ {d.replace(/^.{2}/,'').trim()}</span>
